name: Setup Go + embed stub
description: >
  Installs Go with module cache and creates the `web/out/index.html` stub
  required by `web/embed.go`'s `go:embed` directive. Every Go-touching job
  needs both; consolidating avoids drift across workflows.

inputs:
  go-version:
    description: Go version
    required: true

runs:
  using: composite
  steps:
    # Cache is ENABLED here. On ephemeral GitHub-hosted ubuntu-latest
    # runners, $GOMODCACHE and $GOCACHE start cold every run; without
    # the action's built-in cache layer, every Go-touching job would
    # re-download ~100-300 MB of modules and re-build the toolchain
    # cache from scratch — adding ~60-90s per job. actions/setup-go's
    # cache restore + post-step save amortises that across runs.
    #
    # Historical note: this used to be `cache: false` because CI ran
    # on a persistent self-hosted MBA M3 (mba-m3-arm64) where the
    # local disk was already warm and the cache CDN's tar+upload
    # ~35s post-step budget could trip (PR #240 / run 25204871572
    # observed `golangci-lint pass in 6s → post-step cache-save
    # killed mid-tar → job went red`). Once we moved off self-hosted
    # in PR #4XX, the persistence assumption no longer holds and the
    # post-step cancel risk is the lesser evil compared to ~75s of
    # repeat downloads per job.
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - shell: bash
      run: |
        mkdir -p web/out
        [ -f web/out/index.html ] || echo '<!doctype html>' > web/out/index.html
