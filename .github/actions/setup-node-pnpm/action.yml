name: Setup Node + pnpm
description: >
  Checkout-less composite action that installs pnpm + Node with cache, runs
  `pnpm install --frozen-lockfile`, and generates the Prisma TS client.
  Shared by Frontend and Frontend Test so the setup lives in one place.

inputs:
  node-version:
    description: Node.js version
    required: true
  pnpm-version:
    description: pnpm major version
    required: true

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - shell: bash
      run: pnpm install --frozen-lockfile

    - shell: bash
      env:
        DATABASE_URL: "file:./dev.db"
      run: pnpm db:generate
