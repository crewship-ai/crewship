version: 2
updates:
  # NPM dependencies (works with pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@types/*"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@types/*"
      typescript-types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  # Weekly cadence (not monthly): every action in .github/workflows/ and
  # .github/actions/ is SHA-pinned for supply-chain hardening (see CRE-122).
  # SHA pins don't auto-receive security patches the way version pins do,
  # so this ecosystem needs the same weekly velocity as npm/gomod or
  # patches sit for up to 4 weeks before reaching main.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images
  # The root Dockerfile (node:24-alpine + golang:1.26-alpine + alpine:3.23
  # multi-stage) and docker/crewship-sandbox (debian:bookworm-slim) all
  # use floating tags. Audit M15 flagged that this lets a published patch
  # release of the base sit unreviewed in CI forever -- Dependabot
  # surfaces those bumps as PRs so the maintainer sees them.
  #
  # Each Dockerfile directory needs its own entry; Dependabot doesn't walk
  # the repo. Add a new one here when a Dockerfile lands at a new path.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "docker"
    directory: "/docker/crewship-sandbox"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
