name: Release Smoke Test

# TWO ways this runs:
#
# 1. workflow_run on the "Release" workflow — the post-release smoke. It does
#    NOT use `release: published`: goreleaser creates the release with the
#    built-in GITHUB_TOKEN, and GitHub deliberately suppresses `release`/`push`
#    events for token-created refs (loop prevention), so `release: published`
#    NEVER fired — every post-release smoke was dead (#933). Chaining off the
#    Release *workflow* completing sidesteps that with no extra secret.
#
# 2. pull_request (path-gated) — the pre-merge smoke: build a goreleaser
#    snapshot and install the .deb in a container BEFORE merge, so packaging
#    regressions are caught on the PR that makes them, not after a tag ships.
#
# Failure of the post-release run does NOT yank the release (publishing already
# succeeded); it signals "ship a patch tag or pull the release manually".
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  pull_request:
    paths:
      - ".goreleaser.yml"
      - "packaging/**"
      - "scripts/install.sh"
      - ".github/workflows/smoke-test.yml"

permissions:
  contents: read
  packages: read

env:
  # The release tag (e.g. v0.1.0-beta.1) for the post-release jobs. On a
  # workflow_run triggered by a tag push, head_branch is the tag name. Empty on
  # pull_request events (those jobs don't use it — they build a snapshot).
  TAG: ${{ github.event.workflow_run.head_branch }}
  GO_VERSION: "1.26.5"

jobs:
  binary:
    name: Smoke ${{ matrix.os }} / ${{ matrix.arch }}
    # Post-release only: needs a published release to download. Skip on PRs (the
    # pull_request trigger is for the pre-merge package-smoke job below).
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    # Pinning the macOS arm64 runner to macos-14 explicitly: macos-latest still
    # rotates between intel and arm64 hosts at the time of writing, and we want
    # the smoke test to actually exercise the darwin/arm64 archive — not silently
    # downgrade to x86 on whichever host the scheduler picks.
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runs-on: ubuntu-latest
          - os: darwin
            arch: arm64
            runs-on: macos-14
            # Windows is excluded for now — its UX is documented as
            # "experimental" in the README, the install script doesn't support
            # it, and the .zip layout differs (PowerShell unzip vs tar -xz).
            # Re-add a windows-2022 entry here when Windows graduates.
    steps:
      - name: Resolve archive name
        id: archive
        # goreleaser writes archives as crewship_<version-without-v>_<os>_<arch>.tar.gz.
        # The leading `v` on git tags is stripped from the version in the
        # archive name (matches the install.sh shape).
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NAME="crewship_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved archive: ${NAME}"

      - name: Download archive + checksums
        # GH_TOKEN: the standard GITHUB_TOKEN has `contents: read` from the
        # job-level permissions block above, which is enough to download
        # release assets on the same repo.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "${{ steps.archive.outputs.name }}" \
            --pattern "checksums.txt"

      - name: Verify SHA-256 against checksums.txt
        # Mirrors scripts/install.sh:verify_checksum so the smoke test
        # catches checksum drift in the same way an end-user install would.
        #
        # The match is done by `awk -v a=... '$2==a'` rather than grep so
        # special characters in archive names (the goreleaser default has
        # underscores and dots; an unlucky future name could contain `+`
        # or `.` that grep would interpret as regex metacharacters) match
        # literally. The exact-second-field test also means a future
        # checksums.txt with a filename containing the archive as a
        # substring won't false-match.
        run: |
          set -euo pipefail
          ARCHIVE="${{ steps.archive.outputs.name }}"
          EXPECTED=$(awk -v a="$ARCHIVE" '$2==a {print $1; exit}' checksums.txt)
          if [ -z "$EXPECTED" ]; then
            echo "::error::checksum for ${ARCHIVE} missing from checksums.txt"
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          else
            ACTUAL=$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::checksum mismatch for ${ARCHIVE}"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "checksum ok: $ACTUAL"

      - name: Extract archive
        run: |
          set -euo pipefail
          tar -xzf "${{ steps.archive.outputs.name }}"
          ls -la crewship
          # Packaging contract (#858): the full archive must bundle the
          # sidecar + entrypoint.sh next to the binary (else a tarball install
          # can't `crewship start`), AND the legal/docs files an explicit
          # goreleaser `files:` block would otherwise drop (Apache-2.0 binary
          # without its LICENSE = compliance bug). Assert both classes.
          for f in crewship-sidecar entrypoint.sh; do
            if [ ! -f "$f" ]; then
              echo "::error::archive is missing '$f' — full archive must bundle the sidecar runtime (#858)"
              exit 1
            fi
          done
          # #953: the sidecar is bind-mounted into LINUX agent containers and
          # exec'd there, so EVERY full archive — including the darwin one —
          # must carry a Linux ELF sidecar. A Mach-O sidecar passes the
          # presence check above but fails at first agent start (exit 255,
          # misdiagnosed as glibc/musl). Assert the ELF magic bytes.
          MAGIC=$(od -An -tx1 -N4 crewship-sidecar | tr -d ' \n')
          if [ "$MAGIC" != "7f454c46" ]; then
            echo "::error::crewship-sidecar in this archive is not a Linux ELF (magic: ${MAGIC}) — it must be a GOOS=linux build even in the darwin archive (#953)"
            exit 1
          fi
          for pat in 'LICENSE*' 'README*' 'CHANGELOG*'; do
            # shellcheck disable=SC2086
            if ! ls $pat >/dev/null 2>&1; then
              echo "::error::archive is missing $pat — explicit files: block dropped goreleaser's default docs/legal files (#858)"
              exit 1
            fi
          done
          echo "packaging ok: crewship + crewship-sidecar (linux ELF) + entrypoint.sh + LICENSE/README/CHANGELOG"

      - name: Probe `crewship version`
        # Assert non-zero exit AND that the printed version contains the tag —
        # `version` defaults to "dev" on un-ldflagged binaries, so a successful
        # ldflag injection is the actual signal we care about here.
        run: |
          set -euo pipefail
          OUT=$(./crewship version)
          echo "$OUT"
          if ! echo "$OUT" | grep -qF "${TAG}"; then
            echo "::error::'crewship version' output did not contain tag ${TAG}"
            echo "got: $OUT"
            exit 1
          fi

      - name: Probe `crewship doctor --no-color`
        # doctor exits 0 unless a FAIL check fires. WARN is acceptable for a
        # fresh runner (no Docker, no data dir yet), so we deliberately don't
        # parse the output — exit code is the contract.
        run: |
          set -euo pipefail
          ./crewship doctor --no-color || {
            echo "::error::crewship doctor exited non-zero"
            exit 1
          }

      - name: Probe `crewship --help`
        run: |
          set -euo pipefail
          OUT=$(./crewship --help)
          if ! echo "$OUT" | grep -qF "Available Commands"; then
            echo "::error::--help output missing 'Available Commands' section"
            exit 1
          fi

      - name: Probe `crewship start --no-docker` health endpoint
        # We can't run `start` foreground and wait for a clean exit (it's a
        # long-lived server) so we bound it with `timeout 10` and probe the
        # health endpoint from a parallel shell. The `|| true` after timeout
        # absorbs the SIGTERM exit code; the success signal is the curl
        # returning HTTP 200 inside the polling loop.
        #
        # Port 9090 avoids the default 8080 which CI runners often have
        # something else listening on. Set via CREWSHIP_PORT — `crewship
        # start` has no --port flag (internal/config reads the env; the
        # flag variant fails with "unknown flag: --port", caught by the
        # first live nightly-smoke probe run).
        #
        # NEXTAUTH_SECRET / ENCRYPTION_KEY are required at startup by
        # server.New() (since #375). Deterministic 64-hex throwaways let
        # the probe reach /api/health; without them the binary dies in
        # server construction and the probe times out.
        env:
          NEXTAUTH_SECRET: "00000000000000000000000000000000000000000000000000000000deadbeef"
          ENCRYPTION_KEY: "11111111111111111111111111111111111111111111111111111111cafebabe"
          CREWSHIP_PORT: "9090"
          # No CREWSHIP_SKIP_SIDECAR here (#858 packaging fix): the archive now
          # bundles crewship-sidecar + entrypoint.sh next to the binary, so
          # this probe boots exactly as a tarball user's install would —
          # proving the archive is bootable as-shipped.
        shell: bash
        run: |
          set -euo pipefail
          # Boot the server in the background. --no-docker keeps it SQLite-only,
          # which is what we want for a "did the binary even launch" smoke.
          (./crewship start --no-docker >/tmp/crewship-start.log 2>&1 || true) &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          # Poll for up to 30s waiting for /api/health. Cold GitHub-hosted
          # runners can be slow at the binary's first boot; 10s was the
          # previous budget and occasionally flaked. Tightened the sleep
          # interval to 0.25s so detection of "actually ready" is faster
          # once the server is up.
          STATUS=0
          for _ in $(seq 1 120); do
            if curl -sf --max-time 1 http://localhost:9090/api/health >/dev/null 2>&1; then
              STATUS=200
              break
            fi
            sleep 0.25
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::health endpoint did not return 200 within 30s"
            echo "---- crewship start log ----"
            cat /tmp/crewship-start.log || true
            exit 1
          fi
          echo "health endpoint ok"

  docker:
    name: Smoke Docker image
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        # GHCR is public for crewship-ai but rate-limits anonymous pulls more
        # aggressively. Log in with the workflow's GITHUB_TOKEN so the pull
        # uses the authenticated quota.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image for tag
        run: |
          set -euo pipefail
          docker pull "ghcr.io/${{ github.repository_owner }}/crewship:${TAG}"

      - name: Probe `crewship version` inside container
        run: |
          set -euo pipefail
          OUT=$(docker run --rm "ghcr.io/${{ github.repository_owner }}/crewship:${TAG}" version)
          echo "$OUT"
          if ! echo "$OUT" | grep -qF "${TAG}"; then
            echo "::error::container 'crewship version' output did not contain tag ${TAG}"
            exit 1
          fi

  packages:
    name: Smoke ${{ matrix.pkg }} package
    # Installs the release .deb / .rpm into a pristine distro container and
    # boots `crewship start --no-docker`, proving a package install is bootable
    # as-shipped (#858 phase 4). This is the FHS layout the tarball smoke can't
    # cover: crewship in /usr/bin, entrypoint.sh in /usr/libexec/crewship, and
    # autodetect must find both with no CREWSHIP_*_PATH override.
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: deb
            image: debian:bookworm-slim
          - pkg: rpm
            image: fedora:41
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Download package for tag
        run: |
          set -euo pipefail
          # Base distro images are minimal; install curl (+ CA certs) so we can
          # fetch the public release asset over HTTPS. gh isn't in stock repos.
          if [ "${{ matrix.pkg }}" = "deb" ]; then
            apt-get update
            apt-get install -y --no-install-recommends ca-certificates curl
          elif ! command -v curl >/dev/null 2>&1; then
            # Fedora already ships curl-minimal (provides /usr/bin/curl); only
            # install if a truly minimal image lacks it, avoiding a
            # curl/curl-minimal swap conflict.
            dnf install -y curl
          fi
          VERSION="${TAG#v}"
          # goreleaser nfpm file name mirrors the archive shape:
          # crewship_<version>_linux_amd64.{deb,rpm}. Runner arch is amd64.
          ASSET="crewship_${VERSION}_linux_amd64.${{ matrix.pkg }}"
          mkdir -p /pkg
          # Public repo: the release asset is downloadable without auth.
          curl -fSL \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}" \
            -o "/pkg/${ASSET}"

      - name: Install package
        run: |
          set -euo pipefail
          if [ "${{ matrix.pkg }}" = "deb" ]; then
            # --no-install-recommends: the package Recommends docker-ce, which
            # isn't in stock Debian repos; a smoke host doesn't need it.
            apt-get install -y --no-install-recommends /pkg/crewship_*_linux_amd64.deb
          else
            dnf install -y /pkg/crewship_*_linux_amd64.rpm
          fi
          # Assert the FHS layout the systemd unit + autodetect rely on.
          test -x /usr/bin/crewship
          test -x /usr/bin/crewship-sidecar
          test -f /usr/libexec/crewship/entrypoint.sh
          test -f /usr/lib/systemd/system/crewship.service
          test -f /etc/crewship/crewship.env
          # #953: the sidecar is bind-mounted into Linux agent containers —
          # assert it is a Linux ELF, not a host-native artifact.
          MAGIC=$(od -An -tx1 -N4 /usr/bin/crewship-sidecar | tr -d ' \n')
          if [ "$MAGIC" != "7f454c46" ]; then
            echo "::error::/usr/bin/crewship-sidecar is not a Linux ELF (magic: ${MAGIC}) (#953)"
            exit 1
          fi
          crewship version

      - name: Verify package signature (if signed)
        # GPG signing is conditional (#932): a release built without the
        # GPG_SIGNING_KEY secret is unsigned, so an unsigned package is a soft
        # SKIP here (keeps the smoke green on secret-less forks). A package
        # that IS signed but with a bad/invalid signature FAILS.
        #
        # deb verification uses plain gpg on the `_gpgorigin` ar member — a
        # debsigs-style detached signature over the remaining members in ar
        # order — because that is what nfpm produces. The dpkg-sig tool this
        # step originally used only understands its own _gpgbuilder manifest
        # format, so it classified every nfpm-signed deb as unsigned (and its
        # unconditional "processing …" output line matched the old soft-skip
        # grep, meaning the check could never fail at all).
        #
        # rpm verification must import the public key BEFORE `rpm -K`: a
        # signed rpm without the key in the rpmdb reports "SIGNATURES NOT OK"
        # (NOKEY), which would have hard-failed the first signed release.
        run: |
          set -uo pipefail
          PKG=$(ls /pkg/crewship_*_linux_amd64.${{ matrix.pkg }} | head -1)
          # The committed public half of the signing key, pinned to the
          # release's own tag so the smoke verifies against the key that was
          # current when the release was cut (packaging/SIGNING.md).
          if ! curl -fsSL \
            "https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/packaging/crewship-packages.pub" \
            -o /pkg/crewship-packages.pub; then
            echo "::error::could not fetch packaging/crewship-packages.pub at tag ${TAG}"; exit 1
          fi
          if [ "${{ matrix.pkg }}" = "deb" ]; then
            # Guarded installs/extraction: this step runs without `set -e`,
            # and a missing ar/gpg would otherwise make a SIGNED deb look
            # unsigned (no _gpgorigin extracted) and silently soft-skip.
            if ! apt-get install -y --no-install-recommends binutils gnupg >/dev/null; then
              echo "::error::failed to install binutils/gnupg for deb verification"; exit 1
            fi
            export GNUPGHOME=$(mktemp -d)
            if ! gpg --batch --import /pkg/crewship-packages.pub; then
              echo "::error::failed to import packaging/crewship-packages.pub"; exit 1
            fi
            WORK=$(mktemp -d)
            if ! (cd "$WORK" && ar x "$PKG"); then
              echo "::error::failed to unpack $PKG with ar"; exit 1
            fi
            if [ ! -f "$WORK/_gpgorigin" ]; then
              echo "::notice::deb is unsigned — skipping signature check (GPG_SIGNING_KEY not provisioned, #932)"
            elif cat "$WORK/debian-binary" "$WORK"/control.tar.* "$WORK"/data.tar.* \
                | gpg --batch --verify "$WORK/_gpgorigin" -; then
              echo "deb signature OK"
            else
              echo "::error::deb signature did not verify against packaging/crewship-packages.pub"; exit 1
            fi
          else
            RPMDB=$(mktemp -d)
            rpm --dbpath "$RPMDB" --initdb
            rpm --dbpath "$RPMDB" --import /pkg/crewship-packages.pub
            OUT=$(rpm --dbpath "$RPMDB" -K "$PKG" 2>&1 || true)
            echo "$OUT"
            if echo "$OUT" | grep -qi "NOT OK"; then
              echo "::error::rpm signature check failed"; exit 1
            elif echo "$OUT" | grep -qi "signatures OK"; then
              echo "rpm signature OK"
            else
              echo "::notice::rpm is unsigned (digests only) — skipping signature check (GPG_SIGNING_KEY not provisioned, #932)"
            fi
          fi

      - name: Probe `crewship start --no-docker` health endpoint
        # Boots exactly as a package install would: crewship from /usr/bin,
        # entrypoint.sh autodetected from /usr/libexec/crewship — no
        # CREWSHIP_*_PATH override, no CREWSHIP_SKIP_SIDECAR. Proves the FHS
        # autodetect candidate (issue #858 ph4) works against a real package.
        env:
          NEXTAUTH_SECRET: "00000000000000000000000000000000000000000000000000000000deadbeef"
          ENCRYPTION_KEY: "11111111111111111111111111111111111111111111111111111111cafebabe"
          CREWSHIP_PORT: "9090"
          CREWSHIP_DATA_DIR: "/tmp/crewship-data"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/crewship-data
          (crewship start --no-docker >/tmp/crewship-start.log 2>&1 || true) &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          STATUS=0
          for _ in $(seq 1 120); do
            if curl -sf --max-time 1 http://localhost:9090/api/health >/dev/null 2>&1; then
              STATUS=200
              break
            fi
            sleep 0.25
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::health endpoint did not return 200 within 30s (${{ matrix.pkg }} package)"
            echo "---- crewship start log ----"
            cat /tmp/crewship-start.log || true
            exit 1
          fi
          echo "${{ matrix.pkg }} package boots and serves /api/health"

  # Pre-merge package smoke: build a goreleaser snapshot and install the .deb in
  # a debian:12 container BEFORE merge, so a broken postinstall / layout / asset
  # name is caught on the PR that changes packaging — not after a release tag
  # (the post-release jobs above only run once a release exists). Path-gated via
  # the pull_request `paths:` filter at the top of this workflow.
  package-smoke-pr:
    name: Pre-merge package smoke (deb)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # The full `crewship` build embeds web/out (//go:embed all:out). The
      # package smoke only exercises install + boot + /healthz, not the UI, so a
      # stub satisfies the embed without a full (slow) frontend build.
      - name: Stub embedded UI for the snapshot build
        run: |
          mkdir -p web/out
          printf '<!doctype html><title>crewship snapshot</title>' > web/out/index.html

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "v2.6.1"
          install-only: true

      # snapshot.version_template in .goreleaser.yml forces a digit-leading
      # version (raw `nightly-…` snapshot versions are rejected by dpkg —
      # verified on Proxmox, see #927). Skip the release-only pipes.
      - name: Build snapshot packages
        run: goreleaser release --snapshot --clean --skip=publish,sign,sbom,validate,homebrew

      - name: Install .deb in debian:12 and boot
        run: |
          set -euo pipefail
          ls -1 dist/*.deb
          docker run --rm -v "$PWD/dist:/pkg" debian:12 bash -euo pipefail -c '
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends curl /pkg/crewship_*_linux_amd64.deb
            # FHS layout the unit + autodetect rely on
            test -x /usr/bin/crewship
            test -x /usr/bin/crewship-sidecar
            test -f /usr/libexec/crewship/entrypoint.sh
            test -f /usr/lib/systemd/system/crewship.service
            crewship version
            mkdir -p /var/lib/crewship
            env CREWSHIP_DATA_DIR=/var/lib/crewship CREWSHIP_PORT=9090 crewship start --no-docker >/tmp/cw.log 2>&1 &
            for _ in $(seq 1 60); do
              if curl -sf --max-time 1 http://127.0.0.1:9090/healthz >/dev/null 2>&1; then
                echo "deb install boots and serves /healthz"; exit 0
              fi
              sleep 1
            done
            echo "::error::package did not serve /healthz within 60s"; cat /tmp/cw.log; exit 1
          '
