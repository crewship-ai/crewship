name: Security

# CRE-122 supply chain + quality gates.
#
# Right-sized per event (2026-07-08 — after two advisory-DB updates in two
# days turned every open PR red for reasons unrelated to their diffs):
#
#   pull_request  — gitleaks always (secrets can leak in any file); the
#                   dependency/vuln scanners run ONLY when the PR can
#                   actually change their result (Go code / dependency
#                   manifests — see the `changes` router job). A docs- or
#                   CI-only PR pays ~20s, not ~7 runner-minutes.
#   push to main  — full battery, always. Nothing lands unscanned.
#   schedule      — full battery daily against main, so a NEW advisory in
#                   the govulncheck/OSV DBs is caught within a day even
#                   with zero commits — and files/updates a tracking issue
#                   (see scheduled-report) instead of reddening unrelated
#                   PRs one by one.
#
# All checks run in parallel.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily advisory sweep on main. 05:23 UTC = before the EU workday,
    # off the on-the-hour Actions rush.
    - cron: '23 5 * * *'
  # Manual full run for triage.
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege permissions. Jobs that need more (e.g. grype's SARIF upload
# to the GitHub Security tab) grant it explicitly at the job level.
permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"

jobs:
  # ── Router: which scanner inputs can this PR have changed? ──
  # Consulted only on pull_request; on push/schedule/dispatch every
  # downstream `if:` short-circuits on the event name and runs the full
  # battery. dorny/paths-filter reads the PR file list via the API, so no
  # checkout is needed and the job costs ~5s.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      gocode: ${{ steps.filter.outputs.gocode }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            # govulncheck is call-path based: NEW Go code can newly reach a
            # vulnerable function even with unchanged deps — so Go sources
            # count, not just the module files.
            gocode:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            deps:
              - 'go.mod'
              - 'go.sum'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # ── Secret scan: gitleaks ──
  # Uses the gitleaks CLI binary directly (free, MIT licensed) instead of
  # gitleaks/gitleaks-action@v2, which requires a paid license key for
  # organization accounts. The CLI binary has no such restriction.
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan commits on push to main.
          fetch-depth: 0

      # Download the gitleaks release tarball AND the upstream SHA-256
      # checksums file, then verify the tarball against it before extracting.
      # This matches the supply-chain hardening applied elsewhere in this
      # workflow (SHA-pinned actions, cosign keyless signatures on release
      # artifacts) and protects against a retargeted release asset.
      - name: Install gitleaks (checksum-verified)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.29.1"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          # --timeout=30 + --tries=3 = fail fast on a flaking GitHub release
          # CDN instead of hanging until the 5-minute job timeout. With one
          # retry per attempt and a 30s connect cap, worst-case wait is ~3min
          # and a transient blip self-heals on retry.
          WGET_OPTS=(-q --timeout=30 --tries=3)
          wget "${WGET_OPTS[@]}" "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -O /tmp/gitleaks.tar.gz
          wget "${WGET_OPTS[@]}" "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -O /tmp/gitleaks_checksums.txt
          # Extract just the linux_x64 row and feed it to sha256sum -c.
          grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" /tmp/gitleaks_checksums.txt \
            | awk '{print $1 "  /tmp/gitleaks.tar.gz"}' \
            | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks detect
        run: gitleaks detect --no-banner --redact --verbose

  # ── Go vulnerability scan: govulncheck ──
  #
  # Known accepted vulnerabilities (as of 2026-06-26):
  #   - GO-2026-4887 (docker/docker AuthZ plugin bypass) — no upstream fix,
  #     not reachable in Crewship's usage (we don't use AuthZ plugins)
  #   - GO-2026-4883 (docker/docker plugin privilege off-by-one) — no upstream
  #     fix, not reachable in Crewship's usage
  #   - GO-2026-5746 / GO-2026-5668 / GO-2026-5617 (docker/docker, v28.5.2) — a
  #     June-2026 advisory wave with no upstream fix yet (Fixed in: N/A).
  #     Reachable via the container provider (we run Docker for crew runtimes);
  #     accepted pending an upstream release. Repo-wide, not tied to any change.
  #   All documented in THIRD-PARTY-NOTICES.md.
  #
  # We wrap govulncheck in a script that accepts these specific CVE IDs and
  # fails ONLY on new/unknown vulnerabilities. This way the check stays GREEN
  # in the PR UI while still alerting on any new vulns that appear.
  govulncheck:
    name: Go Vuln Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    # PR: only when Go code or module files changed — an unchanged dep
    # graph + unchanged call graph cannot produce a new finding, and the
    # daily schedule below owns "a new advisory landed in the DB".
    if: github.event_name != 'pull_request' || needs.changes.outputs.gocode == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Pin to a specific govulncheck version so CI runs are reproducible.
      # '@latest' would silently upgrade across breaking changes.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck (known-accepted CVEs allowlisted)
        run: |
          set +e
          govulncheck ./... > /tmp/govuln.log 2>&1
          exit_code=$?
          cat /tmp/govuln.log

          # Exit 0 = clean, pass immediately.
          if [ $exit_code -eq 0 ]; then
            exit 0
          fi

          # Exit 3 = vulnerabilities found. Anything else (1, 2, signal, ...)
          # means a tool/runtime/analysis error — fail loudly, do NOT silently
          # pass by landing in the allowlist branch with no parsed IDs.
          if [ $exit_code -ne 3 ]; then
            echo "::error::govulncheck failed to execute (exit code ${exit_code}). See output above."
            exit $exit_code
          fi

          # exit_code == 3: vulnerabilities were reported. Extract the GO IDs
          # and verify every one of them is on the known-accepted list.
          accepted_pattern='GO-2026-4887|GO-2026-4883|GO-2026-5746|GO-2026-5668|GO-2026-5617'
          all_vulns=$(grep -oE 'GO-[0-9]{4}-[0-9]+' /tmp/govuln.log | sort -u)
          echo ""
          echo "=== Detected vulnerability IDs ==="
          echo "$all_vulns"
          echo ""

          # Defensive: exit 3 without any parseable GO IDs means the output
          # format changed or parsing is broken — we cannot safely allowlist,
          # so fail.
          if [ -z "$all_vulns" ]; then
            echo "::error::govulncheck reported vulnerabilities (exit 3) but no GO-YYYY-NNNN IDs could be parsed from the output. Output format may have changed."
            exit 1
          fi

          unexpected=$(echo "$all_vulns" | grep -vE "^($accepted_pattern)$" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::New unexpected vulnerability detected — not in accepted list:"
            echo "$unexpected"
            echo ""
            echo "If this is intentional, update .github/workflows/security.yml"
            echo "and THIRD-PARTY-NOTICES.md §Known accepted vulnerabilities."
            exit 1
          fi

          echo "::notice::govulncheck found only known-accepted CVEs (${accepted_pattern}). See THIRD-PARTY-NOTICES.md."
          exit 0

  # ── Source vulnerability scan: grype ──
  grype:
    name: Grype Source Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Not on PRs at all: grype is warn-only (fail-build: false), its
    # dependency coverage overlaps osv-scanner + the external
    # Dependency-Track SBOM pipeline, and its SARIF lands in the Security
    # tab — none of which a PR author acts on pre-merge. main pushes +
    # the daily schedule keep the Security tab current.
    if: github.event_name != 'pull_request'
    # SARIF upload to the GitHub Security tab requires write access to
    # security-events. Granted only to this job (least-privilege).
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run grype on source tree
        id: scan
        # Pinned to a specific commit SHA so a retargeted mutable tag cannot
        # silently inject a modified action. Tracks anchore/scan-action v7.
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          path: "."
          fail-build: false  # warning only in Phase 1 — promote after baseline is clean
          severity-cutoff: high
          output-format: sarif

      # anchore/scan-action@v7 writes SARIF to a random temp path (not
      # ./results.sarif in the workspace like v6 did). Reference the output
      # variable so the upload step finds the file.
      - name: Upload SARIF to GitHub Security
        # Pinned to a specific commit SHA for supply-chain hardening.
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
        continue-on-error: true

  # ── License policy: go-licenses (forbidden-license check) ──
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    # PR: only when dependency manifests changed — license posture cannot
    # move without them. Full runs on main pushes + daily schedule.
    if: github.event_name != 'pull_request' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Pin to a specific go-licenses version for reproducible CI runs.
      # Note: v2.x has a different CLI surface (different `check` / `csv`
      # subcommand flags). This pin locks to v1.6.0, which matches the
      # scripts/gen-notices.sh wrapper and the locally-tested behavior.
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      # modernc.org/mathutil is BSD-3-Clause but go-licenses cannot detect it
      # due to a file-matching edge case. Verified and documented.
      - name: Check for forbidden licenses
        run: |
          go-licenses check ./cmd/crewship \
            --disallowed_types=forbidden,restricted \
            --ignore modernc.org/mathutil

  # ── OSV scan: osv-scanner ──
  # govulncheck (above) does Go-source call-graph analysis on cmd/crewship,
  # only failing on reachable vulnerabilities. osv-scanner is complementary —
  # it cross-references go.sum + pnpm-lock.yaml against the full OSV.dev
  # database (covers Go, npm, and more), failing on anything present in the
  # dep graph regardless of reachability. Catches advisories that don't yet
  # have a Go-specific GO-YYYY-NNNN entry, and surfaces npm chain issues
  # govulncheck never sees. Free, OSS, run by Google.
  #
  # We install the binary directly rather than using the composite action —
  # the action's scan-args input batches whitespace-separated flags as a
  # single Docker argument and triggers "could not determine extractor
  # suitable to this file." The CLI install is two lines and SHA-stable via
  # `go install` against a pinned version.
  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    # PR: only when dependency manifests changed — osv-scanner reads
    # lockfiles, nothing else in a diff can move its result. Full runs on
    # main pushes + daily schedule.
    if: github.event_name != 'pull_request' || needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.2.4

      # Phase 1: warn-only. Mirrors grype's `fail-build: false` posture
      # above — we want the table in the run log + a `::warning::` annotation
      # on the PR, but not a red CI gate while Dependabot is still draining
      # the baseline backlog (~14 fixable findings as of this PR). Once the
      # baseline is clean, drop the `|| true` and promote to a hard gate.
      - name: Run osv-scanner against lockfiles (warn-only)
        run: |
          set +e
          osv-scanner \
            --lockfile=go.mod \
            --lockfile=pnpm-lock.yaml \
            > /tmp/osv.log 2>&1
          exit_code=$?
          cat /tmp/osv.log
          if [ "$exit_code" -ne 0 ]; then
            count=$(grep -oE 'Total [0-9]+ packages affected by [0-9]+ known vulnerabilities' /tmp/osv.log | head -1)
            echo "::warning::osv-scanner: ${count:-non-zero exit}. See run log for the table. Phase 1 = warn-only; baseline still being drained by Dependabot."
          fi
          exit 0

  # ── Scheduled-run alerting: file an issue instead of reddening PRs ──
  # The daily schedule is the sentinel for "a new advisory landed in the
  # DB with zero code changes" (it happened twice on 2026-07-07/08:
  # goldmark GO-2026-5320, then crypto/tls GO-2026-5856 — each turned
  # every open PR red). When a scheduled scan fails, this job files ONE
  # tracking issue (or comments on the existing open one) so the finding
  # has an owner and a thread, and PR authors are not the alarm channel.
  scheduled-report:
    name: Scheduled scan alert
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [gitleaks, govulncheck, grype, license-check, osv-scan]
    if: always() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: File, update, or close the alert issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Marker written into every bot-filed body; the close path
          # refuses to touch an issue that does not carry it.
          MARKER: "<!-- crewship:scheduled-security-scan-alert -->"
          TITLE: "Scheduled security scan failed on main"
          # Job results, one per line, for the green gate below.
          RESULTS: |
            gitleaks=${{ needs.gitleaks.result }}
            govulncheck=${{ needs.govulncheck.result }}
            grype=${{ needs.grype.result }}
            license-check=${{ needs.license-check.result }}
            osv-scan=${{ needs.osv-scan.result }}
        run: |
          set -euo pipefail
          # Fail SAFE, not fail green. This job runs with `if: always()`, so
          # it also runs when the scan pipeline itself is broken and every
          # needs-job is `skipped`. Enumerating the BAD statuses (the
          # `=(failure|cancelled)` filter this replaces) meant any status
          # not on that list — skipped, timed_out, or whatever GitHub adds
          # next — read as green and CLOSED the tracking issue. Invert it:
          # only an explicit `=success` on every single job is green.
          # Blank lines (the block scalar's trailing newline) are dropped
          # first, otherwise they would themselves fail the `=success` test.
          not_green=$(printf '%s\n' "$RESULTS" \
            | sed 's/[[:space:]]*$//' \
            | grep -v '^$' \
            | grep -vE '=success$' || true)
          # --force makes label creation idempotent across runs.
          gh label create security-scan-alert --repo "$REPO" \
            --color B60205 \
            --description "Automated: scheduled security scan failed on main" \
            --force
          # Only ever act on an issue THIS job filed: bot author + our exact
          # title or body marker. A human-filed issue that happens to carry
          # the security-scan-alert label must never be closed by the bot.
          existing=$(gh issue list --repo "$REPO" --label security-scan-alert \
            --state open --json number,title,body,author \
            --jq "[ .[]
                    | select(.author.is_bot)
                    | select(.title == \$ENV.TITLE
                             or (.body // \"\" | contains(\$ENV.MARKER)))
                  ] | .[0].number // empty")

          if [ -z "$not_green" ]; then
            # Green state: close any open alert issue so the label only ever
            # flags a real, current failure (same contract as the
            # code-scanning-report job below).
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$REPO" \
                --body "✅ Every scheduled security scan on \`main\` reported \`success\` as of $RUN_URL. Closing."
              gh issue close "$existing" --repo "$REPO" --reason completed
              echo "Closed alert issue #$existing (all scans green)."
            else
              echo "All scheduled scans green and no alert issue — nothing to do."
            fi
            exit 0
          fi

          echo "Scans that did not report success:"; echo "$not_green"
          body="$MARKER
          Scheduled security scan on \`main\` did not complete successfully.

          Jobs below did not report \`success\` — a \`skipped\` or \`cancelled\` job means the scan never ran, which is **not** a green result:

          \`\`\`
          $not_green
          \`\`\`

          Run: $RUN_URL

          Typical cause: a new advisory landed in the govulncheck/OSV DB (updated ~daily) — check the run log for the GO-YYYY-NNNN id, then bump the dependency/toolchain or add a dated, justified allowlist entry (see the govulncheck job header + THIRD-PARTY-NOTICES.md). This issue auto-closes when the daily scheduled run is green again."
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
            echo "Updated existing alert issue #$existing"
          else
            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --label security-scan-alert \
              --body "$body"
          fi

  # ── Code scanning drift sentinel ──
  # The scanners above (govulncheck/OSV/gitleaks) own DEPENDENCY + secret
  # drift. CodeQL (.github/workflows/codeql.yml) owns CODE-level findings
  # (injection, taint, path traversal) and posts them to the Security tab
  # as "Code scanning alerts" — but nothing turns a fresh CodeQL alert into
  # an owned, threaded work item. This job closes that gap: once a day it
  # counts the OPEN code-scanning alerts and, if any exist, files or
  # updates ONE idempotent tracking issue (same pattern as scheduled-report
  # above) so a newly-introduced injection/traversal sink can't silently
  # re-accumulate the way the original 449-alert backlog did. Green (zero
  # open) closes the loop by commenting + closing the tracking issue.
  code-scanning-report:
    name: Code scanning drift sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      # Read the repository's code-scanning alerts…
      security-events: read
      # …and file/close the tracking issue.
      issues: write
    steps:
      - name: Count open code-scanning alerts and file/close the tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MARKER: "<!-- crewship:code-scanning-alert -->"
          TITLE: "Code scanning: open alerts on main (tracking)"
        run: |
          set -euo pipefail

          # Pull every open alert (paginated) and summarise by rule +
          # severity. Only an explicit 404 ("code scanning is not
          # enabled", forks/first-run) may be treated as an empty set.
          # Any other failure (5xx, rate limit, auth) must FAIL the job:
          # a swallowed transient error is indistinguishable from
          # "0 alerts" and would falsely close the tracking issue as
          # clean while hundreds of alerts remain open.
          api_stderr=$(mktemp)
          if alerts_json=$(gh api --paginate \
            "repos/${REPO}/code-scanning/alerts?state=open&per_page=100" 2>"$api_stderr"); then
            :
          elif grep -q "HTTP 404" "$api_stderr"; then
            echo "Code scanning not enabled (HTTP 404) — treating as zero alerts."
            alerts_json='[]'
          else
            echo "::error::code-scanning alert query failed (not a 404) — refusing to report a clean state."
            cat "$api_stderr"
            exit 1
          fi
          # --paginate concatenates JSON arrays as separate documents; slurp
          # them back into one array before counting.
          count=$(echo "$alerts_json" | jq -s 'add // [] | length')
          echo "Open code-scanning alerts: ${count}"

          label="code-scanning-alert"
          gh label create "$label" --repo "$REPO" \
            --color D93F0B \
            --description "Automated: open CodeQL / code-scanning alerts on main" \
            --force

          # Same containment as scheduled-report: only an issue this job
          # filed (bot author + our title/marker) is ever closed.
          existing=$(gh issue list --repo "$REPO" --label "$label" \
            --state open --json number,title,body,author \
            --jq "[ .[]
                    | select(.author.is_bot)
                    | select(.title == \$ENV.TITLE
                             or (.body // \"\" | contains(\$ENV.MARKER)))
                  ] | .[0].number // empty")

          if [ "$count" -eq 0 ]; then
            # Clean state: close any open tracking issue so the label only
            # ever flags a real, current backlog.
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$REPO" \
                --body "✅ Code scanning is clean — 0 open alerts as of $RUN_URL. Closing."
              gh issue close "$existing" --repo "$REPO" \
                --reason completed
              echo "Closed tracking issue #$existing (zero open alerts)."
            else
              echo "Zero open alerts and no tracking issue — nothing to do."
            fi
            exit 0
          fi

          # Non-zero: build a by-rule / by-severity breakdown table. jq
          # emits the fully-formed markdown rows so the shell only has to
          # interpolate them into the issue body.
          breakdown=$(echo "$alerts_json" | jq -s -r '
            add // []
            | group_by(.rule.id)
            | map({
                rule: .[0].rule.id,
                sev: (.[0].rule.security_severity_level // .[0].rule.severity // "n/a"),
                n: length
              })
            | sort_by(-.n)
            | .[]
            | "| \(.n) | \(.sev) | `\(.rule)` |"
          ')
          # Plain double-quoted assignment (same pattern as scheduled-report
          # above) — avoids heredoc indentation pitfalls inside the YAML
          # block scalar.
          body="$MARKER
          **${count}** open code-scanning (CodeQL) alert(s) on \`main\`.

          | count | severity | rule |
          |------:|----------|------|
          ${breakdown}

          Scan: $RUN_URL
          Alerts: https://github.com/${REPO}/security/code-scanning?query=is%3Aopen

          Each alert must be **fixed** or **dismissed with a reason** (false-positive / won't-fix). This issue auto-closes when the daily sweep sees 0 open alerts."

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
            echo "Updated tracking issue #$existing (${count} open)."
          else
            gh issue create --repo "$REPO" \
              --title "$TITLE" \
              --label "$label" \
              --body "$body"
            echo "Filed new tracking issue (${count} open)."
          fi
