name: Security

# CRE-122 supply chain + quality gates.
# Runs on every PR and push to main. All checks run in parallel.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # ── Secret scan: gitleaks ──
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan commits on push to main.
          # On PR, the action auto-switches to staged-diff mode.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Go vulnerability scan: govulncheck ──
  govulncheck:
    name: Go Vuln Scan
    runs-on: ubuntu-latest
    # Continue-on-error: the docker/docker dependency has 2 known CVEs
    # without upstream fixes (GO-2026-4887, GO-2026-4883). See
    # THIRD-PARTY-NOTICES.md § Known accepted vulnerabilities.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # web/embed.go stub required for go-analysis tools.
      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ── Source vulnerability scan: grype ──
  grype:
    name: Grype Source Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run grype on source tree
        uses: anchore/scan-action@v7
        with:
          path: "."
          fail-build: false  # warning only in Phase 1 — promote after baseline is clean
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true

  # ── License policy: go-licenses (forbidden-license check) ──
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      # modernc.org/mathutil is BSD-3-Clause but go-licenses cannot detect it
      # due to a file-matching edge case. Verified and documented.
      - name: Check for forbidden licenses
        run: |
          go-licenses check ./cmd/crewship \
            --disallowed_types=forbidden,restricted \
            --ignore modernc.org/mathutil
