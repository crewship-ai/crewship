# DEPRECATED: This workflow builds the legacy agent-runtime image. Crewship
# now uses bind-mount injection into any base image (debian, ubuntu, etc.)
# and this image is no longer the default. Retained for backward compatibility.
name: Agent Runtime Image

on:
  push:
    branches: [main]
    paths:
      - "docker/agent-runtime/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: crewship-ai/agent-runtime

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=tag

      - uses: docker/build-push-action@v7
        with:
          context: docker/agent-runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
