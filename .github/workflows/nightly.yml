name: Nightly

# Continuous-delivery channel for beta testers: every push to main produces
# a Docker image tagged `:nightly` and `:main-<short-sha>`, plus a rolling
# `nightly` GitHub Release with prebuilt binaries.
#
# Two consumer profiles:
#   - `docker pull ghcr.io/crewship-ai/crewship:nightly` for self-hosters
#     who want every merged commit
#   - GitHub Release `nightly` for testers who don't run Docker
#
# This workflow intentionally does NOT cut a semver tag. Tags drive the
# main release pipeline; nightly is "trunk binary, dated, no promises."

on:
  push:
    branches: [main]
    # Skip nightly rebuild for changes that can't affect the binary or
    # static export. Saves ~10 minutes per docs-only commit.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
  # Manual trigger for backfill or recovery from a bad nightly.
  workflow_dispatch: {}

permissions:
  contents: write       # to update the rolling `nightly` release
  packages: write       # GHCR push
  id-token: write       # cosign keyless

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26.5"

jobs:
  docker:
    name: Nightly Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # Same rationale as release.yml: prefer the commit's own timestamp
      # over repo-update-time so two pushes within the same workflow window
      # don't get conflated.
      - name: Resolve commit timestamp
        id: meta
        run: echo "date=$(git log -1 --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      - name: Build & push nightly image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/crewship:nightly
            ghcr.io/${{ github.repository_owner }}/crewship:main-${{ github.sha }}
          build-args: |
            VERSION=nightly-${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign nightly image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/crewship:nightly@${DIGEST}"
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/crewship:main-${{ github.sha }}@${DIGEST}"

  # Rolling pre-release with prebuilt binaries for non-Docker testers.
  # goreleaser handles all cross-arch build + signing; we run it in snapshot
  # mode so it doesn't try to push a tag, then upload the dist/ output to
  # the `nightly` release (recreated each run so it always reflects HEAD).
  binaries:
    name: Nightly binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Version-less: pnpm/action-setup reads `packageManager` from
      # package.json. See release.yml for the rationale.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "build-time-placeholder"
          # Same NEXT_PUBLIC_* baking pattern as release.yml. The
          # nightly channel uses "nightly-<sha>" as its version string;
          # sentry.client.config's classifyEnv() maps that prefix into
          # the "beta" environment, keeping nightly noise out of the
          # production Sentry view while still surfacing it alongside
          # the beta-channel events maintainers actually watch.
          #
          # SENTRY_DSN_FRONTEND (not SENTRY_DSN) routes to the
          # `crewship-frontend` Sentry project; see release.yml for
          # the per-platform rationale and scripts/sentry-bootstrap.sh
          # for the secret mapping.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          NEXT_PUBLIC_CREWSHIP_VERSION: nightly-${{ github.sha }}

      - name: Copy static export for embedding
        run: rm -rf web/out && cp -r out web/out

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      # Goreleaser's `sboms:` block shells out to syft (CRE-122); the runner
      # image doesn't ship it. Same SHA-pinned install as release.yml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.38.0

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          # Match release.yml pin; `~> v2` allows v3 once released.
          version: "v2.6.1"
          # --snapshot: skip tag validation; --skip=publish,homebrew: do NOT
          # skip sign — nightly artifacts get the same cosign keyless
          # provenance as tagged releases so testers can `cosign verify-blob`
          # before installing. We still skip publish (we upload via gh
          # release ourselves) and homebrew (no formula bump on nightly).
          args: release --snapshot --clean --skip=publish,homebrew
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Pin the version goreleaser builds against instead of deriving it
          # from git. The "Replace rolling nightly release" step below creates a
          # rolling `nightly` git tag; `fetch-depth: 0` above pulls it back into
          # every subsequent checkout, and goreleaser — even with --snapshot —
          # parses the latest tag as semver up front and dies with
          # "failed to parse tag 'nightly' as semver" (#886). GORELEASER_CURRENT_TAG
          # overrides that lookup with a valid, deterministic semver so the
          # nightly build no longer depends on the rolling tag's (non-semver)
          # name. It only affects the {{.Version}} string baked into snapshot
          # artifacts (already "nightly-<sha>" via the ldflags path), not what
          # gets published — we upload via `gh release` ourselves.
          GORELEASER_CURRENT_TAG: v0.0.0-nightly
          # goreleaser's `signs:` block uses the GitHub Actions OIDC token to
          # request a Fulcio short-lived cert (keyless cosign). The token is
          # injected automatically because the workflow has `id-token: write`.

      # Sign the checksums file out-of-band so testers can verify the
      # archives transitively (cosign verify-blob → checksums.txt → sha256
      # of each tarball). goreleaser's per-archive signing is already on via
      # the `signs:` block, but we sign checksums.txt explicitly here so a
      # single-shot `curl + cosign verify-blob` is enough to validate.
      - name: Sign checksums.txt
        if: hashFiles('dist/checksums.txt') != ''
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      # Publish an immutable, unique per-run pre-release.
      #
      # The repo has immutable releases enabled (it protects the cosign/SBOM/
      # checksums provenance of tagged stable releases). Immutable releases
      # forbid reusing a tag name — so the old rolling `nightly` tag (delete +
      # recreate every run) is dead: `gh release create nightly` 422s with
      # "tag_name was used by an immutable release". Instead each run cuts a
      # unique, sortable tag:
      #
      #   nightly-<UTC-date>-r<run_number>
      #
      # run_number is unique per workflow run, so two pushes on the same day
      # (Nightly runs on every push to main) get distinct tags — a per-DAY tag
      # would hit the same immutable wall on the second run. A re-run of the
      # SAME run reuses the tag; we detect the existing release and skip rather
      # than double-publishing onto an immutable tag. The rolling
      # `ghcr.io/…:nightly` Docker image is unaffected — that is a GHCR tag,
      # not a git tag.
      - name: Publish nightly pre-release (immutable, per-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="nightly-$(date -u +%Y%m%d)-r${{ github.run_number }}"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ASSETS=$(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'checksums.txt' -o -name '*.sig' -o -name '*.pem' \) | tr '\n' ' ')
          NOTES="Nightly pre-release built from main @ ${GITHUB_SHA:0:7} (${TS}).

          **Not for production.** Use a tagged release for stable workloads.
          Docker: \`docker pull ghcr.io/${{ github.repository_owner }}/crewship:nightly\`
          Latest nightly binaries: \`gh release list --repo ${REPO} | grep -m1 nightly-\` (or query the API's latest prerelease)."
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists (workflow re-run); skipping create to avoid recreating an immutable tag."
          else
            gh release create "$TAG" \
              --prerelease \
              --title "Nightly $TAG (main @ ${GITHUB_SHA:0:7})" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              $ASSETS
          fi

      # Prune old nightly pre-releases so unique-per-run tags don't accumulate
      # forever. Deleting an immutable release IS allowed (only reusing a tag
      # name is forbidden, which unique tags never do). Keep ~7 days of
      # nightlies; drop the rest along with their tags.
      - name: Prune old nightly pre-releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '7 days ago' +%s)
          OLD=$(gh release list --repo "$REPO" --limit 200 --json tagName,isPrerelease,createdAt \
            | jq -r --argjson cutoff "$CUTOFF" \
                '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")) and ((.createdAt | fromdateiso8601) < $cutoff))] | .[].tagName')
          if [ -z "$OLD" ]; then
            echo "No nightly pre-releases older than 7 days to prune."
            exit 0
          fi
          echo "$OLD" | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Pruning old nightly release $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          done
