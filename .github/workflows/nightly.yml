name: Nightly

# Continuous-delivery channel for beta testers: every push to main produces
# a Docker image tagged `:nightly` and `:main-<short-sha>`, plus a rolling
# `nightly` GitHub Release with prebuilt binaries.
#
# Two consumer profiles:
#   - `docker pull ghcr.io/crewship-ai/crewship:nightly` for self-hosters
#     who want every merged commit
#   - GitHub Release `nightly` for testers who don't run Docker
#
# This workflow intentionally does NOT cut a semver tag. Tags drive the
# main release pipeline; nightly is "trunk binary, dated, no promises."

on:
  push:
    branches: [main]
    # Skip nightly rebuild for changes that can't affect the binary or
    # static export. Saves ~10 minutes per docs-only commit.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
  # Manual trigger for backfill or recovery from a bad nightly.
  workflow_dispatch: {}

permissions:
  contents: write       # to update the rolling `nightly` release
  packages: write       # GHCR push
  id-token: write       # cosign keyless

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26.4"

jobs:
  docker:
    name: Nightly Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      # Same rationale as release.yml: prefer the commit's own timestamp
      # over repo-update-time so two pushes within the same workflow window
      # don't get conflated.
      - name: Resolve commit timestamp
        id: meta
        run: echo "date=$(git log -1 --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.7.0

      - name: Build & push nightly image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/crewship:nightly
            ghcr.io/${{ github.repository_owner }}/crewship:main-${{ github.sha }}
          build-args: |
            VERSION=nightly-${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign nightly image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/crewship:nightly@${DIGEST}"
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/crewship:main-${{ github.sha }}@${DIGEST}"

  # Rolling pre-release with prebuilt binaries for non-Docker testers.
  # goreleaser handles all cross-arch build + signing; we run it in snapshot
  # mode so it doesn't try to push a tag, then upload the dist/ output to
  # the `nightly` release (recreated each run so it always reflects HEAD).
  binaries:
    name: Nightly binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      # Version-less: pnpm/action-setup reads `packageManager` from
      # package.json. See release.yml for the rationale.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "build-time-placeholder"
          # Same NEXT_PUBLIC_* baking pattern as release.yml. The
          # nightly channel uses "nightly-<sha>" as its version string;
          # sentry.client.config's classifyEnv() maps that prefix into
          # the "beta" environment, keeping nightly noise out of the
          # production Sentry view while still surfacing it alongside
          # the beta-channel events maintainers actually watch.
          #
          # SENTRY_DSN_FRONTEND (not SENTRY_DSN) routes to the
          # `crewship-frontend` Sentry project; see release.yml for
          # the per-platform rationale and scripts/sentry-bootstrap.sh
          # for the secret mapping.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          NEXT_PUBLIC_CREWSHIP_VERSION: nightly-${{ github.sha }}

      - name: Copy static export for embedding
        run: rm -rf web/out && cp -r out web/out

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.7.0

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          # Match release.yml pin; `~> v2` allows v3 once released.
          version: "v2.6.1"
          # --snapshot: skip tag validation; --skip=publish,homebrew: do NOT
          # skip sign — nightly artifacts get the same cosign keyless
          # provenance as tagged releases so testers can `cosign verify-blob`
          # before installing. We still skip publish (we upload via gh
          # release ourselves) and homebrew (no formula bump on nightly).
          args: release --snapshot --clean --skip=publish,homebrew
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # goreleaser's `signs:` block uses the GitHub Actions OIDC token to
          # request a Fulcio short-lived cert (keyless cosign). The token is
          # injected automatically because the workflow has `id-token: write`.

      # Sign the checksums file out-of-band so testers can verify the
      # archives transitively (cosign verify-blob → checksums.txt → sha256
      # of each tarball). goreleaser's per-archive signing is already on via
      # the `signs:` block, but we sign checksums.txt explicitly here so a
      # single-shot `curl + cosign verify-blob` is enough to validate.
      - name: Sign checksums.txt
        if: hashFiles('dist/checksums.txt') != ''
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      # Rolling pre-release: delete and recreate to ensure assets reflect HEAD.
      # gh release delete is idempotent enough — if the release doesn't exist
      # yet (first nightly), --cleanup-tag is a no-op.
      - name: Replace rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          # Compose notes after deletion so failures from gh delete don't strand
          # an in-progress release.
          NOTES="Rolling pre-release built from main @ ${GITHUB_SHA:0:7}.

          **Not for production.** Use a tagged release for stable workloads.
          Docker: \`docker pull ghcr.io/${{ github.repository_owner }}/crewship:nightly\`"
          gh release create nightly \
            --prerelease \
            --title "Nightly (main @ ${GITHUB_SHA:0:7})" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA" \
            dist/*.tar.gz dist/*.zip dist/checksums.txt dist/*.sig dist/*.pem 2>/dev/null || \
          gh release create nightly \
            --prerelease \
            --title "Nightly (main @ ${GITHUB_SHA:0:7})" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA" \
            $(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'checksums.txt' -o -name '*.sig' -o -name '*.pem' \) | tr '\n' ' ')
