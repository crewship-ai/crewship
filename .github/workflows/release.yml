name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC (CRE-122)

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26.5"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # 45 (was 30): headroom for Apple notarization when the MACOS_* secrets
    # are set — the notarize pipe waits on up to four darwin binaries
    # (2 builds x 2 arches), each typically 1-5 min at Apple's side.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # -- Build Next.js static export (required for embed.FS) --
      # Version-less: pnpm/action-setup reads the `packageManager`
      # field from package.json. Passing an explicit `version:`
      # alongside packageManager errors out with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      # -- Resolve tag for the static bundle's Sentry release/environment --
      # The same value is read by the Go side from -X main.version in
      # goreleaser; doing this here too means the frontend Release tag in
      # Sentry matches the backend's Release tag without a second source
      # of truth (which would drift the day someone re-tags a hotfix).
      - name: Resolve release tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "build-time-placeholder"
          # NEXT_PUBLIC_* envs are baked into the static bundle at build
          # time. Empty fallback means a PR build from a fork (no secret
          # access) produces a bundle with Sentry init no-op'd — the
          # same defense-in-depth as the Go side.
          #
          # SENTRY_DSN_FRONTEND (not SENTRY_DSN) routes the embedded
          # web UI's events to the `crewship-frontend` Sentry project,
          # not the Go-backend project. Per-platform projects let us
          # quota-cap and tag separately; see scripts/sentry-bootstrap.sh
          # for the project ↔ secret mapping.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          NEXT_PUBLIC_CREWSHIP_VERSION: ${{ steps.meta.outputs.version }}

      - name: Copy static export for embedding
        run: rm -rf web/out && cp -r out web/out

      # -- GoReleaser --
      # cache: true reuses module + build cache across releases keyed on
      # go.sum; on the ubuntu-latest hosted runner this cuts setup-go from
      # ~45s (cold module download for ~80 modules) to <2s.
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Install syft for SBOM generation (CRE-122).
      # Pin to a SHA matching v0.20.7 so a retargeted tag cannot redirect
      # the action binary; release artifacts now carry both the tag-as-comment
      # AND the immutable commit SHA (the latter is what GitHub actually fetches).
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.38.0

      # Install cosign for keyless release signing (CRE-122).
      # SHA-pinned to v3.10.0 (same supply-chain rationale as the syft step
      # above). Cosign version is pinned at the action's input level so the
      # same git tag always produces the same signature chain.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      # Materialize the deb/rpm signing key from the GPG_SIGNING_KEY secret, if
      # configured (#932). CONDITIONAL: when the secret is absent the packages
      # are simply unsigned (GPG_KEY_PATH stays empty → nfpm skips signing), so
      # a fork or a not-yet-provisioned repo still releases. See packaging/SIGNING.md.
      - name: Prepare package signing key (if configured)
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          if [ -n "$GPG_SIGNING_KEY" ]; then
            printf '%s' "$GPG_SIGNING_KEY" | base64 -d > "$RUNNER_TEMP/crewship-signing.asc"
            echo "GPG_KEY_PATH=$RUNNER_TEMP/crewship-signing.asc" >> "$GITHUB_ENV"
            echo "deb/rpm signing enabled"
          else
            echo "::notice::GPG_SIGNING_KEY not set — deb/rpm packages will be UNSIGNED (see #932)"
          fi

      # -- Supply-chain CVE gate (completes CRE-122) --
      # goreleaser already generates the SBOM (syft) and signs keyless (cosign),
      # but nothing scanned the dependency tree — a Critical CVE could ship
      # signed. The gate is two-layered, and both layers fail the job BEFORE
      # goreleaser publishes anything:
      #
      #   1. Source scan (go.mod + pnpm-lock.yaml): catches npm-side Criticals
      #      in the embedded UI — JS deps never appear in the Go binary, so an
      #      artifact-only scan would miss them entirely.
      #   2. Built-artifact scan (below): a real snapshot build of the main
      #      binary, so the gate covers what actually ships — not just the
      #      checkout, which can diverge from the linked result.
      #
      # severity-cutoff=critical keeps the gate tight (High/Medium are reported,
      # not blocking) so a routine transitive High doesn't wedge every release;
      # tighten as the dependency tree is triaged. SHA-pinned like syft/cosign.
      - name: Grype CVE scan — source (go.mod + pnpm lockfile)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "."
          fail-build: true
          severity-cutoff: critical
          output-format: table

      # Single-target snapshot build of the full binary, purely as scan input.
      # Dependencies are identical across all builds and every GOOS/GOARCH
      # (one shared go.mod, no per-target deps), so ONE linux/amd64 binary is
      # a sufficient dependency-CVE gate for the whole matrix — building all
      # targets twice would roughly double release time for no extra signal.
      # goreleaser OSS has no publish-only mode, hence build-scan-release
      # rather than release-scan-publish. Reuses the setup-go cache above and
      # warms the Go build cache for the full release build below.
      - name: Build snapshot binary for artifact scan
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "v2.6.1"
          args: build --clean --snapshot --single-target --id crewship

      # Grype reads the Go module list embedded in the compiled binary
      # (debug/buildinfo), so scanning dist/ gates the built artifact itself.
      # `release --clean` below wipes dist/ first, so the snapshot binary can
      # never leak into the published release.
      - name: Grype CVE scan — built artifact (gate on Critical)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          path: "dist"
          fail-build: true
          severity-cutoff: critical
          output-format: table

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          # Pin to a specific v2 minor — `~> v2` allows v3 once released,
          # and goreleaser v3 has breaking config changes.
          version: "v2.6.1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Empty fallback means an unconfigured secret produces a binary
          # with telemetry disabled at the link level — safer than failing
          # the release on a missing secret.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # nfpm reads the signing-key passphrase from NFPM_<ID>_PASSPHRASE
          # (nfpms id = "packages"). Empty when the key has no passphrase.
          NFPM_PACKAGES_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
          # macOS code signing + notarization (see notarize: in
          # .goreleaser.yml and packaging/SIGNING.md). CONDITIONAL: when
          # MACOS_SIGN_P12 is unset the notarize pipe disables itself and
          # darwin binaries ship unsigned — same fail-open pattern as the
          # GPG key above.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

  # Multi-arch Docker image published to GHCR alongside the binary release.
  # Runs in parallel with `release` because the two share no artifacts — the
  # Dockerfile builds frontend + backend itself rather than consuming
  # goreleaser output, which keeps the pipelines independent (a goreleaser
  # failure shouldn't block the container, and vice versa).
  #
  # Tags published per release:
  #   ghcr.io/crewship-ai/crewship:vX.Y.Z          — always
  #   ghcr.io/crewship-ai/crewship:vX.Y            — always
  #   ghcr.io/crewship-ai/crewship:latest          — only on non-prerelease tags
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing via GitHub OIDC
    steps:
      # fetch-depth: 0 so `git log` can read the tag's commit timestamp.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set image metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          # vX.Y series tag for users pinning to a major.minor line.
          MAJMIN=$(echo "$TAG" | sed -E 's/^(v[0-9]+\.[0-9]+).*/\1/')
          echo "majmin=${MAJMIN}" >> "$GITHUB_OUTPUT"

          # Commit timestamp of the tagged commit — not
          # `github.event.repository.updated_at`, which reflects ANY recent
          # repo push (docs, branches) and can drift between re-runs of the
          # same tag. ISO-8601 with timezone keeps it sortable + cosign-friendly.
          BUILD_DATE=$(git log -1 --format=%cI "$GITHUB_SHA")
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          # `:latest` only on clean releases. Pre-release tags (v0.1.0-beta.1,
          # v0.1.0-rc.1) must not move `:latest` or `docker pull crewship:latest`
          # would silently deliver beta to users who expect stable.
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute tag list
        id: tags
        run: |
          BASE="ghcr.io/${{ github.repository_owner }}/crewship"
          # Always publish the full version tag (v1.2.3 / v1.2.3-beta.1).
          # The majmin alias (v1.2) and the `latest` rolling tag are only
          # emitted for stable releases — moving a stable-looking alias
          # onto a beta/rc image would silently downgrade everyone pinned
          # to v1.2 the next time they pulled. CodeRabbit caught this.
          {
            echo "list<<EOF"
            echo "${BASE}:${{ steps.meta.outputs.version }}"
            if [ "${{ steps.meta.outputs.is_stable }}" = "true" ]; then
              echo "${BASE}:${{ steps.meta.outputs.majmin }}"
              echo "${BASE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          # SENTRY_DSN is sourced from secrets.* via an interpolation; the
          # docker/build-push-action does NOT expose it as a Docker `secret`
          # because it has to be baked into the binary via ldflags at compile
          # time, not mounted at runtime. Empty fallback keeps PR builds and
          # forks (which don't see secrets) working.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.build_date }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          # GitHub Actions cache for buildx — survives across runs and cuts
          # repeated layer rebuilds (pnpm install, go mod download) to seconds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cosign keyless: signs the image using the workflow's OIDC identity, so
      # the resulting attestation can be verified with `cosign verify` without
      # any pre-shared key. Matches the binary signing flow.
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.tags.outputs.list }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"
