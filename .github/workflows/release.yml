name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC (CRE-122)

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # -- Build Next.js static export (required for embed.FS) --
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "build-time-placeholder"

      - name: Copy static export for embedding
        run: rm -rf web/out && cp -r out web/out

      # -- GoReleaser --
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # Install syft for SBOM generation (CRE-122).
      # Pin to a specific tag so release artifacts are reproducible across runs.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.20.7
        with:
          syft-version: v1.38.0

      # Install cosign for keyless release signing (CRE-122).
      # Pin to a specific action release AND a specific cosign version so
      # the same git tag always produces the same signature chain.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.0
        with:
          cosign-release: v2.7.0

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
