name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC (CRE-122)

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # -- Build Next.js static export (required for embed.FS) --
      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "build-time-placeholder"

      - name: Copy static export for embedding
        run: rm -rf web/out && cp -r out web/out

      # -- GoReleaser --
      # cache: true reuses module + build cache across releases keyed on
      # go.sum; on the ubuntu-latest hosted runner this cuts setup-go from
      # ~45s (cold module download for ~80 modules) to <2s.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Install syft for SBOM generation (CRE-122).
      # Pin to a SHA matching v0.20.7 so a retargeted tag cannot redirect
      # the action binary; release artifacts now carry both the tag-as-comment
      # AND the immutable commit SHA (the latter is what GitHub actually fetches).
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.38.0

      # Install cosign for keyless release signing (CRE-122).
      # SHA-pinned to v3.10.0 (same supply-chain rationale as the syft step
      # above). Cosign version is pinned at the action's input level so the
      # same git tag always produces the same signature chain.
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.7.0

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
