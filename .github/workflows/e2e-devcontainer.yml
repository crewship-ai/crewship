name: E2E Devcontainer

# Heavy end-to-end provisioning test — pulls real base images and feature
# artifacts from ghcr.io, builds a sample crew through the full seed +
# provision flow, asserts cache + container state. ~8-15 min, rate-limited
# by ghcr.io for anonymous requests.
#
# Deliberately NOT on every PR push: in practice it caught infra flakes
# (rate limits, ghcr.io 5xx) far more often than real regressions, and a
# 15-minute CI gate scares people away from small commits. The unit tests
# in internal/devcontainer + internal/api/crew_provisioning_gc_test.go
# cover the logic; this workflow is the live-fire sanity check.
#
# Run manually before merging anything that touches devcontainer or
# provisioning code:
#
#     gh workflow run e2e-devcontainer.yml --ref <branch>
#
# Also runs nightly at 02:30 UTC against main.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 2 * * *" # nightly 02:30 UTC

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  e2e-devcontainer:
    name: E2E Devcontainer Provisioning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build sidecar + CLI
        run: |
          make build:sidecar
          go build -o crewship ./cmd/crewship

      - name: Generate ephemeral test secrets
        # Generated per-run rather than hard-coded so:
        #   1. Nothing in the repo trips the Gitleaks high-entropy scanner.
        #   2. Each run starts from a clean cryptographic slate (no
        #      cross-run state via accidentally-shared keys).
        # Both vars are scoped to the GitHub Actions $GITHUB_ENV file, so
        # subsequent steps inherit them automatically.
        run: |
          {
            echo "NEXTAUTH_SECRET=$(openssl rand -hex 32)"
            echo "ENCRYPTION_KEY=$(openssl rand -hex 32)"
          } >> "$GITHUB_ENV"

      - name: Start dev server in background
        env:
          # CI runner can't write to /var/lib/crewship (default); redirect
          # state + storage + logs into the workspace.
          CREWSHIP_STORAGE_BASE_PATH: ${{ github.workspace }}/.crewship-data
          CREWSHIP_LOG_PATH: ${{ github.workspace }}/.crewship-logs
          CREWSHIP_BOLT_PATH: ${{ github.workspace }}/.crewship-data/state.db
          DATABASE_URL: file:${{ github.workspace }}/.crewship-data/crewship.db
          CREWSHIP_NEXTJS_URL: http://localhost:8080
          CREWSHIP_SKIP_SIDECAR: "1"
          # NEXTAUTH_SECRET (server only mounts /api/* when JWTSecret is set
          # — without this /healthz responds but bootstrap 404s) and
          # ENCRYPTION_KEY (required by internal/encryption for credential
          # seed) come from $GITHUB_ENV via the previous step.
        run: |
          mkdir -p "$CREWSHIP_STORAGE_BASE_PATH" "$CREWSHIP_LOG_PATH"
          ./crewship start >/tmp/crewship.log 2>&1 &
          echo $! > /tmp/crewship.pid
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://localhost:8080/healthz"; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start" >&2
          cat /tmp/crewship.log >&2
          exit 1

      - name: Bootstrap admin + CLI token
        env:
          CREWSHIP_SERVER: http://localhost:8080
        run: ./crewship seed --skip-issues --server "$CREWSHIP_SERVER"

      - name: Run E2E devcontainer test
        run: bash scripts/e2e-devcontainer-test.sh
        env:
          CREWSHIP_SERVER: http://localhost:8080
          CREWSHIP: ./crewship
          CREWSHIP_DB: ${{ github.workspace }}/.crewship-data/crewship.db

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/crewship.log || true

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/crewship.pid ] && kill "$(cat /tmp/crewship.pid)" 2>/dev/null || true
