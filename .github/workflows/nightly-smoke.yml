name: Nightly Smoke

# Runs immediately after nightly.yml publishes a fresh per-run
# `nightly-<date>-r<run_number>` pre-release (#895 — the repo has
# immutable releases enabled, so the old rolling `nightly` tag name is
# burned for good; see #894). The release smoke-test.yml is gated on
# `release: published` with strict tag-name assertions (it expects
# v-prefixed semver), so it does not cover the nightly channel cleanly.
# This workflow is the nightly-specific equivalent: it resolves the
# pre-release the triggering Nightly run published, pulls its archive,
# checks it boots, talks to its own health endpoint, and that the
# cosign signature on checksums.txt verifies.
#
# A red check here means the most recent main commit produced a binary
# that beta testers shouldn't install. The signal to the maintainer is
# "investigate that commit before pointing anyone at nightly," not "yank
# the release" — nightly is explicitly disposable.

on:
  workflow_run:
    workflows: ["Nightly"]
    types: [completed]
  # Manual re-run for triage after a transient flake.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-smoke
  cancel-in-progress: true

jobs:
  binary:
    name: Nightly binary smoke
    # Skip when the triggering Nightly run itself failed — no point
    # exercising a binary that never published. Always run on
    # workflow_dispatch (no triggering run to inspect).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      - name: Resolve and download nightly archive + checksums + signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Route github expressions through env so the shell never
          # interpolates them inline. CodeQL js/actions/code-injection
          # flags ${{ github.* }} in run: blocks even though these
          # values are not attacker-controllable in this workflow
          # (PR title / branch name don't reach github.repository, and
          # workflow_run.head_sha comes from Nightly, which only runs
          # on pushes to main). Matches the pattern PR #483 landed in
          # migration-lint.yml.
          REPO: ${{ github.repository }}
          # Empty on workflow_dispatch — the resolve step falls back to
          # the newest nightly pre-release for manual triage runs.
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          # Resolve WHICH per-run pre-release to smoke (#895 replaced
          # the rolling `nightly` tag with immutable per-run tags).
          # workflow_run gives us the exact commit the triggering
          # Nightly built, so we pin the smoke verdict to THAT release
          # rather than "newest" — a concurrent later publish must not
          # let this run report green/red for the wrong artifact. On
          # workflow_dispatch (manual triage) there is no triggering
          # run, so newest wins.
          #
          # Defense-in-depth: only tags matching the exact shape
          # nightly.yml mints are eligible, and the tag is regex-gated
          # again before use — a maintainer-created release with an
          # odd name can neither be selected nor smuggle shell
          # metacharacters into the commands below.
          TAG=$(gh api "repos/$REPO/releases?per_page=30" --jq '
            [ .[]
              | select(.prerelease == true)
              | select(.tag_name | test("^nightly-[0-9]{8}-r[0-9]+$"))
              | select((env.TARGET_SHA == "") or (.target_commitish == env.TARGET_SHA))
            ] | sort_by(.created_at) | reverse | (first // empty) | .tag_name')
          if [ -z "${TAG:-}" ]; then
            if [ -n "${TARGET_SHA:-}" ]; then
              echo "::error::no nightly-* pre-release targets ${TARGET_SHA} — the triggering Nightly run reported success but its publish step produced nothing this smoke can verify."
            else
              echo "::error::no nightly-* pre-releases exist — run the Nightly workflow first."
            fi
            exit 1
          fi
          case "$TAG" in
            nightly-*) ;;
            *) echo "::error::resolved tag '$TAG' escaped the nightly-* filter — refusing to proceed"; exit 1 ;;
          esac
          echo "Resolved nightly release: $TAG"
          echo "NIGHTLY_TAG=$TAG" >> "$GITHUB_ENV"
          # Resolve the exact asset name from the Releases API instead
          # of post-download globbing. goreleaser publishes TWO archive
          # families per platform since #444 — crewship_<v>_… (the full
          # server binary this smoke boots) and crewship-cli_<v>_… (the
          # clionly build, which has no `start`) — so the pattern must
          # anchor on the server prefix; a bare *linux_amd64.tar.gz*
          # match is ambiguous and once picked the CLI archive. Within
          # the server family, exactly one match is expected: per-run
          # releases are immutable (assets can't be added after
          # publish), so >1 means the publish itself uploaded duplicate
          # server variants and 0 means a partial publish (create
          # succeeded, uploads died). Fail loudly on both rather than
          # validating whichever asset sorts first.
          mapfile -t MATCHES < <(gh release view "$TAG" \
            --repo "$REPO" \
            --json assets \
            --jq '.assets[].name | select(test("^crewship_.*_linux_amd64\\.tar\\.gz$"))')
          if [ "${#MATCHES[@]}" -eq 0 ]; then
            echo "::error::no crewship_ server linux_amd64 archive on release $TAG — partial publish? (create succeeded, asset upload died; immutable releases can't be repaired in place — delete the release and re-run Nightly)"
            exit 1
          fi
          if [ "${#MATCHES[@]}" -gt 1 ]; then
            echo "::error::expected exactly one crewship_ server linux_amd64 archive on release $TAG, got ${#MATCHES[@]}:"
            printf '  %s\n' "${MATCHES[@]}"
            echo "::error::nightly.yml uploaded duplicate server variants — fix the publish step."
            exit 1
          fi
          ARCHIVE="${MATCHES[0]}"
          echo "Resolved archive: $ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "$ARCHIVE" \
            --pattern 'checksums.txt' \
            --pattern 'checksums.txt.sig' \
            --pattern 'checksums.txt.pem'
          ls -la

      - name: Verify cosign signature on checksums.txt
        # PR #375 wired keyless cosign signing of checksums.txt into
        # nightly.yml. A missing or bad signature means either the
        # nightly publish didn't run sign-blob, or the bundle was
        # tampered with on GHCR / GitHub Releases. Either way, refuse
        # to trust the binary downstream.
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            --certificate-identity-regexp "https://github\\.com/$REPO/\\.github/workflows/nightly\\.yml@.*" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            checksums.txt

      - name: Verify SHA-256 of the archive
        # Mirrors scripts/install.sh — same exact-second-field awk match
        # so the smoke test fails for the same reasons a user install
        # would. Catches a tampered archive even if checksums.txt itself
        # verified cosign-clean. ARCHIVE comes from the API-resolved
        # name in the previous step (via $GITHUB_ENV) so we never rely
        # on shell glob ordering.
        run: |
          set -euo pipefail
          EXPECTED=$(awk -v a="$ARCHIVE" '$2==a {print $1; exit}' checksums.txt)
          if [ -z "$EXPECTED" ]; then
            echo "::error::checksum for ${ARCHIVE} missing from checksums.txt"
            exit 1
          fi
          ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::checksum mismatch for ${ARCHIVE}"
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi
          echo "checksum ok: $ACTUAL"

      - name: Extract archive
        run: |
          set -euo pipefail
          tar -xzf "$ARCHIVE"
          ls -la crewship
          # Packaging contract (#858): the full archive must ship the sidecar
          # + entrypoint.sh next to the binary (else `crewship start` refuses
          # to boot for a tarball install), AND the legal/docs files an
          # explicit goreleaser `files:` block would otherwise drop (an
          # Apache-2.0 binary without its LICENSE is a compliance bug). Assert
          # both classes so neither regression can recur silently.
          for f in crewship-sidecar entrypoint.sh; do
            if [ ! -f "$f" ]; then
              echo "::error::archive is missing '$f' — full archive must bundle the sidecar runtime (#858)"
              exit 1
            fi
          done
          for pat in 'LICENSE*' 'README*' 'CHANGELOG*'; do
            # shellcheck disable=SC2086
            if ! ls $pat >/dev/null 2>&1; then
              echo "::error::archive is missing $pat — explicit files: block dropped goreleaser's default docs/legal files (#858)"
              exit 1
            fi
          done
          echo "packaging ok: crewship + crewship-sidecar + entrypoint.sh + LICENSE/README/CHANGELOG"

      - name: Probe `crewship version`
        # Nightly uses a snapshot version (no semver tag), so we just
        # assert non-empty output that ISN'T the unldflagged "dev"
        # sentinel — `dev` would mean -X main.version never made it
        # into the build (release.yml does it via -ldflags, snapshot
        # mode in nightly.yml inherits the same goreleaser config).
        run: |
          set -euo pipefail
          OUT=$(./crewship version)
          echo "$OUT"
          if [ -z "$OUT" ]; then
            echo "::error::'crewship version' produced no output"
            exit 1
          fi
          if echo "$OUT" | grep -qx "dev"; then
            echo "::error::'crewship version' returned the 'dev' sentinel — ldflag injection broke"
            exit 1
          fi

      - name: Probe `crewship doctor --no-color`
        # Same contract as the release smoke: exit 0 unless a FAIL check
        # fires. WARN is acceptable on a fresh CI runner with no Docker.
        run: |
          set -euo pipefail
          ./crewship doctor --no-color

      - name: Probe `crewship --help`
        run: |
          set -euo pipefail
          OUT=$(./crewship --help)
          if ! echo "$OUT" | grep -qF "Available Commands"; then
            echo "::error::--help output missing 'Available Commands' section"
            exit 1
          fi

      - name: Probe health endpoint via `crewship start --no-docker`
        # Port 9091 instead of 9090 (release smoke uses 9090) so a
        # rare parallel run on the same runner pool doesn't collide.
        # The port is set via CREWSHIP_PORT — `crewship start` has no
        # --port flag (internal/config reads the env; the first live
        # run of this probe failed with "unknown flag: --port").
        #
        # NEXTAUTH_SECRET / ENCRYPTION_KEY are required at startup by
        # server.New() (since #375 — used to be a silent fall-back
        # which served unauthenticated traffic). Seeding deterministic
        # 64-hex-char throwaways here lets the probe actually reach
        # /api/health; without them the binary panics inside server
        # construction and the probe just times out — green check on a
        # broken build.
        env:
          NEXTAUTH_SECRET: "00000000000000000000000000000000000000000000000000000000deadbeef"
          ENCRYPTION_KEY: "11111111111111111111111111111111111111111111111111111111cafebabe"
          CREWSHIP_PORT: "9091"
          # No CREWSHIP_SKIP_SIDECAR here (#858 packaging fix): the archive now
          # bundles crewship-sidecar + entrypoint.sh next to the binary, so
          # `crewship start` autodetects them and boots exactly as a tarball
          # user's would. This probe therefore proves the archive is bootable
          # as-shipped — the property the skip flag used to paper over.
        shell: bash
        run: |
          set -euo pipefail
          (./crewship start --no-docker >/tmp/crewship-start.log 2>&1 || true) &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          STATUS=0
          for _ in $(seq 1 120); do
            if curl -sf --max-time 1 http://localhost:9091/api/health >/dev/null 2>&1; then
              STATUS=200
              break
            fi
            sleep 0.25
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::health endpoint did not return 200 within 30s"
            echo "---- crewship start log ----"
            cat /tmp/crewship-start.log || true
            exit 1
          fi
          echo "health endpoint ok"

  docker:
    name: Nightly Docker smoke
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull nightly image
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          docker pull "ghcr.io/$OWNER/crewship:nightly"

      - name: Probe `crewship version` inside container
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          OUT=$(docker run --rm "ghcr.io/$OWNER/crewship:nightly" version)
          echo "$OUT"
          if [ -z "$OUT" ] || echo "$OUT" | grep -qx "dev"; then
            echo "::error::container 'crewship version' missing or returned 'dev' sentinel"
            exit 1
          fi
