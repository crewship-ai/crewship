name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  # ── Frontend: lint, typecheck, build ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "ci-build-secret-not-real"

      - name: Upload static export
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ── Frontend tests (Vitest) ──
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Test
        run: pnpm test

  # ── Go: vet, build, test (always runs — this is a Go-first project) ──
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # web/embed.go requires web/out/ to exist for go:embed.
      # Create a minimal stub so vet/build/test pass without the full frontend.
      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/crewship

      - name: Go test
        run: go test ./... -count=1

  # ── Go lint: golangci-lint (CRE-122 Phase 1 — conservative ruleset) ──
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # Same embed stub requirement as the go job
      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ── Full binary build (push to main only — verifies embed works) ──
  binary:
    name: Binary Build
    runs-on: ubuntu-latest
    needs: [frontend, go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download static export
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: web/out

      # Fallback stub if artifact wasn't available (quota limit)
      - name: Ensure embed directory exists
        run: |
          if [ ! -f web/out/index.html ]; then
            mkdir -p web/out && echo '<!doctype html>' > web/out/index.html
          fi

      - name: Build single binary with embedded frontend
        run: go build -o crewship ./cmd/crewship

      - name: Verify binary runs
        run: ./crewship version
