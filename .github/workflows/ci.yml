name: CI

on:
  # Manual re-trigger. Useful when the self-hosted runner was offline at
  # the time of the original push and the resulting run got stranded in
  # `queued` (verified failure mode during PR #235 — runner saturated,
  # PR's CI never got picked up before merge). With workflow_dispatch
  # the run can be re-queued from the Actions tab or via:
  #   gh workflow run ci.yml --ref <branch>
  # without needing an empty commit.
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    # Skip CI on changes that can't affect lint/typecheck/build/test:
    # docs (Mintlify-rendered, separate pipeline), markdown reference
    # files, license/notices files, the GitHub issue templates, and
    # the wireframe HTML mocks. Code changes that *also* touch these
    # paths still trigger CI because GitHub treats paths-ignore as
    # "trigger if ANY changed file is outside the ignore list".
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.claude/**'
      - '.factory/**'
      - '.cloud/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.claude/**'
      - '.factory/**'
      - '.cloud/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege. Individual jobs widen only when required.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  # ── Frontend: lint, typecheck, build ──
  frontend:
    name: Frontend
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Cache Next.js incremental build artifacts. actions/checkout cleans
      # the workspace each run (clean: true is the default), so .next/cache
      # would otherwise be cold every time and Turbopack would re-parse the
      # entire app — typically 60-90s wasted per push. Restore-keys fall
      # back to the most recent build with the same lockfile, which Next
      # then upgrades incrementally based on changed source files.
      - name: Cache .next build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "ci-build-secret-not-real"

      - name: Upload static export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ── Frontend tests (Vitest) ──
  frontend-test:
    name: Frontend Test
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Test
        run: pnpm test

  # ── Go: vet, build, test ──
  go:
    name: Go
    runs-on: [self-hosted, macos-arm64]
    # 10 min was tight: a cold module cache on the self-hosted runner pushes
    # vet+build+test past the limit (test alone is ~2 min, but cold compile of
    # every package plus cache-restore retries eats the rest). 20 min gives
    # slack without masking a real regression.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/crewship

      - name: Go test
        run: go test ./... -count=1

  # ── Go lint: golangci-lint ──
  go-lint:
    name: Go Lint
    runs-on: [self-hosted, macos-arm64]
    # 15 min, not 10: empirically setup-go-embed alone takes ~10 min on
    # the self-hosted MBA runner (verified across runs 25196471236 +
    # 25198805401, both with and without cache: true). Root cause not
    # yet identified — likely actions/setup-go downloading + extracting
    # the Go SDK on a slow workspace mount, or a network bottleneck
    # specific to this runner. The 10-min budget left zero headroom for
    # the actual lint step. 15 min keeps lint comfortably within budget
    # without papering over a real timeout regression.
    timeout-minutes: 15
    env:
      GOLANGCI_VERSION: v2.1.6
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Cache the golangci-lint binary itself — `go install` from source
      # adds ~30s per run and the resulting binary is fully determined by
      # (runner OS, Go version, golangci-lint version). Cache miss falls
      # through to the install step below.
      - name: Resolve GOPATH/bin
        id: gopath
        shell: bash
        run: echo "bin=$(go env GOPATH)/bin" >> "$GITHUB_OUTPUT"

      - name: Cache golangci-lint binary
        id: lint-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ steps.gopath.outputs.bin }}/golangci-lint
          key: golangci-${{ runner.os }}-go${{ env.GO_VERSION }}-${{ env.GOLANGCI_VERSION }}

      # Build golangci-lint from source with Go 1.26. Pre-built releases (up
      # to v2.1.6) ship with Go ≤1.24 and refuse to analyze code targeting a
      # newer language version. Costs ~30s on cache miss; removable once an
      # upstream release is built with Go 1.26+.
      - name: Install golangci-lint from source
        if: steps.lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_VERSION }}

      - name: Run golangci-lint
        run: ${{ steps.gopath.outputs.bin }}/golangci-lint run --timeout=5m ./...

  # ── Full binary build (push to main only — verifies embed works) ──
  #
  # Stays push-only to conserve runner minutes. The Go job already catches
  # compile errors; embed-path regressions are rare enough that post-merge
  # detection is acceptable for the budget.
  binary:
    name: Binary Build
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 10
    needs: [frontend, go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download static export
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: web/out

      - name: Build single binary with embedded frontend
        run: go build -o crewship ./cmd/crewship

      - name: Verify binary runs
        run: ./crewship version

  # NOTE: E2E Devcontainer Provisioning was moved out of the per-PR gate.
  # It pulls real base images + features from ghcr.io (slow, rate-limited)
  # and exercises the full seed+provision path — that's ~8-15 min of CI time
  # per push that, in practice, mostly catches infra flakes. It now lives in
  # `.github/workflows/e2e-devcontainer.yml`, triggered nightly + on demand
  # via `gh workflow run e2e-devcontainer.yml`.
