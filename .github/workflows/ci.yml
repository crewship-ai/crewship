name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  # ── Frontend: lint, typecheck, build ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "ci-build-secret-not-real"

      - name: Upload static export
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ── Frontend tests (Vitest) ──
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Test
        run: pnpm test

  # ── Go: vet, build, test (always runs — this is a Go-first project) ──
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # web/embed.go requires web/out/ to exist for go:embed.
      # Create a minimal stub so vet/build/test pass without the full frontend.
      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/crewship

      - name: Go test
        run: go test ./... -count=1

  # ── Go lint: golangci-lint (CRE-122 Phase 1 — conservative ruleset) ──
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # Same embed stub requirement as the go job
      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      # Install golangci-lint FROM SOURCE with our Go 1.26 toolchain.
      #
      # Pre-built golangci-lint releases (including v2.1.6) are compiled with
      # Go 1.24 or earlier, and the binary refuses to analyze code targeting
      # a newer Go version than its build ("Go language version go1.24 is
      # lower than the targeted Go version 1.26"). Building from source with
      # `go install` uses the Go toolchain provided by setup-go@v6, so the
      # resulting binary has matching language support.
      #
      # This costs ~30s extra per run versus the pre-built action, but is
      # the only reliable path until an upstream release is built with
      # Go 1.26+.
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        # Block scalar so the inner double-quotes reach the shell. Quoting
        # $(go env GOPATH) prevents word-splitting if GOPATH contains spaces
        # on a self-hosted runner. shellcheck SC2046.
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m ./...

  # ── Full binary build (push to main only — verifies embed works) ──
  binary:
    name: Binary Build
    runs-on: ubuntu-latest
    needs: [frontend, go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download static export
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: web/out

      # Fallback stub if artifact wasn't available (quota limit)
      - name: Ensure embed directory exists
        run: |
          if [ ! -f web/out/index.html ]; then
            mkdir -p web/out && echo '<!doctype html>' > web/out/index.html
          fi

      - name: Build single binary with embedded frontend
        run: go build -o crewship ./cmd/crewship

      - name: Verify binary runs
        run: ./crewship version

  # ── E2E: devcontainer provisioning smoke test ──
  #
  # Builds the CLI + sidecar, boots the server, and exercises the full
  # provisioning path end-to-end against a live Docker daemon. Gated to PR +
  # push to main because it pulls real base images and feature artifacts from
  # ghcr.io (slow, and rate-limited on anonymous requests).
  e2e-devcontainer:
    name: E2E Devcontainer Provisioning
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embed stub
        run: mkdir -p web/out && echo '<!doctype html>' > web/out/index.html

      - name: Build sidecar + CLI
        run: |
          make build:sidecar
          go build -o crewship ./cmd/crewship

      - name: Start dev server in background
        env:
          # CI runner can't write to /var/lib/crewship (default); redirect
          # state + storage + logs into the workspace.
          CREWSHIP_STORAGE_BASE_PATH: ${{ github.workspace }}/.crewship-data
          CREWSHIP_LOG_PATH: ${{ github.workspace }}/.crewship-logs
          CREWSHIP_BOLT_PATH: ${{ github.workspace }}/.crewship-data/state.db
          CREWSHIP_NEXTJS_URL: http://localhost:8080
          CREWSHIP_SKIP_SIDECAR: "1"
        run: |
          mkdir -p "$CREWSHIP_STORAGE_BASE_PATH" "$CREWSHIP_LOG_PATH"
          ./crewship start >/tmp/crewship.log 2>&1 &
          echo $! > /tmp/crewship.pid
          # Wait for readiness (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "http://localhost:8080/api/v1/features/catalog" \
               || [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/v1/features/catalog)" = "401" ]; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start" >&2
          cat /tmp/crewship.log >&2
          exit 1

      - name: Run E2E devcontainer test
        run: bash scripts/e2e-devcontainer-test.sh
        env:
          CREWSHIP_SERVER: http://localhost:8080
          CREWSHIP: ./crewship

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/crewship.log || true

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/crewship.pid ] && kill "$(cat /tmp/crewship.pid)" 2>/dev/null || true
