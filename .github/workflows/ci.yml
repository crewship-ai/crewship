name: CI

on:
  # Manual re-trigger. Useful for cases where the original push's run
  # got stranded in `queued` (GitHub-hosted runner pool saturated, rare
  # but observed during peak hours). With workflow_dispatch the run
  # can be re-queued from the Actions tab or via:
  #   gh workflow run ci.yml --ref <branch>
  # without needing an empty commit.
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    # Skip CI on changes that can't affect lint/typecheck/build/test:
    # docs (Mintlify-rendered, separate pipeline), markdown reference
    # files, license/notices files, the GitHub issue templates, and
    # the wireframe HTML mocks. Code changes that *also* touch these
    # paths still trigger CI because GitHub treats paths-ignore as
    # "trigger if ANY changed file is outside the ignore list".
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.claude/**'
      - '.factory/**'
      - '.cloud/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'
      - 'LICENSE'
      - 'THIRD-PARTY-NOTICES.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.claude/**'
      - '.factory/**'
      - '.cloud/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege. Individual jobs widen only when required.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26.4"

jobs:
  # ── Sentinel: reject leaked git merge-conflict markers ──
  #
  # Background (2026-05-21 incident): a literal `<<<<<<<` / `=======` /
  # `>>>>>>>` block landed inside a Go raw-string SQL query in
  # `internal/api/agent_config.go` and propagated to `main`. Go raw
  # strings don't parse their content so `go vet` / `golangci-lint` /
  # `gosec` all stayed green; the bug only surfaced as a runtime SQLite
  # "syntax error" on every `crewship ask` chat-resolve call. External
  # auditor caught it. This sentinel runs FIRST so a leaked marker fails
  # the whole CI pipeline immediately — cheaper signal than waiting for
  # downstream build / test / lint to maybe-find-it-maybe-not.
  #
  # Extension list is intentionally wide: Go raw strings, TS template
  # literals, MDX prose, YAML / JSON / SQL fixtures, shell scripts, and
  # Dockerfiles can all hide a marker that the language compiler /
  # parser accepts as valid syntax. If a new file extension lands in
  # the repo that could host an unparsed marker, extend this list.
  merge-conflict-markers:
    name: Reject leaked merge markers
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Sentinel grep
        run: |
          set -euo pipefail
          # Pattern: line-anchored marker tokens. Anchored to start-of-
          # line so a literal `<<<<<<<` written deliberately in prose
          # (e.g. a doc page explaining merge conflicts) doesn't trip
          # the check unless it sits at column 0 like a real marker.
          if git grep -nE '^(<<<<<<< |=======$|>>>>>>> )' -- \
              ':!*.bak' \
              '*.go' '*.ts' '*.tsx' '*.mdx' '*.md' \
              '*.yaml' '*.yml' '*.sql' '*.json' '*.py' '*.sh' \
              'Dockerfile' 'Dockerfile.*'; then
            echo ""
            echo "✗ Found one or more leaked git merge-conflict markers."
            echo "  Open the file(s) above, resolve the conflict, stage the result, and commit."
            echo "  (If the literal string is intentional — e.g. inside a doc explaining merge conflicts — move it off column 0 or wrap it in a code fence with leading whitespace.)"
            exit 1
          fi
          echo "✓ No leaked merge-conflict markers found."

  # ── Frontend: lint, typecheck, build ──
  frontend:
    needs: [merge-conflict-markers]
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Cache Next.js incremental build artifacts. actions/checkout cleans
      # the workspace each run (clean: true is the default), so .next/cache
      # would otherwise be cold every time and Turbopack would re-parse the
      # entire app — typically 60-90s wasted per push. Restore-keys fall
      # back to the most recent build with the same lockfile, which Next
      # then upgrades incrementally based on changed source files.
      - name: Cache .next build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "ci-build-secret-not-real"

      - name: Upload static export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ── Frontend tests (Vitest) ──
  frontend-test:
    needs: [merge-conflict-markers]
    name: Frontend Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Test
        run: pnpm test

  # ── Go: vet, build, test ──
  go:
    needs: [merge-conflict-markers]
    name: Go
    runs-on: ubuntu-latest
    # 15 min: GitHub-hosted ubuntu-latest setup-go is consistently
    # fast (cached module download via the action's built-in cache,
    # which we now re-enable in setup-go-embed). Real work
    # (vet+build+test) is ~75s on this codebase; the rest of the
    # budget is buffer for first-run cache miss + Go SDK download
    # (one-time per runner image cycle).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/crewship

      - name: Go test
        # -timeout 15m: the internal/api package suite has grown past
        # the Go default 10m (PR-A native memory tools + PR-D ephemeral
        # lifecycle + PR-E PERSONA all landed test fixtures). Three
        # consecutive runs on 290b8606 hit the 10m panic on different
        # tests (TestAuthGoogle_*, TestRequireWorkspace_*,
        # TestSweepStuckQueued), indicating cumulative-time pressure
        # rather than a single slow test. Job-level timeout-minutes:15
        # already gives the runner enough wall-clock; this aligns the
        # go test -timeout to match.
        run: go test ./... -count=1 -timeout 15m

  # ── Go lint: golangci-lint ──
  go-lint:
    needs: [merge-conflict-markers]
    name: Go Lint
    runs-on: ubuntu-latest
    # 15 min: same calculus as the Go job above. golangci-lint
    # itself runs in ~30s with the cached binary; the rest of the
    # budget is one-time cold-cache buffer.
    timeout-minutes: 15
    env:
      GOLANGCI_VERSION: v2.1.6
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Cache the golangci-lint binary itself — `go install` from source
      # adds ~30s per run and the resulting binary is fully determined by
      # (runner OS, Go version, golangci-lint version). Cache miss falls
      # through to the install step below.
      - name: Resolve GOPATH/bin
        id: gopath
        shell: bash
        run: echo "bin=$(go env GOPATH)/bin" >> "$GITHUB_OUTPUT"

      - name: Cache golangci-lint binary
        id: lint-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.gopath.outputs.bin }}/golangci-lint
          key: golangci-${{ runner.os }}-go${{ env.GO_VERSION }}-${{ env.GOLANGCI_VERSION }}

      # Build golangci-lint from source with Go 1.26. Pre-built releases (up
      # to v2.1.6) ship with Go ≤1.24 and refuse to analyze code targeting a
      # newer language version. Costs ~30s on cache miss; removable once an
      # upstream release is built with Go 1.26+.
      - name: Install golangci-lint from source
        if: steps.lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_VERSION }}

      - name: Run golangci-lint
        run: ${{ steps.gopath.outputs.bin }}/golangci-lint run --timeout=5m ./...

  # ── Full binary build (push to main only — verifies embed works) ──
  #
  # Stays push-only to conserve runner minutes. The Go job already catches
  # compile errors; embed-path regressions are rare enough that post-merge
  # detection is acceptable for the budget.
  binary:
    name: Binary Build
    runs-on: ubuntu-latest
    # 15 min: ubuntu-latest setup-go is consistent enough that 10
    # would usually do, but we keep a small buffer for first-run
    # cache miss on the Go SDK download.
    timeout-minutes: 15
    needs: [frontend, go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Wipe the embed dir before pulling the artifact so a stale checkout
      # copy of web/out cannot satisfy the embed directive if the
      # download-artifact step fails (or the artifact never existed).
      # Without this + a non-best-effort download, Binary Build can go
      # green while embedding whatever stale bytes the checkout left
      # behind — defeating the job's purpose of validating the freshly
      # built frontend bundle.
      - name: Clean embed directory
        run: rm -rf web/out

      - name: Download static export
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nextjs-static-export
          path: web/out

      - name: Build single binary with embedded frontend
        run: go build -o crewship ./cmd/crewship

      - name: Verify binary runs
        run: ./crewship version

  # NOTE: E2E Devcontainer Provisioning was moved out of the per-PR gate.
  # It pulls real base images + features from ghcr.io (slow, rate-limited)
  # and exercises the full seed+provision path — that's ~8-15 min of CI time
  # per push that, in practice, mostly catches infra flakes. It now lives in
  # `.github/workflows/e2e-devcontainer.yml`, triggered nightly + on demand
  # via `gh workflow run e2e-devcontainer.yml`.
