name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default least-privilege. Individual jobs widen only when required.
permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"

jobs:
  # ── Frontend: lint, typecheck, build ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build static export
        run: pnpm build
        env:
          NEXTAUTH_SECRET: "ci-build-secret-not-real"

      - name: Upload static export
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: out/
          retention-days: 1

  # ── Frontend tests (Vitest) ──
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Test
        run: pnpm test

  # ── Go: vet, build, test ──
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/crewship

      - name: Go test
        run: go test ./... -count=1

  # ── Go lint: golangci-lint ──
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      # Build golangci-lint from source with Go 1.26. Pre-built releases (up
      # to v2.1.6) ship with Go ≤1.24 and refuse to analyze code targeting a
      # newer language version. Costs ~30s; removable once an upstream
      # release is built with Go 1.26+.
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run --timeout=5m ./...

  # ── Full binary build (push to main only — verifies embed works) ──
  #
  # Stays push-only to conserve runner minutes. The Go job already catches
  # compile errors; embed-path regressions are rare enough that post-merge
  # detection is acceptable for the budget.
  binary:
    name: Binary Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend, go]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download static export
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nextjs-static-export
          path: web/out

      - name: Build single binary with embedded frontend
        run: go build -o crewship ./cmd/crewship

      - name: Verify binary runs
        run: ./crewship version

  # ── E2E: devcontainer provisioning smoke test ──
  #
  # Builds the CLI + sidecar, boots the server, and exercises the full
  # provisioning path end-to-end against a live Docker daemon. Gated to PR +
  # push to main because it pulls real base images and feature artifacts from
  # ghcr.io (slow, and rate-limited on anonymous requests).
  e2e-devcontainer:
    name: E2E Devcontainer Provisioning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-go-embed
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build sidecar + CLI
        run: |
          make build:sidecar
          go build -o crewship ./cmd/crewship

      - name: Start dev server in background
        env:
          # CI runner can't write to /var/lib/crewship (default); redirect
          # state + storage + logs into the workspace.
          CREWSHIP_STORAGE_BASE_PATH: ${{ github.workspace }}/.crewship-data
          CREWSHIP_LOG_PATH: ${{ github.workspace }}/.crewship-logs
          CREWSHIP_BOLT_PATH: ${{ github.workspace }}/.crewship-data/state.db
          # SQLite DB — also redirected, and exported so the e2e script can
          # read the same file the server is writing to.
          DATABASE_URL: file:${{ github.workspace }}/.crewship-data/crewship.db
          CREWSHIP_NEXTJS_URL: http://localhost:8080
          CREWSHIP_SKIP_SIDECAR: "1"
          # Required — server only mounts /api/* routes (including
          # /api/v1/bootstrap) when JWTSecret is set. Without this, /healthz
          # still responds (base mux) but the bootstrap step 404s. Test-only
          # value; no production secret material.
          NEXTAUTH_SECRET: ci-e2e-test-secret-not-for-production
        run: |
          mkdir -p "$CREWSHIP_STORAGE_BASE_PATH" "$CREWSHIP_LOG_PATH"
          ./crewship start >/tmp/crewship.log 2>&1 &
          echo $! > /tmp/crewship.pid
          # Wait for readiness (up to 60s) — use /healthz (no auth required).
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null "http://localhost:8080/healthz"; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start" >&2
          cat /tmp/crewship.log >&2
          exit 1

      - name: Bootstrap admin + CLI token
        env:
          CREWSHIP_SERVER: http://localhost:8080
        run: |
          # `crewship seed` bootstraps admin@crewship.ai and writes the CLI
          # auth token to the config file that subsequent `crewship crew ...`
          # commands require. --skip-issues cuts the Linear-style issue seed.
          ./crewship seed --skip-issues --server "$CREWSHIP_SERVER"

      - name: Run E2E devcontainer test
        run: bash scripts/e2e-devcontainer-test.sh
        env:
          CREWSHIP_SERVER: http://localhost:8080
          CREWSHIP: ./crewship
          CREWSHIP_DB: ${{ github.workspace }}/.crewship-data/crewship.db

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/crewship.log || true

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/crewship.pid ] && kill "$(cat /tmp/crewship.pid)" 2>/dev/null || true
