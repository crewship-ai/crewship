# Crewship -- Production Docker Compose (single binary)
# Usage: docker compose -f docker/docker-compose.prod.yml up -d
# Requires: .env file in project root (see .env.example)
#
# Default: SQLite (zero deps, embedded in crewship binary)
# Optional: Uncomment postgres service for multi-user deployments

services:
  crewship:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: crewship
    restart: unless-stopped
    ports:
      - "${CREWSHIP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/crewship.db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CREWSHIP_CONTAINER_PROVIDER: docker
      CREWSHIP_STORAGE_PROVIDER: localfs
      CREWSHIP_STATE_PROVIDER: bbolt
      CREWSHIP_STORAGE_BASE_PATH: /var/lib/crewship
      CREWSHIP_LOG_PATH: /var/log/crewship
    volumes:
      - crewship-data:/var/lib/crewship
      - crewship-logs:/var/log/crewship
      - crewship-db:/data
      # V-08: Use a Docker socket proxy instead of mounting the raw Docker socket.
      # See https://github.com/Tecnativa/docker-socket-proxy for setup.
      # Raw mount (NOT recommended for production):
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # TODO: replace with socket proxy in production
    networks:
      - crewship-internal
      - crewship-agents
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Uncomment for PostgreSQL mode:
  # postgres:
  #   image: postgres:18-alpine
  #   container_name: crewship-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-crewship}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  #     POSTGRES_DB: ${POSTGRES_DB:-crewship}
  #   volumes:
  #     - crewship-pgdata:/var/lib/postgresql/data
  #   networks:
  #     - crewship-internal
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crewship}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  crewship-data:
  crewship-logs:
  crewship-db:
  # crewship-pgdata:

networks:
  crewship-internal:
    name: crewship-internal
    internal: true
  crewship-agents:
    name: crewship-agents
    internal: true
