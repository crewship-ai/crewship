# Crewship -- Production Docker Compose
# Usage: docker compose -f docker/docker-compose.prod.yml up -d
# Requires: .env file in project root (see .env.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: crewship-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crewship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crewship}
    volumes:
      - crewship-pgdata:/var/lib/postgresql/data
    networks:
      - crewship-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crewship}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: crewship-nextjs
    restart: unless-stopped
    ports:
      - "${NEXTJS_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crewship}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crewship}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CREWSHIPD_SOCKET: /tmp/crewship.sock
    volumes:
      - crewship-socket:/tmp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crewship-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  crewshipd:
    build:
      context: ..
      dockerfile: docker/crewshipd/Dockerfile
    container_name: crewship-crewshipd
    restart: unless-stopped
    environment:
      CREWSHIP_LISTEN_ADDR: unix:///tmp/crewship.sock
      CREWSHIP_HTTP_ADDR: :8080
      CREWSHIP_CONTAINER_PROVIDER: docker
      CREWSHIP_STORAGE_PROVIDER: localfs
      CREWSHIP_STATE_PROVIDER: bbolt
      CREWSHIP_DATA_DIR: /var/lib/crewship
      CREWSHIP_LOG_DIR: /var/log/crewship
      CREWSHIP_NEXTJS_URL: http://nextjs:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
    volumes:
      - crewship-socket:/tmp
      - crewship-data:/var/lib/crewship
      - crewship-logs:/var/log/crewship
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crewship-internal
      - crewship-agents
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  crewship-pgdata:
  crewship-socket:
  crewship-data:
  crewship-logs:

networks:
  crewship-internal:
    name: crewship-internal
  crewship-agents:
    name: crewship-agents
    internal: true
