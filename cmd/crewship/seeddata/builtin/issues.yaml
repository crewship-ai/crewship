issues:
    - crew_slug: engineering
      assignee: alex
      title: Coordinate the Harborlight launch page — delegate copy and build
      description: |-
        We're shipping a launch page for Harborlight, the crew's demo product
        (a status dashboard for self-hosted services).

        Plan the work, then delegate two subtasks to your crew:
        1. Delegate to Sam: write the launch copy — a headline, three feature
           bullets, and a short FAQ. Save it to /crew/shared/harborlight/copy.md.
        2. Delegate to Robin: build a single-file landing page at
           /crew/shared/harborlight/index.html with clean semantic HTML/CSS and
           placeholder sections for the copy.

        When both subtasks come back, review the results, merge Sam's copy into
        Robin's page, and post a short summary of what shipped. Everything stays
        inside the crew workspace — no external services needed.
      priority: high
      project: Launch Prep
      target_state: TODO
    - crew_slug: engineering
      assignee: sam
      title: Rewrite the Harborlight README so a newcomer can follow it
      description: |-
        Our README grew by accretion and buries the lede. Rewrite it for clarity
        and save the result to /crew/shared/harborlight/README.md.

        Raw source to refactor (keep the facts, cut the filler):
        ---
        harborlight is a thing for watching your self hosted stuff, it does
        dashboards. install: clone the repo then maybe docker compose up but you
        might need to set PORT first (default 8321) and HL_DB_PATH if you want
        sqlite somewhere else. there is also HL_POLL_SECONDS (default 30). auth
        is basic auth, set HL_USER/HL_PASS or it runs open which is bad. probes:
        http probe checks a url returns 200, tcp probe checks a port, disk probe
        warns at 90%. alerts go to a webhook you set with HL_WEBHOOK_URL.
        troubleshooting: if the dashboard is blank check the db path is
        writable, if probes never fire check HL_POLL_SECONDS isnt 0.
        ---
        Structure it as: What it is / Quick start / Configuration (a table) /
        Probes / Troubleshooting. Finish with a two-line summary of what you
        changed and why.
      priority: medium
      project: Launch Prep
    - crew_slug: ops
      assignee: riley
      title: Research and draft a competitive teardown of self-hosted agent runtimes
      description: |-
        Write a one-page competitive teardown at
        /crew/shared/research/agent-runtimes-teardown.md.

        Compare at least three self-hosted approaches to running AI agents
        (agent frameworks, workflow orchestrators, DIY cron + scripts) on:
        deployment model, agent persistence between tasks, scheduling and
        automation, memory, and multi-agent coordination.

        Use web research if the container has internet access (curl works). If
        a source is unreachable, work from what you already know and clearly
        mark those rows as unverified — do not fabricate citations.

        Close with a comparison table and a three-sentence "so what" about
        where a crew-based runtime stands out.
      priority: high
      project: Research
      target_state: TODO
    - crew_slug: ops
      assignee: morgan
      title: Draft the Harborlight incident response runbook
      description: |-
        Write /crew/shared/runbooks/incident-response.md for operating
        Harborlight in production:
        - Severity ladder (SEV1–SEV3) with one concrete example each
        - First-15-minutes checklist
        - Escalation and comms rules: who gets woken, what gets posted where,
          at what cadence
        - Rollback criteria
        - A short postmortem template

        Keep it under two pages and checklist-heavy — it has to be usable at
        3 a.m.
      priority: high
      project: Reliability
      target_state: TODO
    - crew_slug: engineering
      assignee: sam
      title: Create a directory tree with sample files
      description: |-
        Create the following directory structure under /tmp/demo-project/:
          /tmp/demo-project/
            README.md        (with project name and date)
            src/
              main.py        (simple hello world)
              utils.py       (a helper function)
            tests/
              test_main.py   (a basic test)
            data/
              config.json    (sample config with 3 keys)

        Verify all files exist and list the tree.
      priority: high
      project: File Operations
    - crew_slug: engineering
      assignee: robin
      title: Generate a CSV report with random data
      description: |-
        Create a Python script that generates a CSV file with 50 rows of sample data.
        Columns: id, name, email, score (random 0-100), status (active/inactive).
        Save the script as /tmp/generate-data.py and run it.
        Output CSV should be at /tmp/sample-data.csv.
        Print the first 5 rows and a summary (total rows, average score).
      priority: medium
      project: File Operations
    - crew_slug: quality
      assignee: casey
      title: Write a log parser that extracts errors
      description: |-
        Create a bash script /tmp/log-parser.sh that:
        1. Generates a sample log file /tmp/app.log with 100 lines (mix of INFO, WARN, ERROR)
        2. Extracts all ERROR lines into /tmp/errors.txt
        3. Counts occurrences of each log level
        4. Prints a summary: total lines, errors, warnings, info

        Run the script and verify the output.
      priority: medium
      project: File Operations
    - crew_slug: ops
      assignee: riley
      title: Fetch and parse the Hacker News front page
      description: |-
        Use curl to download https://news.ycombinator.com/ (HTML).
        Parse the response to extract the top 10 story titles.
        Save to /tmp/hackernews-top10.txt with format:
          1. Story title here
          2. Another story
          ...

        Note: Use grep/sed/awk for parsing, no external libraries needed.
      priority: high
      project: Web Scraping
    - crew_slug: ops
      assignee: riley
      title: Fetch current weather data from wttr.in
      description: |-
        Use curl to fetch weather for Prague from wttr.in:
          curl -s "wttr.in/Prague?format=j1"

        Parse the JSON response and extract:
        - Current temperature
        - Weather description
        - Wind speed
        - Humidity

        Save a human-readable summary to /tmp/weather-prague.txt
      priority: medium
      project: Web Scraping
    - crew_slug: ops
      assignee: morgan
      title: Download and analyze a public JSON API
      description: |-
        Fetch a list of users from https://jsonplaceholder.typicode.com/users
        Parse the JSON and create a report /tmp/users-report.txt with:
        - Total number of users
        - List of all usernames and cities
        - Users grouped by company name

        Use curl + python3 or jq for parsing.
      priority: low
      project: Web Scraping
    - crew_slug: engineering
      assignee: robin
      title: Build a single-file interactive changelog page
      description: |-
        Create /crew/shared/harborlight/changelog.html — one self-contained
        HTML file (inline CSS + JS, no external assets) that renders this
        changelog data with a version filter:

        [{"version":"0.3.0","date":"2026-06-24","changes":["disk probe","webhook alerts"]},
         {"version":"0.2.1","date":"2026-06-10","changes":["fix: tcp probe timeout"]},
         {"version":"0.2.0","date":"2026-05-28","changes":["tcp probes","basic auth"]}]

        Keep it clean and readable: system font stack, sensible spacing, one
        subtle accent color. No network access needed — verify by checking the
        file is well-formed HTML.
      priority: medium
      project: Launch Prep
    - crew_slug: engineering
      assignee: robin
      title: Create a bash system info collector
      description: |-
        Write /tmp/sysinfo.sh that collects and saves to /tmp/sysinfo.txt:
        - Hostname and OS info (uname -a)
        - Current date and uptime
        - Disk usage (df -h)
        - Memory usage (free -m or /proc/meminfo)
        - Running processes count
        - Network interfaces and IPs
        - Environment variables count

        Make it executable and run it.
      priority: medium
      project: Script Factory
    - crew_slug: quality
      assignee: casey
      title: Write and run a simple test suite in bash
      description: |-
        Create /tmp/test-suite.sh — a minimal test framework in bash.
        Define at least 5 test cases:
        1. Test that /tmp exists and is writable
        2. Test that curl is available
        3. Test that python3 is available
        4. Test that DNS resolution works (nslookup google.com)
        5. Test that /etc/hostname is readable

        Output format: [PASS] or [FAIL] for each test, with a summary at the end.
        Run the test suite and save results to /tmp/test-results.txt
      priority: medium
      project: Script Factory
    - crew_slug: quality
      assignee: casey
      title: Triage raw beta feedback into a prioritized fix list
      description: |-
        Beta feedback dump below. Turn it into /crew/shared/quality/beta-triage.md:
        a markdown table with columns theme | severity (P0–P3) | affected area |
        suggested owner (Sam = backend, Robin = frontend, Riley = platform),
        followed by a "Top 3 to fix before launch" section with one-line
        justifications.

        Feedback:
        - "dashboard goes blank after ~a day, have to restart the container"
        - "love the http probes, wish alerts had a quiet-hours setting"
        - "setup took 5 minutes, docs were fine"
        - "basic auth popup on every page load in Safari is annoying"
        - "disk probe fired at 90% but the box died at 92%, threshold should be configurable"
        - "webhook alert JSON has no timestamp field??"
        - "CPU usage creeps up over a week"
        - "would pay for a hosted version"
      priority: high
      project: Launch Prep
    - crew_slug: ops
      assignee: casey
      title: Map container resource limits and environment
      description: |-
        Collect container environment info and save to /tmp/container-info.txt:
        - CPU count (nproc)
        - Memory total and available (/proc/meminfo)
        - Disk space (df -h /)
        - Container ID (hostname or /proc/1/cgroup)
        - User ID and groups (id)
        - Network interfaces (ip addr or ifconfig)
        - Mounted filesystems (mount)
        - Key environment variables (HOME, PATH, USER)
      priority: low
      project: System Info
