crews:
    - name: Engineering
      slug: engineering
      color: '#3B82F6'
      icon: terminal
      runtime_image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
      devcontainer_config: '{"image":"mcr.microsoft.com/devcontainers/javascript-node:22-bookworm","containerEnv":{"PATH":"/home/agent/.local/bin:/home/agent/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"},"features":{"ghcr.io/devcontainers/features/common-utils:2":{"username":"agent","userUid":"1001","userGid":"1001","installZsh":false,"upgradePackages":false},"ghcr.io/devcontainers-extra/features/claude-code:2":{},"ghcr.io/devcontainers/features/github-cli:1":{}},"postCreateCommand":"(sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends xdg-utils ripgrep python3 python3-pip 2>&1 | tail -3) || true && mkdir -p $HOME/.local && npm config set prefix $HOME/.local 2>/dev/null || true && npm install -g @openai/codex 2>&1 | tail -5 || true && npm install -g @google/gemini-cli 2>&1 | tail -5 || true && npm install -g opencode-ai 2>&1 | tail -5 || true && (curl -fsSL https://cursor.com/install -o /tmp/cursor-install.sh && bash /tmp/cursor-install.sh -y 2>&1 | tail -5) || true && (curl -fsSL https://app.factory.ai/cli -o /tmp/droid-install.sh && bash /tmp/droid-install.sh 2>&1 | tail -5) || true"}'
      mise_config: '{"tools":{"node":"22","python":"3.12"}}'
      # fetch-and-extract routine's declared egress_targets.
      allowed_domains:
        - httpbin.org
    - name: Quality
      slug: quality
      color: '#10B981'
      icon: shield-check
      runtime_image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
      devcontainer_config: '{"image":"mcr.microsoft.com/devcontainers/javascript-node:22-bookworm","containerEnv":{"PATH":"/home/agent/.local/bin:/home/agent/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"},"features":{"ghcr.io/devcontainers/features/common-utils:2":{"username":"agent","userUid":"1001","userGid":"1001","installZsh":false,"upgradePackages":false},"ghcr.io/devcontainers-extra/features/claude-code:2":{},"ghcr.io/devcontainers/features/python:1":{},"ghcr.io/devcontainers/features/github-cli:1":{}},"postCreateCommand":"(sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends xdg-utils ripgrep python3 python3-pip 2>&1 | tail -3) || true && mkdir -p $HOME/.local && npm config set prefix $HOME/.local 2>/dev/null || true && npm install -g @openai/codex 2>&1 | tail -5 || true && npm install -g @google/gemini-cli 2>&1 | tail -5 || true && npm install -g opencode-ai 2>&1 | tail -5 || true && (curl -fsSL https://cursor.com/install -o /tmp/cursor-install.sh && bash /tmp/cursor-install.sh -y 2>&1 | tail -5) || true && (curl -fsSL https://app.factory.ai/cli -o /tmp/droid-install.sh && bash /tmp/droid-install.sh 2>&1 | tail -5) || true"}'
    - name: Ops
      slug: ops
      color: '#EF4444'
      icon: server
      runtime_image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
      devcontainer_config: '{"image":"mcr.microsoft.com/devcontainers/javascript-node:22-bookworm","containerEnv":{"PATH":"/home/agent/.local/bin:/home/agent/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"},"features":{"ghcr.io/devcontainers/features/common-utils:2":{"username":"agent","userUid":"1001","userGid":"1001","installZsh":false,"upgradePackages":false},"ghcr.io/devcontainers-extra/features/claude-code:2":{},"ghcr.io/devcontainers/features/docker-in-docker:2":{},"ghcr.io/devcontainers/features/terraform:1":{},"ghcr.io/devcontainers/features/github-cli:1":{}},"postCreateCommand":"(sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends xdg-utils ripgrep python3 python3-pip 2>&1 | tail -3) || true && mkdir -p $HOME/.local && npm config set prefix $HOME/.local 2>/dev/null || true && npm install -g @openai/codex 2>&1 | tail -5 || true && npm install -g @google/gemini-cli 2>&1 | tail -5 || true && npm install -g opencode-ai 2>&1 | tail -5 || true && (curl -fsSL https://cursor.com/install -o /tmp/cursor-install.sh && bash /tmp/cursor-install.sh -y 2>&1 | tail -5) || true && (curl -fsSL https://app.factory.ai/cli -o /tmp/droid-install.sh && bash /tmp/droid-install.sh 2>&1 | tail -5) || true"}'
      mise_config: '{"tools":{"terraform":"1.9"}}'
      # OPS-3 (Hacker News), OPS-4 (wttr.in weather), OPS-5 (public JSON
      # API), plus feed-watch-probe/feed-change-report's httpbin.org.
      allowed_domains:
        - httpbin.org
        - news.ycombinator.com
        - wttr.in
        - jsonplaceholder.typicode.com
    # Opt-in local-model demo crew (CREWSHIP_SEED_OLLAMA=1). Bakes only
    # opencode-ai (the OpenCode CLI drives any OpenAI-compatible endpoint).
    # allow_private_endpoints=true is required to reach a host Ollama at
    # host.docker.internal — but it only takes effect when the operator also
    # sets CREWSHIP_ALLOW_PRIVATE_ENDPOINTS=1 (default-off SSRF fence).
    - name: Local AI
      slug: local-ai
      color: '#8B5CF6'
      icon: cpu
      requires_env: CREWSHIP_SEED_OLLAMA
      allow_private_endpoints: true
      runtime_image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
      devcontainer_config: '{"image":"mcr.microsoft.com/devcontainers/javascript-node:22-bookworm","containerEnv":{"PATH":"/home/agent/.local/bin:/home/agent/.local/share/mise/shims:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"},"features":{"ghcr.io/devcontainers/features/common-utils:2":{"username":"agent","userUid":"1001","userGid":"1001","installZsh":false,"upgradePackages":false}},"postCreateCommand":"mkdir -p $HOME/.local && npm config set prefix $HOME/.local 2>/dev/null || true && npm install -g opencode-ai 2>&1 | tail -5 || true"}'
