<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crewship — Orchestration Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ─── */
:root {
  --bg-root:         #0a0c10;
  --bg-panel:        #0d1117;
  --bg-surface:      #161b22;
  --bg-surface-2:    #1c2128;
  --bg-hover:        #21262d;
  --border:          #1e2430;
  --border-subtle:   #161b22;
  --text-primary:    #e6edf3;
  --text-secondary:  #8b949e;
  --text-muted:      #484f58;
  --text-link:       #58a6ff;

  /* status colors */
  --done-solid:      #10b981;
  --done-dim:        rgba(16, 185, 129, 0.18);
  --done-border:     rgba(16, 185, 129, 0.4);
  --run-solid:       #3b82f6;
  --run-dim:         rgba(59, 130, 246, 0.2);
  --run-border:      rgba(59, 130, 246, 0.5);
  --block-solid:     #f59e0b;
  --block-dim:       rgba(245, 158, 11, 0.15);
  --block-border:    rgba(245, 158, 11, 0.4);
  --pend-solid:      #484f58;
  --pend-dim:        rgba(72, 79, 88, 0.2);
  --pend-border:     rgba(72, 79, 88, 0.5);
  --fail-solid:      #f43f5e;
  --fail-dim:        rgba(244, 63, 94, 0.15);
  --fail-border:     rgba(244, 63, 94, 0.4);

  /* grid */
  --lane-h:          52px;
  --agent-w:         168px;
  --header-h:        36px;
  --mission-h:       34px;

  --font-ui:    'Inter', sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
  --radius:     6px;
  --radius-sm:  4px;
  --transition: 0.15s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--bg-root);
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Top Command Bar ─── */
.cmd-bar {
  height: 48px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 200;
  flex-shrink: 0;
}
.cmd-bar .logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 14px;
  color: var(--text-primary);
  text-decoration: none;
  margin-right: 4px;
}
.cmd-bar .logo svg { color: #58a6ff; }
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
}
.breadcrumb .sep { color: var(--text-muted); }
.breadcrumb .current { color: var(--text-primary); font-weight: 500; }
.cmd-spacer { flex: 1; }
.cmd-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  background: var(--run-dim);
  color: #93c5fd;
  border: 1px solid var(--run-border);
}
.cmd-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--run-solid);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

.cmd-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  background: transparent;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
}
.cmd-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: #30363d; }
.cmd-btn.primary { background: var(--run-dim); color: #93c5fd; border-color: var(--run-border); }
.cmd-btn.primary:hover { background: rgba(59,130,246,0.28); }

/* ─── View Tabs ─── */
.view-tabs {
  height: 36px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  padding: 0 16px;
  gap: 2px;
  flex-shrink: 0;
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--run-solid); }

/* ─── Timeline Page Layout ─── */
.tl-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 84px);
  overflow: hidden;
}

/* ─── Timeline Controls Bar ─── */
.tl-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tl-time-range {
  display: flex;
  align-items: center;
  gap: 2px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.tl-time-range button {
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 500;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.tl-time-range button:hover { background: var(--bg-hover); color: var(--text-primary); }
.tl-time-range button.active { background: var(--bg-surface); color: var(--text-primary); }
.tl-legend {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-secondary);
}
.legend-swatch {
  width: 20px; height: 8px;
  border-radius: 2px;
}
.legend-swatch.done     { background: var(--done-solid); }
.legend-swatch.running  { background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6); background-size: 200%; }
.legend-swatch.blocked  {
  background: repeating-linear-gradient(
    -45deg,
    var(--block-solid) 0 3px,
    var(--block-dim) 3px 6px
  );
}
.legend-swatch.pending  { border: 1px dashed var(--pend-solid); background: transparent; }
.legend-swatch.failed   { background: var(--fail-solid); }

/* ─── Gantt Scroll Container ─── */
.tl-scroll-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* ─── Sticky left column + header ─── */
.gantt-grid {
  display: grid;
  grid-template-columns: var(--agent-w) 1fr;
  min-width: 900px;
}

/* Sticky header row */
.gantt-header {
  display: contents;
}
.header-agent-col {
  position: sticky;
  top: 0;
  left: 0;
  z-index: 50;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.header-timeline-col {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  height: var(--header-h);
  overflow: hidden;
}
.time-ruler {
  position: relative;
  height: 100%;
  width: 100%;
}
.time-tick {
  position: absolute;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.time-tick-line {
  width: 1px;
  height: 6px;
  background: var(--text-muted);
  margin-top: 18px;
}
.time-tick-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  transform: translateX(-50%);
  white-space: nowrap;
  margin-top: 2px;
}

/* ─── Mission section header ─── */
.mission-header-agent {
  position: sticky;
  left: 0;
  z-index: 30;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  height: var(--mission-h);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.mission-header-agent:hover { background: var(--bg-hover); }
.mission-chevron {
  color: var(--text-muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.mission-chevron.open { transform: rotate(0deg); }
.mission-chevron.closed { transform: rotate(-90deg); }
.mission-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
.mission-badge {
  margin-left: auto;
  padding: 1px 6px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
}
.mission-badge.in-progress {
  background: var(--run-dim);
  color: #93c5fd;
  border: 1px solid var(--run-border);
}
.mission-header-timeline {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  height: var(--mission-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
}
.mission-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.mission-meta .agents-count { color: var(--text-secondary); }

/* ─── Agent Lane ─── */
.agent-label-cell {
  position: sticky;
  left: 0;
  z-index: 20;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border-subtle);
  height: var(--lane-h);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  transition: background var(--transition);
}
.agent-label-cell:hover { background: var(--bg-hover); }
.agent-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  flex-shrink: 0;
  border: 1.5px solid transparent;
}
.agent-info { overflow: hidden; }
.agent-slug {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.agent-role {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* avatar color variants */
.av-emerald { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.3); }
.av-blue    { background: rgba(59,130,246,0.15);  color: #60a5fa; border-color: rgba(59,130,246,0.3); }
.av-violet  { background: rgba(139,92,246,0.15);  color: #a78bfa; border-color: rgba(139,92,246,0.3); }
.av-amber   { background: rgba(245,158,11,0.15);  color: #fcd34d; border-color: rgba(245,158,11,0.3); }
.av-rose    { background: rgba(244,63,94,0.15);   color: #fb7185; border-color: rgba(244,63,94,0.3); }
.av-cyan    { background: rgba(6,182,212,0.15);   color: #22d3ee; border-color: rgba(6,182,212,0.3); }
.av-teal    { background: rgba(20,184,166,0.15);  color: #2dd4bf; border-color: rgba(20,184,166,0.3); }
.av-lime    { background: rgba(132,204,22,0.15);  color: #a3e635; border-color: rgba(132,204,22,0.3); }

/* ─── Timeline Track Cell ─── */
.track-cell {
  height: var(--lane-h);
  border-bottom: 1px solid var(--border-subtle);
  position: relative;
  overflow: visible;
}
/* Vertical grid lines drawn by JS */
.grid-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border-subtle);
  pointer-events: none;
}
/* Now marker */
.now-marker {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: #f43f5e;
  z-index: 15;
  pointer-events: none;
}
.now-marker::before {
  content: '';
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #f43f5e;
  border-left-width: 4px;
  border-right-width: 4px;
}
.now-label {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  color: #f43f5e;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

/* ─── Task Bar ─── */
.task-bar {
  position: absolute;
  top: 8px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  padding: 0 8px;
  cursor: pointer;
  transition: filter var(--transition), transform var(--transition);
  overflow: hidden;
  z-index: 10;
  min-width: 4px;
}
.task-bar:hover {
  filter: brightness(1.15);
  transform: translateY(-1px);
  z-index: 25;
}
.task-bar-label {
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: none;
}

/* Status bar styles */
.bar-done {
  background: var(--done-dim);
  border: 1px solid var(--done-border);
  color: #6ee7b7;
}
.bar-running {
  background: linear-gradient(90deg, #1d4ed8 0%, #3b82f6 40%, #60a5fa 60%, #3b82f6 100%);
  background-size: 300% 100%;
  border: 1px solid var(--run-border);
  color: #fff;
  animation: shimmer 2.5s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -200% 0; }
}
.bar-blocked {
  background: repeating-linear-gradient(
    -45deg,
    var(--block-dim) 0px 4px,
    rgba(245,158,11,0.05) 4px 8px
  );
  border: 1px solid var(--block-border);
  color: #fcd34d;
}
.bar-pending {
  background: var(--pend-dim);
  border: 1.5px dashed var(--pend-border);
  color: var(--text-muted);
}
.bar-failed {
  background: var(--fail-dim);
  border: 1px solid var(--fail-border);
  color: #fda4af;
}

/* ─── Dependency Arrow (SVG overlay) ─── */
.dep-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 5;
}
.dep-arrow {
  fill: none;
  stroke: rgba(139,92,246,0.5);
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
}
.dep-arrowhead {
  fill: rgba(139,92,246,0.7);
}

/* ─── Tooltip ─── */
.tooltip {
  position: fixed;
  background: var(--bg-surface-2, #1c2128);
  border: 1px solid #30363d;
  border-radius: var(--radius);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-primary);
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.12s ease, transform 0.12s ease;
  min-width: 180px;
  max-width: 240px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; transform: translateY(0); }
.tt-title {
  font-weight: 600;
  font-size: 12px;
  margin-bottom: 6px;
  color: var(--text-primary);
}
.tt-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 3px;
}
.tt-key { color: var(--text-muted); font-size: 11px; }
.tt-val { color: var(--text-secondary); font-size: 11px; font-family: var(--font-mono); }
.tt-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 6px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 6px;
}
.tt-status.done    { background: var(--done-dim);  color: #6ee7b7; border: 1px solid var(--done-border); }
.tt-status.running { background: var(--run-dim);   color: #93c5fd; border: 1px solid var(--run-border); }
.tt-status.blocked { background: var(--block-dim); color: #fcd34d; border: 1px solid var(--block-border); }
.tt-status.pending { background: var(--pend-dim);  color: var(--text-muted); border: 1px solid var(--pend-border); }
.tt-divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

/* ─── Empty pending lane placeholder ─── */
.pending-placeholder {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  pointer-events: none;
}

/* ─── Mission collapsed state ─── */
.mission-rows.collapsed { display: none; }
</style>
</head>

<div class="view-tabs">

    Canvas
  </button>
  <button class="tab-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
    Dashboard
  </button>

    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Timeline
  </button>
  <button class="tab-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Activity
  </button>
</div>

<!-- ─── Timeline Page ─── -->
<div class="tl-page" id="tlPage">

  <!-- Controls Bar -->
  <div class="tl-controls">
    <div class="tl-time-range">
      <button>1h</button>
      <button class="active">2h</button>
      <button>4h</button>
      <button>Today</button>
    </div>
    <button class="cmd-btn" style="font-size:11px; padding:4px 8px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
      Filter agents
    </button>
    <button class="cmd-btn" style="font-size:11px; padding:4px 8px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
      Jump to now
    </button>
    <div class="tl-legend">
      <div class="legend-item"><div class="legend-swatch done"></div> Done</div>
      <div class="legend-item"><div class="legend-swatch running"></div> Running</div>
      <div class="legend-item"><div class="legend-swatch blocked"></div> Blocked</div>
      <div class="legend-item"><div class="legend-swatch pending"></div> Pending</div>
    </div>
  </div>

  <!-- Gantt Scroll Area -->
  <div class="tl-scroll-wrap" id="tlScrollWrap">
    <div class="gantt-grid" id="ganttGrid">
      <!-- Populated by JS -->
    </div>
  </div>

</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
// ─── Data Model ─────────────────────────────────────────────────────────────

const BASE_TIME = 10 * 60; // 10:00 in minutes from midnight
const NOW_MIN   = 11 * 60 + 8; // 11:08 "current time"
const DURATION  = 2 * 60;  // 2h window shown

// Agents across both missions
const AGENTS = {
  viktor: { slug: '@viktor', role: 'Backend', color: 'av-blue',    initials: 'VI' },
  nela:   { slug: '@nela',   role: 'Frontend', color: 'av-violet', initials: 'NE' },
  tomas:  { slug: '@tomas',  role: 'Lead · Eng', color: 'av-emerald',initials: 'TO' },
  lucie:  { slug: '@lucie',  role: 'Research',  color: 'av-cyan',  initials: 'LU' },
  filip:  { slug: '@filip',  role: 'Analytics', color: 'av-teal',  initials: 'FI' },
  sara:   { slug: '@sara',   role: 'DevOps',    color: 'av-rose',  initials: 'SA' },
  alex:   { slug: '@alex',   role: 'Infra',     color: 'av-amber', initials: 'AL' },
  eva:    { slug: '@eva',    role: 'QA',        color: 'av-lime',  initials: 'EV' },
  jakub:  { slug: '@jakub',  role: 'Security',  color: 'av-rose',  initials: 'JA' },
};

const MISSIONS = [
  {
    id: 'm1',
    name: 'CRE-81 Code Quality Refactor',
    status: 'IN_PROGRESS',
    open: true,
    agents: ['viktor', 'nela', 'tomas'],
    tasks: [
      { id: 't1', agent: 'viktor', label: 'Split god files',     status: 'done',    start: 10*60,       end: 10*60+35, tokens: 42800, cost: '$0.043' },
      { id: 't2', agent: 'viktor', label: 'Fix security issues', status: 'running', start: 10*60+40,    end: NOW_MIN,  tokens: 61200, cost: '$0.062', depId: 't1' },
      { id: 't3', agent: 'nela',   label: 'Frontend lint fixes', status: 'done',    start: 10*60+5,     end: 10*60+25, tokens: 18400, cost: '$0.018' },
      { id: 't4', agent: 'tomas',  label: 'Final review',        status: 'blocked', start: null,        end: null,     tokens: 0,     cost: '—',      depIds: ['t2','t3'] },
    ]
  },
  {
    id: 'm2',
    name: 'v1.0 Release Pipeline',
    status: 'IN_PROGRESS',
    open: true,
    agents: ['lucie','filip','viktor','nela','sara','alex','eva','jakub','tomas'],
    tasks: [
      { id: 'r1',  agent: 'lucie',  label: 'Competitive analysis',   status: 'done',    start: 10*60,       end: 10*60+20,  tokens: 29100, cost: '$0.029' },
      { id: 'r2',  agent: 'filip',  label: 'Usage metrics report',    status: 'done',    start: 10*60,       end: 10*60+15,  tokens: 14700, cost: '$0.014' },
      { id: 'r3',  agent: 'viktor', label: 'Fix P0 bugs',             status: 'running', start: 10*60+25,    end: NOW_MIN,   tokens: 89400, cost: '$0.089', depId: 'r2' },
      { id: 'r4',  agent: 'nela',   label: 'Update landing page',     status: 'running', start: 10*60+22,    end: NOW_MIN,   tokens: 52300, cost: '$0.052', depId: 'r1' },
      { id: 'r5',  agent: 'sara',   label: 'Build release artifacts', status: 'pending', start: null,        end: null,      tokens: 0,     cost: '—',      depId: 'r3' },
      { id: 'r6',  agent: 'alex',   label: 'Deploy to staging',       status: 'pending', start: null,        end: null,      tokens: 0,     cost: '—',      depId: 'r5' },
      { id: 'r7',  agent: 'eva',    label: 'E2E staging tests',        status: 'pending', start: null,        end: null,      tokens: 0,     cost: '—',      depId: 'r6' },
      { id: 'r8',  agent: 'jakub',  label: 'Security scan',           status: 'pending', start: null,        end: null,      tokens: 0,     cost: '—',      depId: 'r6' },
      { id: 'r9',  agent: 'tomas',  label: 'Release Go/No-Go',        status: 'blocked', start: null,        end: null,      tokens: 0,     cost: '—',      depIds: ['r7','r8'] },
    ]
  }
];

// ─── Utilities ───────────────────────────────────────────────────────────────

function minToLabel(m) {
  const h = Math.floor(m / 60) % 24;
  const mm = m % 60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function minToPercent(m) {
  return ((m - BASE_TIME) / DURATION) * 100;
}

function durationLabel(start, end) {
  if (!start || !end) return '—';
  const d = end - start;
  if (d < 60) return `${d}m`;
  return `${Math.floor(d/60)}h ${d%60}m`;
}

// ─── Build DOM ───────────────────────────────────────────────────────────────

const grid = document.getElementById('ganttGrid');
const TRACK_WIDTH_PX = 900; // reference — we use % for positioning

// Build tick marks for time ruler
function buildTimeRuler() {
  const agentCol = document.createElement('div');
  agentCol.className = 'header-agent-col';
  agentCol.textContent = 'Agent';

  const timelineCol = document.createElement('div');
  timelineCol.className = 'header-timeline-col';

  const ruler = document.createElement('div');
  ruler.className = 'time-ruler';
  ruler.id = 'timeRuler';

  // Ticks every 15 minutes
  for (let m = BASE_TIME; m <= BASE_TIME + DURATION; m += 15) {
    const pct = minToPercent(m);
    const tick = document.createElement('div');
    tick.className = 'time-tick';
    tick.style.left = pct + '%';
    tick.innerHTML = `
      <span class="time-tick-label">${minToLabel(m)}</span>
      <div class="time-tick-line"></div>
    `;
    ruler.appendChild(tick);
  }

  timelineCol.appendChild(ruler);
  grid.appendChild(agentCol);
  grid.appendChild(timelineCol);
}

// Build a mission section
function buildMission(mission) {
  // ── Mission header row ──
  const mAgentCell = document.createElement('div');
  mAgentCell.className = 'mission-header-agent';
  mAgentCell.dataset.missionId = mission.id;
  mAgentCell.innerHTML = `
    <svg class="mission-chevron open" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
    <span class="mission-name">${mission.name}</span>
    <span class="mission-badge in-progress">${mission.status.replace('_',' ')}</span>
  `;

  const mTimelineCell = document.createElement('div');
  mTimelineCell.className = 'mission-header-timeline';
  mTimelineCell.innerHTML = `
    <span class="mission-meta"><span class="agents-count">${mission.agents.length} agents</span> &middot; ${mission.tasks.length} tasks</span>
  `;

  mAgentCell.addEventListener('click', () => {
    const rows = document.getElementById('rows-' + mission.id);
    const chevron = mAgentCell.querySelector('.mission-chevron');
    const isOpen = rows.classList.toggle('collapsed');
    chevron.classList.toggle('open', !isOpen);
    chevron.classList.toggle('closed', isOpen);
    // Redraw arrows after collapse state changes
    setTimeout(drawAllArrows, 50);
  });

  grid.appendChild(mAgentCell);
  grid.appendChild(mTimelineCell);

  // ── Agent rows wrapper (for collapse) ──
  const rowsWrap = document.createElement('div');
  rowsWrap.id = 'rows-' + mission.id;
  rowsWrap.className = 'mission-rows';
  rowsWrap.style.display = 'contents';

  // Track which agents appear in this mission (in order)
  mission.agents.forEach(agentKey => {
    const agent = AGENTS[agentKey];
    const agentTasks = mission.tasks.filter(t => t.agent === agentKey);

    // Agent label cell
    const labelCell = document.createElement('div');
    labelCell.className = 'agent-label-cell';
    labelCell.innerHTML = `
      <div class="agent-avatar ${agent.color}">${agent.initials}</div>
      <div class="agent-info">
        <div class="agent-slug">${agent.slug}</div>
        <div class="agent-role">${agent.role}</div>
      </div>
    `;

    // Track cell
    const trackCell = document.createElement('div');
    trackCell.className = 'track-cell';
    trackCell.dataset.agentKey = agentKey;
    trackCell.dataset.missionId = mission.id;

    // Grid lines at each tick
    for (let m = BASE_TIME; m <= BASE_TIME + DURATION; m += 15) {
      const line = document.createElement('div');
      line.className = 'grid-line';
      line.style.left = minToPercent(m) + '%';
      trackCell.appendChild(line);
    }

    // Now marker (only on first visible row - will clone via JS, just add to all)
    const nowLine = document.createElement('div');
    nowLine.className = 'now-marker';
    nowLine.style.left = minToPercent(NOW_MIN) + '%';
    const nowLbl = document.createElement('div');
    nowLbl.className = 'now-label';
    nowLbl.style.left = minToPercent(NOW_MIN) + '%';
    nowLbl.style.position = 'absolute';
    nowLbl.style.top = '4px';
    nowLbl.textContent = 'NOW';
    trackCell.appendChild(nowLine);

    // Task bars
    agentTasks.forEach(task => {
      let leftPct, widthPct, minW;

      if (task.status === 'pending' || task.status === 'blocked') {
        // Show a placeholder hint on the right side for pending/blocked
        const ph = document.createElement('span');
        ph.className = 'pending-placeholder';
        ph.textContent = task.status === 'blocked' ? `⊘ ${task.label}` : `◌ ${task.label} (waiting)`;
        trackCell.appendChild(ph);
      } else {
        leftPct = minToPercent(task.start);
        const endMin = task.end === NOW_MIN ? NOW_MIN : task.end;
        widthPct = minToPercent(endMin) - leftPct;
        minW = 2; // at least 2%

        const bar = document.createElement('div');
        bar.className = `task-bar bar-${task.status}`;
        bar.style.left = Math.max(0, leftPct) + '%';
        bar.style.width = Math.max(minW, widthPct) + '%';
        bar.dataset.taskId = task.id;

        // Label: only show if bar is wide enough (>6% ≈ ~7min on 2h scale)
        const label = document.createElement('span');
        label.className = 'task-bar-label';
        if (widthPct >= 5) {
          label.textContent = task.label;
        }
        bar.appendChild(label);

        // Running indicator dot
        if (task.status === 'running') {
          const dot = document.createElement('span');
          dot.style.cssText = 'display:inline-block;width:5px;height:5px;border-radius:50%;background:#fff;opacity:0.8;margin-right:5px;animation:pulse-dot 1.5s ease-in-out infinite;flex-shrink:0;';
          bar.insertBefore(dot, label);
        }

        // Attach tooltip data
        bar.addEventListener('mouseenter', (e) => showTooltip(e, task));
        bar.addEventListener('mousemove', (e) => moveTooltip(e));
        bar.addEventListener('mouseleave', hideTooltip);

        trackCell.appendChild(bar);
      }
    });

    rowsWrap.appendChild(labelCell);
    rowsWrap.appendChild(trackCell);
  });

  grid.appendChild(rowsWrap);
}

// ─── Dependency Arrows ────────────────────────────────────────────────────────

// We draw arrows as an SVG overlay on the scroll container
let arrowSvg = null;

function initArrowSvg() {
  const wrap = document.getElementById('tlScrollWrap');
  arrowSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  arrowSvg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:30;';
  arrowSvg.innerHTML = `
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(139,92,246,0.65)"/>
      </marker>
    </defs>
  `;
  wrap.style.position = 'relative';
  wrap.appendChild(arrowSvg);
}

function getBarRect(taskId) {
  const bar = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!bar) return null;
  const scrollWrap = document.getElementById('tlScrollWrap');
  const wRect = scrollWrap.getBoundingClientRect();
  const bRect = bar.getBoundingClientRect();
  return {
    left:   bRect.left   - wRect.left + scrollWrap.scrollLeft,
    top:    bRect.top    - wRect.top  + scrollWrap.scrollTop,
    right:  bRect.right  - wRect.left + scrollWrap.scrollLeft,
    cy:     bRect.top    - wRect.top  + scrollWrap.scrollTop + bRect.height / 2,
    width:  bRect.width,
    height: bRect.height,
  };
}

function drawArrow(fromId, toTask) {
  // toTask might be blocked/pending — find placeholder or skip
  const from = getBarRect(fromId);
  if (!from) return;

  // For blocked/pending targets, draw to their agent row center
  const toAgentKey = toTask.agent;
  const toMission = toTask.missionId;
  const trackCells = document.querySelectorAll(`.track-cell[data-agent-key="${toAgentKey}"][data-mission-id="${toMission}"]`);
  let toX, toY;

  if (toTask.status === 'pending' || toTask.status === 'blocked') {
    // Arrow points to right edge of timeline near the placeholder
    const cell = trackCells[0];
    if (!cell) return;
    const scrollWrap = document.getElementById('tlScrollWrap');
    const wRect = scrollWrap.getBoundingClientRect();
    const cRect = cell.getBoundingClientRect();
    toX = from.right + (cRect.width - from.right + (cRect.left - wRect.left + scrollWrap.scrollLeft)) * 0.7;
    toY = cRect.top - wRect.top + scrollWrap.scrollTop + cRect.height / 2;
  } else {
    const to = getBarRect(toTask.id);
    if (!to) return;
    toX = to.left;
    toY = to.cy;
  }

  const fromX = from.right + 2;
  const fromY = from.cy;

  const cx1 = fromX + Math.abs(toX - fromX) * 0.45;
  const cx2 = toX   - Math.abs(toX - fromX) * 0.45;

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('class', 'dep-arrow');
  path.setAttribute('d', `M${fromX},${fromY} C${cx1},${fromY} ${cx2},${toY} ${toX},${toY}`);
  path.setAttribute('marker-end', 'url(#arrowhead)');
  arrowSvg.appendChild(path);
}

function drawAllArrows() {
  if (!arrowSvg) return;
  // Clear existing paths (keep defs)
  const defs = arrowSvg.querySelector('defs');
  arrowSvg.innerHTML = '';
  arrowSvg.appendChild(defs);

  MISSIONS.forEach(mission => {
    const rowsEl = document.getElementById('rows-' + mission.id);
    if (rowsEl && rowsEl.classList.contains('collapsed')) return;

    mission.tasks.forEach(task => {
      const taskWithMission = { ...task, missionId: mission.id };
      if (task.depId) {
        drawArrow(task.depId, taskWithMission);
      }
      if (task.depIds) {
        task.depIds.forEach(did => drawArrow(did, taskWithMission));
      }
    });
  });
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────

const tooltip = document.getElementById('tooltip');

const STATUS_LABELS = {
  done: 'Completed', running: 'In Progress', blocked: 'Blocked', pending: 'Pending', failed: 'Failed'
};

function showTooltip(e, task) {
  const statusClass = task.status;
  const dur = durationLabel(task.start, task.end === NOW_MIN ? NOW_MIN : task.end);
  const startLbl = task.start ? minToLabel(task.start) : '—';
  const endLbl = task.end ? (task.end === NOW_MIN ? 'now' : minToLabel(task.end)) : '—';
  const tokFmt = task.tokens > 0 ? task.tokens.toLocaleString() : '—';

  tooltip.innerHTML = `
    <div class="tt-title">${task.label}</div>
    <span class="tt-status ${statusClass}">${STATUS_LABELS[task.status] || task.status}</span>
    <hr class="tt-divider">
    <div class="tt-row"><span class="tt-key">Start</span><span class="tt-val">${startLbl}</span></div>
    <div class="tt-row"><span class="tt-key">End</span><span class="tt-val">${endLbl}</span></div>
    <div class="tt-row"><span class="tt-key">Duration</span><span class="tt-val">${dur}</span></div>
    <hr class="tt-divider">
    <div class="tt-row"><span class="tt-key">Tokens</span><span class="tt-val">${tokFmt}</span></div>
    <div class="tt-row"><span class="tt-key">Est. cost</span><span class="tt-val">${task.cost}</span></div>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth - 8) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ─── Animate Now marker ───────────────────────────────────────────────────────

let nowOffset = 0; // drift in pixels, purely cosmetic simulation
function animateNow() {
  nowOffset = (nowOffset + 0.012) % 8; // very slow drift, max 8px
  const nowPct = minToPercent(NOW_MIN);
  document.querySelectorAll('.now-marker, .now-label').forEach(el => {
    el.style.left = `calc(${nowPct}% + ${nowOffset}px)`;
  });
  requestAnimationFrame(animateNow);
}

// ─── Init ────────────────────────────────────────────────────────────────────

buildTimeRuler();
MISSIONS.forEach(mission => {
  // Attach missionId to tasks for arrow drawing
  mission.tasks.forEach(t => { t._mission = mission.id; });
  buildMission(mission);
});
initArrowSvg();

// Draw arrows after layout settles
requestAnimationFrame(() => {
  requestAnimationFrame(drawAllArrows);
});

// Redraw arrows on scroll
document.getElementById('tlScrollWrap').addEventListener('scroll', drawAllArrows);
window.addEventListener('resize', drawAllArrows);

// Start now-marker animation
animateNow();
</script>
