<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

</script>
<style>
  body { font-size: 14px; }
  .atab { transition: background .1s, color .1s; cursor: pointer; }
  .atab:hover { background: #F0F2F5; }
  .atab-active { background: #E7F3FF !important; color: #1877F2 !important; font-weight: 500; }
  .bar-h { height: 8px; border-radius: 4px; }
</style>
</head>
<body class="bg-neutral-100 font-sans text-neutral-950 antialiased">
<div class="flex h-screen">
  <main class="flex-1 overflow-y-auto">
    <div class="h-full flex">
      <!-- Admin left nav -->
      <div class="w-52 bg-white border-r border-neutral-200 flex flex-col flex-shrink-0 overflow-y-auto">
        <div class="p-3 border-b border-neutral-100">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-warning-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
            <span class="text-xs font-semibold text-neutral-900">Admin Console</span>
            <span class="text-[9px] bg-warning-50 text-warning-700 border border-warning-500/30 px-1.5 py-0.5 rounded font-medium ml-auto">OWNER</span>
          </div>
        </div>
        <nav id="admin-tabs" class="flex-1 p-2 space-y-0.5 overflow-y-auto"></nav>
      </div>
      <!-- Admin content -->
      <div class="flex-1 overflow-y-auto">
        <div id="admin-content" class="max-w-3xl mx-auto px-8 py-6"></div>
      </div>
    </div>
  </main>
</div>
<script src="_shared.js"></script>
<script>
(function () {
  var tab = 'overview';

  // Icons reused across tabs

    logs: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 4v16"/><path d="M17 4v16"/><path d="M19 4H9.5a4.5 4.5 0 0 0 0 9H13"/></svg>',
    building: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="20" x="4" y="2" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>',
    users: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    server: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="8" x="2" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>',
    gauge: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>',
    globe: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>',
    archive: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>',
    brain: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>',
    lock: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    key: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>',
    toggle: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="12" x="2" y="6" rx="6"/><circle cx="16" cy="12" r="2"/></svg>',
    pulse: '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>',
    check: '<svg class="w-3.5 h-3.5 text-success-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>'
  };

  var sections = [
    { type: 'section', label: 'PLATFORM' },
    { key: 'overview', label: 'Overview', icon: I.grid },
    { key: 'logs', label: 'System Logs', icon: I.logs },
    { type: 'section', label: 'ORGANIZATIONS' },
    { key: 'organizations', label: 'Organizations', icon: I.building },
    { key: 'users', label: 'All Users', icon: I.users },
    { type: 'section', label: 'INFRASTRUCTURE' },
    { key: 'providers', label: 'Providers', icon: I.server },
    { key: 'resources', label: 'Resources', icon: I.gauge },
    { key: 'networking', label: 'Networking', icon: I.globe },
    { key: 'backups', label: 'Backups', icon: I.archive },
    { type: 'section', label: 'AI & ORCHESTRATION' },
    { key: 'gateway', label: 'LLM Gateway', icon: I.brain },
    { type: 'section', label: 'SECURITY & ACCESS' },
    { key: 'security', label: 'Security', icon: I.lock },
    { key: 'auth', label: 'Auth & SSO', icon: I.key },
    { key: 'flags', label: 'Feature Flags', icon: I.toggle },
    { key: 'ratelimits', label: 'Rate Limits', icon: I.pulse }
  ];

  // ===== HELPER =====
  function toggle(on) {
    return '<div class="w-9 h-5 rounded-full ' + (on ? 'bg-primary-600' : 'bg-neutral-300') + ' cursor-pointer relative"><div class="absolute top-0.5 ' + (on ? 'left-4' : 'left-0.5') + ' w-4 h-4 rounded-full bg-white shadow-sm"></div></div>';
  }
  function badge(text, cls) { return '<span class="text-[10px] px-2 py-0.5 rounded-full font-medium ' + cls + '">' + text + '</span>'; }
  function statusDot(ok) { return '<span class="w-2 h-2 rounded-full ' + (ok ? 'bg-success-500' : 'bg-error-500') + '"></span>'; }
  function card(title, children) { return '<div class="bg-white border border-neutral-200 rounded-lg p-5 space-y-4"><div class="text-xs font-medium text-neutral-700">' + title + '</div>' + children + '</div>'; }
  function sectionTitle(t, sub) { return '<div><div class="text-sm font-medium text-neutral-900">' + t + '</div>' + (sub ? '<div class="text-xs text-neutral-400">' + sub + '</div>' : '') + '</div>'; }

  // ===== TAB CONTENT =====
  var C = {};

  // --- OVERVIEW ---
  C.overview = function () {
    return '<div class="space-y-6">' +
      '<div class="grid grid-cols-4 gap-4">' +
        '<div class="bg-white border border-neutral-200 rounded-lg p-4"><div class="text-[10px] text-neutral-400 uppercase font-medium">Organizations</div><div class="text-2xl font-bold mt-1">3</div><div class="text-xs text-neutral-500 mt-0.5">2 active</div></div>' +
        '<div class="bg-white border border-neutral-200 rounded-lg p-4"><div class="text-[10px] text-neutral-400 uppercase font-medium">Total Users</div><div class="text-2xl font-bold mt-1">7</div><div class="text-xs text-neutral-500 mt-0.5">5 active this week</div></div>' +
        '<div class="bg-white border border-neutral-200 rounded-lg p-4"><div class="text-[10px] text-neutral-400 uppercase font-medium">Total Agents</div><div class="text-2xl font-bold mt-1">34</div><div class="text-xs text-success-700 mt-0.5">8 running</div></div>' +
        '<div class="bg-white border border-neutral-200 rounded-lg p-4"><div class="text-[10px] text-neutral-400 uppercase font-medium">Uptime</div><div class="text-2xl font-bold mt-1">14d</div><div class="text-xs text-success-700 mt-0.5">crewshipd healthy</div></div>' +
      '</div>' +
      card('System Status',
        '<div class="space-y-3">' +
          '<div class="flex items-center justify-between"><div class="flex items-center gap-2">' + statusDot(true) + '<span class="text-xs text-neutral-700">crewshipd</span></div><span class="text-xs text-neutral-400">v0.4.2 · PID 8421</span></div>' +
          '<div class="flex items-center justify-between"><div class="flex items-center gap-2">' + statusDot(true) + '<span class="text-xs text-neutral-700">PostgreSQL</span></div><span class="text-xs text-neutral-400">16.2 · localhost:5432</span></div>' +
          '<div class="flex items-center justify-between"><div class="flex items-center gap-2">' + statusDot(true) + '<span class="text-xs text-neutral-700">Docker Engine</span></div><span class="text-xs text-neutral-400">27.4.1 · 8 containers</span></div>' +
          '<div class="flex items-center justify-between"><div class="flex items-center gap-2">' + statusDot(true) + '<span class="text-xs text-neutral-700">bbolt WAL</span></div><span class="text-xs text-neutral-400">2.1MB · /var/lib/crewship/state.db</span></div>' +
        '</div>'
      ) +
      card('Recent Platform Events',
        '<div class="space-y-2">' +
          '<div class="flex items-center gap-3 text-xs"><span class="text-neutral-400 font-mono w-28 flex-shrink-0">2 min ago</span><span class="text-neutral-700">Agent <strong>Codex</strong> restarted (credential failover)</span></div>' +
          '<div class="flex items-center gap-3 text-xs"><span class="text-neutral-400 font-mono w-28 flex-shrink-0">15 min ago</span><span class="text-neutral-700">User <strong>marie@unifylab.cz</strong> joined Unify Technology</span></div>' +
          '<div class="flex items-center gap-3 text-xs"><span class="text-neutral-400 font-mono w-28 flex-shrink-0">1 hour ago</span><span class="text-neutral-700">Org <strong>DevHouse</strong> created by tomas@devhouse.cz</span></div>' +
          '<div class="flex items-center gap-3 text-xs"><span class="text-neutral-400 font-mono w-28 flex-shrink-0">3 hours ago</span><span class="text-neutral-700">Rate limit 429 on <strong>OPENAI_KEY_1</strong></span></div>' +
        '</div>'
      ) +
    '</div>';
  };

  // --- SYSTEM LOGS ---
  C.logs = function () {
    var logs = [
      { ts: '14:32:01.234', level: 'INFO', msg: 'Agent claude-seo-writer started (container crewship-agent-7f3a)' },
      { ts: '14:31:58.891', level: 'INFO', msg: 'Credential pool: selected ANTHROPIC_KEY_1 (priority=0) for claude-seo-writer' },
      { ts: '14:31:45.102', level: 'WARN', msg: 'Rate limit 429 on OPENAI_KEY_1 — cooldown 5m, switching to OPENAI_KEY_2' },
      { ts: '14:31:30.445', level: 'INFO', msg: 'WebSocket connection established: user=pavel session=ws-8f2a' },
      { ts: '14:30:12.667', level: 'INFO', msg: 'Docker exec: container crewship-agent-3b1c exited code=0 runtime=8m31s' },
      { ts: '14:28:55.112', level: 'ERROR', msg: 'Agent codex-deploy-monitor: exit code 1 — stderr: "rate limit exceeded"' },
      { ts: '14:28:54.998', level: 'INFO', msg: 'Initiating credential failover for codex-deploy-monitor' },
      { ts: '14:25:01.001', level: 'INFO', msg: 'bbolt WAL checkpoint: 2.1MB, 847 entries' },
      { ts: '14:20:00.000', level: 'INFO', msg: 'Health check: all systems nominal' }
    ];
    var lc = { INFO: 'text-blue-400', WARN: 'text-yellow-400', ERROR: 'text-red-400' };
    return '<div class="space-y-4">' +
      '<div class="flex items-center justify-between">' + sectionTitle('System Logs', 'crewshipd JSONL output — last 50 entries') +
        '<div class="flex items-center gap-2"><button class="text-xs text-neutral-500 border border-neutral-200 rounded-lg px-3 py-1.5 hover:bg-neutral-50">Refresh</button><button class="text-xs text-neutral-500 border border-neutral-200 rounded-lg px-3 py-1.5 hover:bg-neutral-50">Download</button></div>' +
      '</div>' +
      '<div class="bg-neutral-950 rounded-lg p-4 overflow-x-auto"><div class="space-y-0.5">' +
        logs.map(function (l) {
          return '<div class="flex gap-3 font-mono text-[11px]"><span class="text-neutral-500 flex-shrink-0">' + l.ts + '</span><span class="w-12 flex-shrink-0 font-medium ' + (lc[l.level] || '') + '">' + l.level + '</span><span class="text-neutral-300">' + l.msg + '</span></div>';
        }).join('') +
      '</div></div></div>';
  };

  // --- ORGANIZATIONS ---
  C.organizations = function () {
    var orgs = [
      { name: 'Unify Technology', slug: 'unify-technology', i: 'U', c: 'bg-primary-600', m: 3, a: 7, plan: 'FREE', d: 'Dec 2025' },
      { name: 'Acme Corp', slug: 'acme-corp', i: 'A', c: 'bg-orange-500', m: 12, a: 24, plan: 'TEAM', d: 'Jan 2026' },
      { name: 'DevHouse s.r.o.', slug: 'devhouse', i: 'D', c: 'bg-violet-500', m: 5, a: 3, plan: 'PRO', d: 'Feb 2026' }
    ];
    var pc = { FREE: 'bg-neutral-100 text-neutral-600', PRO: 'bg-primary-100 text-primary-700', TEAM: 'bg-brand-teal/10 text-teal-700' };
    var rows = '';
    orgs.forEach(function (o) {
      rows += '<div class="flex items-center justify-between py-3 border-b border-neutral-50">' +
        '<div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg ' + o.c + ' flex items-center justify-center text-white text-xs font-bold">' + o.i + '</div><div><div class="text-sm font-medium text-neutral-900">' + o.name + '</div><div class="text-[10px] text-neutral-400 font-mono">' + o.slug + '</div></div></div>' +
        '<div class="flex items-center gap-4"><span class="text-xs text-neutral-500">' + o.m + ' members</span><span class="text-xs text-neutral-500">' + o.a + ' agents</span>' + badge(o.plan, pc[o.plan] || '') + '<span class="text-[10px] text-neutral-400">' + o.d + '</span></div></div>';
    });
    return '<div class="space-y-4"><div class="flex items-center justify-between">' + sectionTitle('All Organizations', '3 organizations on this instance') +
      '<button class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700">+ Create Org</button></div>' +
      '<div class="bg-white border border-neutral-200 rounded-lg overflow-hidden"><div class="px-4">' + rows + '</div></div></div>';
  };

  // --- ALL USERS ---
  C.users = function () {
    var users = [
      { n: 'Pavel Srba', e: 'pavel@unifylab.cz', i: 'PS', o: 'Unify Technology', r: 'Owner', l: '2 min ago' },
      { n: 'Jan Novak', e: 'jan@unifylab.cz', i: 'JN', o: 'Unify Technology', r: 'Admin', l: '1h ago' },
      { n: 'Marie Kralova', e: 'marie@unifylab.cz', i: 'MK', o: 'Unify Technology', r: 'Member', l: '3h ago' },
      { n: 'Tomas Horak', e: 'tomas@acme.cz', i: 'TH', o: 'Acme Corp', r: 'Owner', l: '5h ago' },
      { n: 'Eva Dvorakova', e: 'eva@acme.cz', i: 'ED', o: 'Acme Corp', r: 'Admin', l: '1d ago' },
      { n: 'Petr Svoboda', e: 'petr@devhouse.cz', i: 'PS', o: 'DevHouse', r: 'Owner', l: '2d ago' },
      { n: 'Anna Nemcova', e: 'anna@acme.cz', i: 'AN', o: 'Acme Corp', r: 'Member', l: '3d ago' }
    ];
    var rows = '';
    users.forEach(function (u) {
      rows += '<div class="flex items-center justify-between py-2.5 border-b border-neutral-50"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-white text-[10px] font-semibold">' + u.i + '</div><div><div class="text-sm text-neutral-800">' + u.n + '</div><div class="text-[10px] text-neutral-400">' + u.e + '</div></div></div><div class="flex items-center gap-4"><span class="text-xs text-neutral-500">' + u.o + '</span>' + badge(u.r, 'bg-neutral-100 text-neutral-600') + '<span class="text-[10px] text-neutral-400 w-16 text-right">' + u.l + '</span></div></div>';
    });
    return '<div class="space-y-4">' + sectionTitle('All Users', '7 users across all organizations') +
      '<div class="bg-white border border-neutral-200 rounded-lg overflow-hidden"><div class="px-4">' + rows + '</div></div></div>';
  };

  // --- PROVIDERS ---
  C.providers = function () {
    function pc(label, desc, options, active) {
      var opts = '';
      options.forEach(function (o) {
        var a = o === active;
        opts += '<div class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer ' + (a ? 'border-primary-500 bg-primary-50/50' : 'border-neutral-200 hover:border-neutral-300') + '"><div class="w-4 h-4 rounded-full border-2 flex items-center justify-center ' + (a ? 'border-primary-600' : 'border-neutral-300') + '">' + (a ? '<div class="w-2 h-2 rounded-full bg-primary-600"></div>' : '') + '</div><div class="text-sm ' + (a ? 'text-primary-700 font-medium' : 'text-neutral-700') + '">' + o + '</div></div>';
      });
      return card(label + ' <span class="font-normal text-neutral-400">' + desc + '</span>', '<div class="grid grid-cols-2 gap-2.5">' + opts + '</div>');
    }
    return '<div class="space-y-5">' + sectionTitle('Infrastructure Providers', 'Configure how Crewship runs agent containers, stores files, and manages state.') +
      pc('Container Provider', 'CREWSHIP_CONTAINER_PROVIDER', ['Docker (MVP)', 'Kubernetes (Enterprise)'], 'Docker (MVP)') +
      pc('Storage Provider', 'CREWSHIP_STORAGE_PROVIDER', ['Local Filesystem (MVP)', 'S3 / MinIO (Enterprise)'], 'Local Filesystem (MVP)') +
      pc('State Provider', 'CREWSHIP_STATE_PROVIDER', ['bbolt (MVP)', 'PostgreSQL (Enterprise)'], 'bbolt (MVP)') +
      '<button class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700">Save Configuration</button></div>';
  };

  // --- RESOURCES (NEW) ---
  C.resources = function () {
    function limitRow(label, used, max, unit) {
      var pct = Math.round(used / max * 100);
      var color = pct > 80 ? 'bg-error-500' : pct > 60 ? 'bg-warning-500' : 'bg-primary-500';
      return '<div class="flex items-center justify-between py-2.5 border-b border-neutral-50"><div class="flex-1"><div class="text-sm text-neutral-800">' + label + '</div><div class="flex items-center gap-3 mt-1"><div class="flex-1 bg-neutral-100 bar-h"><div class="bar-h ' + color + '" style="width:' + pct + '%"></div></div><span class="text-[10px] text-neutral-500 w-24 text-right">' + used + ' / ' + max + ' ' + unit + '</span></div></div></div>';
    }
    var orgQuotas = [
      { n: 'Unify Technology', agents: [7, 20], runs: [3, 10], storage: [1.2, 5] },
      { n: 'Acme Corp', agents: [24, 50], runs: [8, 20], storage: [4.8, 10] },
      { n: 'DevHouse s.r.o.', agents: [3, 10], runs: [1, 5], storage: [0.3, 2] }
    ];
    var qRows = '';
    orgQuotas.forEach(function (o) {
      qRows += '<tr class="border-b border-neutral-50"><td class="py-2 text-xs font-medium text-neutral-800">' + o.n + '</td><td class="py-2 text-xs text-neutral-600">' + o.agents[0] + ' / ' + o.agents[1] + '</td><td class="py-2 text-xs text-neutral-600">' + o.runs[0] + ' / ' + o.runs[1] + '</td><td class="py-2 text-xs text-neutral-600">' + o.storage[0] + ' / ' + o.storage[1] + ' GB</td></tr>';
    });

          '<div class="flex items-center justify-between"><span class="text-xs text-neutral-600">Idle timeout</span><span class="text-sm font-mono font-medium">4 hours</span></div>' +
        '</div>'
      ) +
      card('Password Policy',
        '<div class="grid grid-cols-2 gap-4">' +
          '<div class="flex items-center justify-between"><span class="text-xs text-neutral-600">Minimum length</span><span class="text-sm font-mono font-medium">8 characters</span></div>' +
          '<div class="flex items-center justify-between"><span class="text-xs text-neutral-600">Require uppercase</span><div class="flex items-center gap-2">' + toggle(true) + '</div></div>' +
          '<div class="flex items-center justify-between"><span class="text-xs text-neutral-600">Require number</span><div class="flex items-center gap-2">' + toggle(true) + '</div></div>' +
          '<div class="flex items-center justify-between"><span class="text-xs text-neutral-600">Require special char</span><div class="flex items-center gap-2">' + toggle(false) + '</div></div>' +
        '</div>'
      ) +
      card('Login Audit <span class="font-normal text-neutral-400">— last 20 attempts</span>',
        '<table class="w-full"><thead><tr class="border-b border-neutral-200"><th class="text-left text-[10px] font-medium text-neutral-400 py-2">User</th><th class="text-left text-[10px] font-medium text-neutral-400 py-2">IP</th><th class="text-left text-[10px] font-medium text-neutral-400 py-2">Status</th><th class="text-left text-[10px] font-medium text-neutral-400 py-2">Time</th></tr></thead><tbody>' + aRows + '</tbody></table>'
      ) +
    '</div>';
  };

  // --- FEATURE FLAGS ---
  C.flags = function () {
    var flags = [
      { key: 'billing_enabled', desc: 'Enable Stripe billing (enterprise only)', on: false },
      { key: 'marketplace_enabled', desc: 'Enable skills marketplace', on: false },
      { key: 'orchestration', desc: 'Enable multi-agent orchestration', on: true },
      { key: 'task_mode', desc: 'Enable async task mode', on: false },
      { key: 'config_history', desc: 'Enable agent config versioning', on: true },
      { key: 'advanced_audit', desc: 'Enable advanced audit log UI + export', on: false }
    ];
    var html = '';
    flags.forEach(function (f) {
      html += '<div class="flex items-center justify-between py-3 border-b border-neutral-50"><div class="flex-1"><div class="text-sm font-mono text-neutral-800">' + f.key + '</div><div class="text-xs text-neutral-400 mt-0.5">' + f.desc + '</div></div><div class="flex items-center gap-2 ml-3"><span class="text-[10px] ' + (f.on ? 'text-success-600' : 'text-neutral-400') + '">' + (f.on ? 'ON' : 'OFF') + '</span>' + toggle(f.on) + '</div></div>';
    });
    return '<div class="space-y-3">' + sectionTitle('Global Feature Flags', 'Flags apply platform-wide. Per-org overrides available in Organization Settings.') +
      '<div class="bg-white border border-neutral-200 rounded-lg px-4">' + html + '</div></div>';
  };

  // --- RATE LIMITS ---
  C.ratelimits = function () {
    var limits = [
      { n: 'LOGIN_ATTEMPT', r: '5 req / 1m', s: 'ip', t: 'POST /api/auth/*' },
      { n: 'CREATE_ORGANIZATION', r: '3 req / 1h', s: 'user', t: 'POST /api/v1/orgs' },
      { n: 'DELETE_ORGANIZATION', r: '1 req / 1d', s: 'user', t: 'DELETE /api/v1/orgs/{id}' },
      { n: 'AGENT_START', r: '30 req / 1m', s: 'user', t: 'POST /api/v1/.../start' },
      { n: 'API_READ', r: '200 req / 1m', s: 'user', t: 'GET /api/v1/*' },
      { n: 'WEBHOOK_TRIGGER', r: '60 req / 1m', s: 'agent', t: 'POST /api/v1/webhooks/...' },
      { n: 'WS_MESSAGES', r: '60 req / 1m', s: 'conn', t: 'WebSocket send' }
    ];
    var rows = '';
    limits.forEach(function (l) {
      rows += '<tr class="border-b border-neutral-50"><td class="py-2.5 px-4 text-xs font-mono text-neutral-800">' + l.n + '</td><td class="py-2.5 px-4 text-xs text-neutral-600">' + l.r + '</td><td class="py-2.5 px-4">' + badge(l.s, 'bg-neutral-100 text-neutral-500') + '</td><td class="py-2.5 px-4 text-[10px] text-neutral-400 font-mono">' + l.t + '</td></tr>';
    });
    return '<div class="space-y-4">' + sectionTitle('Rate Limits', 'Configured in config/rate-limits.yml. In-memory, per-process (MVP).') +
      '<div class="bg-white border border-neutral-200 rounded-lg overflow-hidden"><table class="w-full"><thead><tr class="border-b border-neutral-200 bg-neutral-50"><th class="text-left text-[10px] font-medium text-neutral-400 px-4 py-2">Name</th><th class="text-left text-[10px] font-medium text-neutral-400 px-4 py-2">Limit</th><th class="text-left text-[10px] font-medium text-neutral-400 px-4 py-2">Scope</th><th class="text-left text-[10px] font-medium text-neutral-400 px-4 py-2">Target</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  };

  // ===== RENDER =====
  function render() {
    var nav = document.getElementById('admin-tabs');
    var html = '';
    sections.forEach(function (s) {
      if (s.type === 'section') {
        html += '<div class="text-[9px] font-semibold text-neutral-400 uppercase tracking-wider px-3 pt-3 pb-1">' + s.label + '</div>';
      } else {
        var active = s.key === tab;
        html += '<button data-tab="' + s.key + '" class="flex items-center gap-2.5 w-full px-3 py-2 rounded-md text-xs atab ' + (active ? 'atab-active' : 'text-neutral-600') + '"><span class="flex-shrink-0">' + s.icon + '</span><span class="truncate">' + s.label + '</span></button>';
      }
    });
    nav.innerHTML = html;
    document.getElementById('admin-content').innerHTML = C[tab] ? C[tab]() : '';
    nav.querySelectorAll('[data-tab]').forEach(function (btn) {
      btn.addEventListener('click', function () { tab = btn.getAttribute('data-tab'); render(); });
    });
  }
  render();
})();
</script>
</body>
</html>
