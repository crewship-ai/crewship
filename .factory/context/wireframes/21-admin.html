        '<div class="bg-white border border-neutral-200 rounded-lg p-5 space-y-4">' +
          '<div class="text-xs font-medium text-neutral-700">Authentication</div>' +
          '<div class="flex items-center justify-between py-2"><div class="text-sm text-neutral-800">NextAuth.js (Auth.js v5)</div><span class="text-[10px] px-2 py-0.5 rounded-full bg-success-50 text-success-700 font-medium">Active</span></div>' +
          '<div class="flex items-center justify-between py-2"><div class="text-sm text-neutral-800">Google OAuth</div><span class="text-[10px] px-2 py-0.5 rounded-full bg-success-50 text-success-700 font-medium">Enabled</span></div>' +
          '<div class="flex items-center justify-between py-2"><div class="text-sm text-neutral-800">GitHub OAuth</div><span class="text-[10px] px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-500 font-medium">Disabled</span></div>' +
        '</div>' +
      '</div>';
    },
    logs: function () {
      var logs = [
        { ts: '14:32:01.234', level: 'INFO', msg: 'Agent claude-seo-writer started (container crewship-agent-7f3a)' },
        { ts: '14:31:58.891', level: 'INFO', msg: 'Credential pool: selected ANTHROPIC_KEY_1 (priority=0) for claude-seo-writer' },
        { ts: '14:31:45.102', level: 'WARN', msg: 'Rate limit 429 on OPENAI_KEY_1 — cooldown 5m, switching to OPENAI_KEY_2' },
        { ts: '14:31:30.445', level: 'INFO', msg: 'WebSocket connection established: user=pavel session=ws-8f2a' },
        { ts: '14:30:12.667', level: 'INFO', msg: 'Docker exec: container crewship-agent-3b1c exited code=0 runtime=8m31s' },
        { ts: '14:28:55.112', level: 'ERROR', msg: 'Agent codex-deploy-monitor: exit code 1 — stderr: "rate limit exceeded"' },
        { ts: '14:28:54.998', level: 'INFO', msg: 'Initiating credential failover for codex-deploy-monitor' },
        { ts: '14:25:01.001', level: 'INFO', msg: 'bbolt WAL checkpoint: 2.1MB, 847 entries' },
        { ts: '14:20:00.000', level: 'INFO', msg: 'Health check: all systems nominal' }
      ];
      var levelCls = { INFO: 'text-primary-600', WARN: 'text-warning-700', ERROR: 'text-error-600' };
      var rows = '';
      logs.forEach(function (l) {
        rows += '<div class="flex gap-3 py-1 font-mono text-[11px] hover:bg-neutral-50">' +
          '<span class="text-neutral-400 flex-shrink-0">' + l.ts + '</span>' +
          '<span class="w-12 flex-shrink-0 font-medium ' + (levelCls[l.level] || '') + '">' + l.level + '</span>' +
          '<span class="text-neutral-700">' + l.msg + '</span>' +
        '</div>';
      });
      return '<div class="space-y-4">' +
        '<div class="flex items-center justify-between">' +
          '<div><div class="text-sm font-medium text-neutral-900">System Logs</div><div class="text-xs text-neutral-400">crewshipd JSONL output — last 50 entries</div></div>' +
          '<div class="flex items-center gap-2">' +
            '<button class="text-xs text-neutral-500 border border-neutral-200 rounded-lg px-3 py-1.5 hover:bg-neutral-50">Refresh</button>' +
            '<button class="text-xs text-neutral-500 border border-neutral-200 rounded-lg px-3 py-1.5 hover:bg-neutral-50">Download Full Log</button>' +
          '</div>' +
        '</div>' +
        '<div class="bg-neutral-950 rounded-lg p-4 overflow-x-auto">' +
          '<div class="space-y-0.5 text-[11px] font-mono">' +
            logs.map(function (l) {
              return '<div class="flex gap-3"><span class="text-neutral-500 flex-shrink-0">' + l.ts + '</span><span class="w-12 flex-shrink-0 font-medium ' +
                (l.level === 'ERROR' ? 'text-red-400' : l.level === 'WARN' ? 'text-yellow-400' : 'text-blue-400') + '">' + l.level + '</span><span class="text-neutral-300">' + l.msg + '</span></div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>';
    }
  };

  function render() {
    var tabNav = document.getElementById('admin-tabs');
    var html = '';
    tabs.forEach(function (t) {
      var isActive = t.key === tab;
      html += '<button data-tab="' + t.key + '" class="flex items-center gap-2.5 w-full px-3 py-2 rounded-md text-xs atab ' +
        (isActive ? 'atab-active' : 'text-neutral-600') + '">' +
        '<span class="flex-shrink-0">' + t.icon + '</span>' +
        '<span class="truncate">' + t.label + '</span>' +
      '</button>';
    });
    tabNav.innerHTML = html;

    var content = document.getElementById('admin-content');
    content.innerHTML = tabContent[tab] ? tabContent[tab]() : '';

    tabNav.querySelectorAll('[data-tab]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        tab = btn.getAttribute('data-tab');
        render();
      });
    });
  }

  render();
})();
</script>
</body>
</html>
