# yaml-language-server: $schema=https://schemas.crewship.ai/v1/manifest.json
#
# ─────────────────────────────────────────────────────────────────────
#  Full Crewship manifest example — every kind in one file
# ─────────────────────────────────────────────────────────────────────
#
#  This bundle demonstrates ONE document of every kind the manifest
#  layer supports. Real bundles can pick and choose — you rarely need
#  all 14 kinds in the same file. The intent here is "copy lines you
#  need; the syntax for every kind lives in one place."
#
#  Theme: a fictional "Outlands" SaaS — engineering team + Discord
#  community + Linear-style issue tracker. Mirrors the kind of setup
#  a small team would actually run.
#
#  Apply:    crewship apply --file full-complete.yaml --from-env
#  Dry-run:  crewship apply --file full-complete.yaml --dry-run
#  Export:   crewship export workspace > exported.yaml
#

# ─── 1. Workspace ────────────────────────────────────────────────────
# Workspace is the outermost container — credentials and skills declared
# here are shared across every crew nested below.
apiVersion: crewship/v1
kind: Workspace

metadata:
  name: Outlands SaaS
  slug: outlands-saas
  description: Engineering + community-ops workspace
  preferred_language: en
  version: 0.2.0

spec:
  credentials:
    - { env: ANTHROPIC_API_KEY,    provider: ANTHROPIC, type: API_KEY,        label: Anthropic API key }
    - { env: OPENAI_API_KEY,       provider: OPENAI,    type: API_KEY,        label: OpenAI API key }
    - { env: LINEAR_API_KEY,       provider: NONE,      type: API_KEY,        label: Linear API key }
    - { env: DISCORD_BOT_TOKEN,    provider: NONE,      type: GENERIC_SECRET, label: Discord bot }
    - { env: GH_TOKEN,             provider: GITHUB,    type: CLI_TOKEN,      label: GitHub PAT }
    - { env: SMTP_PASSWORD,        provider: NONE,      type: GENERIC_SECRET, label: SMTP password }
    - { env: VENDOR_WEBHOOK_TOKEN, provider: NONE,      type: GENERIC_SECRET, label: Vendor webhook token }

  skills:
    - slug: house-style
      inline: |
        ---
        name: house-style
        description: Outlands SaaS engineering conventions.
        license: MIT
        ---
        # House style
        - Conventional Commits
        - Tests next to source (`*_test.go`)
        - PR descriptions in markdown, not bullet salad

  crews:
    # One crew for engineering work.
    - slug: engineering
      name: Engineering
      description: Code review + small-task automation
      color: "#3B82F6"
      devcontainer:
        image: golang:1.26-alpine
        memory_mb: 2048
        cpus: 2
        ttl_hours: 24
      agents:
        - { slug: trapper, name: Trapper, agent_role: LEAD, cli_adapter: CLAUDE_CODE,
            llm: { provider: ANTHROPIC, model: claude-opus-4-7 },
            tool_profile: FULL, memory_enabled: true,
            env_refs: [ANTHROPIC_API_KEY, GH_TOKEN] }
        - { slug: spotter, name: Spotter, agent_role: AGENT, cli_adapter: CLAUDE_CODE,
            llm: { provider: ANTHROPIC, model: claude-sonnet-4-6 },
            tool_profile: MINIMAL, memory_enabled: true,
            env_refs: [ANTHROPIC_API_KEY, GH_TOKEN, LINEAR_API_KEY] }

    # And one for community ops (Discord watcher, vendor alerts, etc.).
    - slug: community
      name: Community Ops
      description: Discord community + vendor alert routing
      color: "#A855F7"
      devcontainer:
        image: python:3.12-alpine
        memory_mb: 1024
      agents:
        - { slug: herald, name: Herald, agent_role: LEAD, cli_adapter: CLAUDE_CODE,
            llm: { provider: ANTHROPIC, model: claude-sonnet-4-6 },
            env_refs: [ANTHROPIC_API_KEY, DISCORD_BOT_TOKEN] }

---
# ─── 2. Project ──────────────────────────────────────────────────────
apiVersion: crewship/v1
kind: Project
metadata:
  name: Q2 Launch
  slug: q2-launch
  description: All Q2 launch deliverables
spec:
  color: "#3B82F6"
  status: active
  priority: high
  health: on_track
  target_date: "2026-06-30"
  lead_agent_slug: trapper

---
# ─── 3. Label ────────────────────────────────────────────────────────
apiVersion: crewship/v1
kind: Label
metadata:
  name: bug
  slug: bug
spec:
  color: "#EF4444"
  description: Something is broken

---
apiVersion: crewship/v1
kind: Label
metadata:
  name: feature
  slug: feature
spec:
  color: "#3B82F6"
  description: New capability

---
apiVersion: crewship/v1
kind: Label
metadata:
  name: recurring
  slug: recurring
spec:
  color: "#9CA3AF"
  description: Auto-generated by a recurring rule

---
# ─── 4. Milestone ────────────────────────────────────────────────────
apiVersion: crewship/v1
kind: Milestone
metadata:
  name: v1.0 public launch
  slug: v1-launch
spec:
  project_slug: q2-launch
  description: First public release with billing + analytics
  target_date: "2026-06-15"
  status: active

---
# ─── 5. WorkflowTemplate ─────────────────────────────────────────────
# Custom issue lifecycle: backlog → in_progress → in_review → done.
apiVersion: crewship/v1
kind: WorkflowTemplate
metadata:
  name: Engineering Standard
  slug: engineering-standard
spec:
  description: Default engineering issue lifecycle
  icon: ":hammer_and_wrench:"
  color: "#3B82F6"
  stages:
    - { name: backlog,     type: open,      position: 1, color: "#9CA3AF" }
    - { name: in_progress, type: started,   position: 2, color: "#3B82F6" }
    - { name: in_review,   type: started,   position: 3, color: "#F59E0B" }
    - { name: done,        type: completed, position: 4, color: "#10B981" }
    - { name: cancelled,   type: cancelled, position: 5, color: "#EF4444" }

---
# ─── 6. TriageRule ───────────────────────────────────────────────────
# Auto-label crash/error reports as bugs, send to Q2 project.
apiVersion: crewship/v1
kind: TriageRule
metadata:
  name: Bug auto-label
  slug: bug-auto-label
spec:
  enabled: true
  priority: 100
  match:
    title_contains: ["error", "crash", "exception", "fails"]
  actions:
    add_labels: [bug]
    set_priority: high
    assign_to_project_slug: q2-launch

---
# ─── 7. RecurringIssue ───────────────────────────────────────────────
# Weekly status review every Monday 9 AM.
apiVersion: crewship/v1
kind: RecurringIssue
metadata:
  name: Weekly status review
  slug: weekly-status
spec:
  enabled: true
  cron: "0 9 * * MON"
  timezone: Europe/Prague
  template:
    title: "Weekly status — {{.WeekStart}}"
    description: |
      Status update for week of {{.WeekStart}}.
      - What shipped?
      - What's blocked?
      - What's next?
    labels: [recurring]
    project_slug: q2-launch
    priority: medium
    crew_slug: engineering

---
# ─── 8. SavedView ────────────────────────────────────────────────────
# Shared view: all open bugs assigned to engineering.
apiVersion: crewship/v1
kind: SavedView
metadata:
  name: Open bugs
  slug: open-bugs
spec:
  shared: true
  entity_type: issue
  filter:
    status: [backlog, in_progress, in_review]
    label_slugs: [bug]
    project_slug: q2-launch
  sort:
    field: created_at
    direction: desc

---
# ─── 9. Routine (with nested Schedule + Webhook) ─────────────────────
# Hourly Discord sync + LLM summary, plus webhook for vendor alerts.
apiVersion: crewship/v1
kind: Routine
metadata:
  name: Discord hourly sync
  slug: discord-sync
  labels:
    crew: community              # this routine lives inside the `community` crew
spec:
  dsl_version: "1.0"
  description: Hourly Discord pull + LLM summary
  inputs:
    - { name: channels, type: string, required: false, default: all,
        description: "Space-separated channel aliases or 'all'" }
  steps:
    - { id: pull,      type: code,      code: { runtime: bash, code: "dce sync --all --json" } }
    - { id: summarize, type: agent_run, agent_slug: herald,
        prompt: "Summarise the new Discord messages in input 'channels'." }
  credentials_required:
    - { type: GENERIC_SECRET, scope: discord-bot }
    - { type: API_KEY,        scope: anthropic   }
  estimated_cost_usd: 0.05
  estimated_duration_seconds: 180
  max_cost_usd: 0.50
  egress_targets: [discord.com, cdn.discordapp.com]

  # Schedule: hourly on the hour
  schedules:
    - { name: Hourly, cron: "0 * * * *", timezone: Europe/Prague, enabled: true,
        inputs: { channels: "all" } }

---
apiVersion: crewship/v1
kind: Routine
metadata:
  name: Vendor alert relay
  slug: vendor-alert
  labels:
    crew: community
spec:
  dsl_version: "1.0"
  description: Format incoming vendor alert and forward to Discord
  inputs:
    - { name: payload, type: object, required: true }
  steps:
    - { id: format_and_post, type: agent_run, agent_slug: herald,
        prompt: "Format input.payload as a Discord embed and post it." }
  credentials_required:
    - { type: GENERIC_SECRET, scope: discord-bot }
    - { type: API_KEY,        scope: anthropic   }
  estimated_cost_usd: 0.01
  max_cost_usd: 0.05
  egress_targets: [discord.com]

  # No schedule — triggered by inbound webhook only.
  webhook:
    enabled: true
    require_token: true
    token_env_ref: VENDOR_WEBHOOK_TOKEN

---
# ─── 10. Recipe (install reference) ──────────────────────────────────
apiVersion: crewship/v1
kind: Recipe
metadata:
  name: Code review pipeline
  slug: code-review
spec:
  install: true
  inputs:
    crew_slug: engineering
    review_lead_slug: trapper

---
# ─── 11. CrewTemplate (deploy reference) ─────────────────────────────
# Deploy an additional crew from the built-in "research" template.
apiVersion: crewship/v1
kind: CrewTemplate
metadata:
  name: Research team
  slug: research-team
spec:
  deploy: true
  crew_slug_override: research
  inputs:
    devcontainer_image: python:3.12

---
# ─── 12. Connector (install reference) ───────────────────────────────
# Install the Linear OAuth connector, wiring the workspace's LINEAR_API_KEY.
apiVersion: crewship/v1
kind: Connector
metadata:
  name: Linear
  slug: linear
spec:
  install: true
  credentials:
    LINEAR_API_KEY: LINEAR_API_KEY

---
# ─── 13. FeatureFlag ─────────────────────────────────────────────────
# Enable the experimental LLM-cache for THIS workspace only.
apiVersion: crewship/v1
kind: FeatureFlag
metadata:
  name: experimental-llm-cache
  slug: experimental-llm-cache
spec:
  description: Enable experimental LLM response cache
  default_enabled: false
  default_percentage: 0
  workspace_override: true     # force-on for this workspace

---
# ─── 14. InstanceSetting ─────────────────────────────────────────────
# Instance-global config (SMTP + branding). ADMIN-only on apply.
apiVersion: crewship/v1
kind: InstanceSetting
metadata:
  name: Outlands branding + SMTP
  slug: outlands-instance-config
spec:
  settings:
    smtp.host: smtp.gmail.com
    smtp.port: "587"
    smtp.user: noreply@outlands.dev
    smtp.password: ${SMTP_PASSWORD}     # env interpolation — value comes from environment
    branding.product_name: Outlands
    branding.primary_color: "#3B82F6"
    branding.support_email: support@outlands.dev

---
# ─── 15. Hook (toggle) ───────────────────────────────────────────────
# Enable the pre-run cost gate that's registered in code but disabled by default.
apiVersion: crewship/v1
kind: Hook
metadata:
  name: pre-run-cost-gate
  slug: pre-run-cost-gate
spec:
  enabled: true
