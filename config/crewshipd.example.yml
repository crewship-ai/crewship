# Crewship Daemon Configuration
# Copy to crewshipd.yml and adjust for your environment.
# All values can be overridden by environment variables (CREWSHIP_* prefix).

server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout: 10s

ipc:
  socket_path: "/tmp/crewship.sock"

container:
  provider: "docker"           # "docker" | "k8s"
  runtime_image: "ghcr.io/crewship-ai/agent-runtime:latest"
  default_runtime: "runc"      # "runc" | "runsc" (gVisor)
  network: "crewship-agents"
  default_memory_mb: 512
  default_cpus: 1.0

storage:
  provider: "localfs"          # "localfs" | "s3"
  base_path: "/var/lib/crewship"
  log_path: "/var/log/crewship"

state:
  provider: "bbolt"            # "bbolt" | "postgres"
  bolt_path: "/var/lib/crewship/state.db"

logging:
  level: "info"                # "debug" | "info" | "warn" | "error"
  format: "json"               # "json" | "text"

auth:
  # jwt_secret: loaded from NEXTAUTH_SECRET env var
  ws_token_expiry: 5m
