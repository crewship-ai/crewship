# Crewship gitleaks configuration
# CRE-122 Phase 1: narrow, file-specific allowlist for verified false positives.
#
# Verified 2026-04-10: all 33 initial findings were confirmed as false positives.
# Each entry below was matched against actual file content during that audit;
# no broad category patterns (e.g. '.*_test\.go$' or 'docs/.*') are used
# because they would mask real secrets in future test files or documentation.
# Add a new narrow entry (with a comment explaining *why*) rather than widening
# an existing one.

title = "Crewship gitleaks config"

[extend]
# Inherit built-in gitleaks default rules (API keys, tokens, private keys, etc.)
useDefault = true

[allowlist]
description = "Narrowly scoped allowlist — verified false positives only"

paths = [
  # Scrubber test fixtures — these tests MUST contain fake API keys, private
  # keys, and JWTs to exercise the redaction logic. Verified: all matches are
  # hardcoded test vectors, no real credentials.
  '''internal/scrubber/scrubber_test\.go$''',
  '''internal/scrubber/security_test\.go$''',

  # Encryption test vectors (AES-GCM roundtrip tests with fake keys).
  # All three encryption test files contain hardcoded hex keys
  # ('0123456789abcdef…' / 'fedcba…') used for deterministic round-trip
  # assertions. Documented in docs/internal/launch-audit-2026-04-29.md.
  '''internal/encryption/encryption_test\.go$''',
  '''internal/encryption/encryption_bench_test\.go$''',
  '''internal/encryption/layout_test\.go$''',

  # Onboarding test fixture: ENCRYPTION_KEY string passed to mock
  # bootstrap calls — generic-api-key rule fires on the high-entropy
  # value. Verified in the launch audit; not a real credential.
  '''internal/services/onboarding_test\.go$''',

  # Orchestrator security tests — fake stripe-access-token test vectors
  # used to verify credential file writing paths.
  '''internal/orchestrator/exec_security_test\.go$''',

  # Sidecar security/e2e tests — fake x-api-key and provider tokens.
  '''internal/sidecar/security_test\.go$''',
  '''internal/sidecar/e2e_test\.go$''',

  # Lookout redaction test — exercises the scrubber against placeholder
  # AWS/OpenAI/Anthropic/GitHub tokens. Verified: the strings are static
  # test inputs (e.g. "id=AKIAABCDEFGHIJKLMNOP") used to assert that
  # the redaction path strips them from output.
  '''internal/lookout/lookout_test\.go$''',

  # E2E test fixtures with mock credentials.
  '''e2e/.*''',
  '''tests/fixtures/.*''',

  # Example / template env file (documented as placeholders only).
  '''\.env\.example$''',

  # Committed SQLite database (binary blob, triggers entropy rule).
  '''crewship\.db.*$''',

  # Prisma schema — type definitions, no secrets.
  '''prisma/schema\.prisma$''',

  # Documentation files that show installation examples with placeholder keys.
  # Verified: only these three files contained 'sk-...'-style example strings.
  '''docs/guides/installation\.mdx$''',
  '''docs/configuration/environment\.mdx$''',
  '''docs/api-reference/overview\.mdx$''',

  # Launch audit memo: documents the gitleaks allowlist itself, which
  # means the placeholder strings being allowlisted (e.g. AKIAABCDEFG…)
  # appear verbatim in the memo body and re-trigger the very rule the
  # memo is documenting. Pinned to the exact dated filename — future
  # audit memos require an explicit per-file entry, preserving this
  # file's documented "narrow, file-specific" allowlist policy and
  # forcing a manual verify step before any new memo can hide findings.
  '''docs/internal/launch-audit-2026-04-29\.md$''',

  # HTML wireframes with mockup data (static design artifacts).
  '''\.claude/context/wireframes/.*\.html$''',
  '''\.factory/context/wireframes/.*\.html$''',
  '''\.factory/context/K8S-READINESS\.md$''',

  # Next.js static export (built at CI time, no real content committed).
  '''web/out/.*''',
  '''\.next/.*''',

  # Two specific page wrappers that trigger generic-api-key on line-5
  # import/component names. Verified: both files are trivial re-exports of
  # client components and contain no actual credentials.
  '''app/\(dashboard\)/agents/\[agentId\]/runs/page\.tsx$''',
  '''app/\(dashboard\)/agents/\[agentId\]/credentials/page\.tsx$''',

  # Gitleaks own config files (false positive loop prevention).
  '''\.gitleaks\.toml$''',
  '''\.gitleaksignore$''',
]

# Strings that look like secrets but are documented placeholders.
stopwords = [
  "ci-build-secret-not-real",
  "build-time-placeholder",
  "change-me-in-production",
  "your-api-key-here",
  "example-api-key",
  "placeholder",
  "generateStaticParams",
]
