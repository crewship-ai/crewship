# Crewship gitleaks configuration
# CRE-122 Phase 1: narrow, file-specific allowlist for verified false positives.
#
# Verified 2026-04-10: all 33 initial findings were confirmed as false positives.
# Each entry below was matched against actual file content during that audit;
# no broad category patterns (e.g. '.*_test\.go$' or 'docs/.*') are used
# because they would mask real secrets in future test files or documentation.
# Add a new narrow entry (with a comment explaining *why*) rather than widening
# an existing one.

title = "Crewship gitleaks config"

[extend]
# Inherit built-in gitleaks default rules (API keys, tokens, private keys, etc.)
useDefault = true

[allowlist]
description = "Narrowly scoped allowlist — verified false positives only"

paths = [
  # Scrubber source — defines the regex patterns that DETECT secrets, which
  # gitleaks then matches against the regex source itself (the OPENSSH /
  # PEM private-key headers appear literally in the regex string at
  # internal/scrubber/scrubber.go:30,34). False positive — no real key.
  '''internal/scrubber/scrubber\.go$''',

  # Scrubber test fixtures — these tests MUST contain fake API keys, private
  # keys, and JWTs to exercise the redaction logic. Verified: all matches are
  # hardcoded test vectors, no real credentials.
  '''internal/scrubber/scrubber_test\.go$''',
  '''internal/scrubber/security_test\.go$''',
  # Same contract for scrubber's "extra" tests from PR #393's bulk
  # test batch — fake credential strings used to exercise the
  # redaction patterns.
  '''internal/scrubber/scrubber_extra_test\.go$''',

  # Encryption test vectors (AES-GCM roundtrip tests with fake keys).
  # All three encryption test files contain hardcoded hex keys
  # ('0123456789abcdef…' / 'fedcba…') used for deterministic round-trip
  # assertions. Documented in docs/internal/launch-audit-2026-04-29.md.
  '''internal/encryption/encryption_test\.go$''',
  '''internal/encryption/encryption_bench_test\.go$''',
  '''internal/encryption/layout_test\.go$''',

  # Encryption "extra" tests added in PR #393's bulk test batch. Same
  # contract as encryption_test.go: hardcoded fake hex keys for
  # AES-GCM roundtrip assertions. Verified inline — every literal
  # string is a deterministic test vector (sequential alphabet,
  # repeated digits), no production credentials.
  '''internal/encryption/encryption_extra_test\.go$''',

  # Onboarding test fixture: ENCRYPTION_KEY string passed to mock
  # bootstrap calls — generic-api-key rule fires on the high-entropy
  # value. Verified in the launch audit; not a real credential.
  '''internal/services/onboarding_test\.go$''',

  # Orchestrator security tests — fake stripe-access-token test vectors
  # used to verify credential file writing paths.
  '''internal/orchestrator/exec_security_test\.go$''',

  # Sidecar security/e2e tests — fake x-api-key and provider tokens.
  '''internal/sidecar/security_test\.go$''',
  '''internal/sidecar/e2e_test\.go$''',

  # Lookout redaction test — exercises the scrubber against placeholder
  # AWS/OpenAI/Anthropic/GitHub tokens. Verified: the strings are static
  # test inputs (e.g. "id=AKIAABCDEFGHIJKLMNOP") used to assert that
  # the redaction path strips them from output.
  '''internal/lookout/lookout_test\.go$''',

  # E2E test fixtures with mock credentials.
  '''e2e/.*''',
  '''tests/fixtures/.*''',

  # Example / template env file (documented as placeholders only).
  '''\.env\.example$''',

  # Committed SQLite database (binary blob, triggers entropy rule).
  '''crewship\.db.*$''',

  # Prisma schema — type definitions, no secrets.
  '''prisma/schema\.prisma$''',

  # Documentation files that show installation examples with placeholder keys.
  # Verified: only these three files contained 'sk-...'-style example strings.
  '''docs/guides/installation\.mdx$''',
  '''docs/configuration/environment\.mdx$''',
  '''docs/api-reference/overview\.mdx$''',

  # Launch audit memo: documents the gitleaks allowlist itself, which
  # means the placeholder strings being allowlisted (e.g. AKIAABCDEFG…)
  # appear verbatim in the memo body and re-trigger the very rule the
  # memo is documenting. Pinned to the exact dated filename — future
  # audit memos require an explicit per-file entry, preserving this
  # file's documented "narrow, file-specific" allowlist policy and
  # forcing a manual verify step before any new memo can hide findings.
  '''docs/internal/launch-audit-2026-04-29\.md$''',

  # HTML wireframes with mockup data (static design artifacts).
  '''\.factory/context/wireframes/.*\.html$''',
  '''\.factory/context/K8S-READINESS\.md$''',

  # Next.js static export (built at CI time, no real content committed).
  '''web/out/.*''',
  '''\.next/.*''',

  # Two specific page wrappers that trigger generic-api-key on line-5
  # import/component names. Verified: both files are trivial re-exports of
  # client components and contain no actual credentials.
  '''app/\(dashboard\)/agents/\[agentId\]/runs/page\.tsx$''',
  '''app/\(dashboard\)/agents/\[agentId\]/credentials/page\.tsx$''',

  # Credentials wizard "paste" step (PR #408). UI hint placeholder for
  # users showing the canonical PEM/OpenSSH key envelope they should
  # paste. The literal string is the BEGIN/END header with a Unicode
  # ellipsis (…) between them — no key bytes, no production secret.
  # Triggers private-key rule on the header pattern.
  '''components/features/credentials/add-credential-wizard/step-paste\.tsx$''',

  # Pipeline LLM test fixture introduced in PR #407 (open as of
  # 2026-05-18, branch overnight-tests-2026-05-17, commit
  # 61466fdd0f16293086200c1389bc689b197c6efa). gitleaks-action runs
  # with fetch-depth: 0 and scans commits reachable from all fetched
  # refs, so the file shows up on Security runs even though it isn't
  # yet in main. The line at runner_llm_test.go:85 is a synthetic
  # generic-api-key string for mocking the LLM client — no production
  # credential. Once #407 merges and gitleaks accepts the file via
  # this allowlist, the path remains pinned (verified false positive).
  # If a NEW commit on the same path needs a different verification,
  # tighten this to a fingerprint allowlist instead.
  '''internal/pipeline/runner_llm_test\.go$''',

  # Gitleaks own config files (false positive loop prevention).
  '''\.gitleaks\.toml$''',
  '''\.gitleaksignore$''',

  # Scrubber test fixtures intentionally use realistic-looking fake secrets
  # to verify the redaction patterns work. Each value is hard-coded inline
  # in the test, never an actual production credential. Verified all
  # entries are obviously synthetic (sequential alphabet, repeated digits).
  '''internal/scrubber/scrubber_multicli_test\.go$''',

  # CLI fixture files for the multi-CLI E2E test suite. NDJSON captured
  # from canonical "say hello" runs against each upstream CLI; contains
  # no credentials, only event schemas. Pinned to current filenames so
  # accidentally dropping a real captured transcript here still scans.
  '''internal/orchestrator/testdata/cli-fixtures/claude\.ndjson$''',
  '''internal/orchestrator/testdata/cli-fixtures/codex\.ndjson$''',
  '''internal/orchestrator/testdata/cli-fixtures/cursor\.ndjson$''',
  '''internal/orchestrator/testdata/cli-fixtures/droid\.ndjson$''',
  '''internal/orchestrator/testdata/cli-fixtures/gemini\.ndjson$''',
  '''internal/orchestrator/testdata/cli-fixtures/opencode\.ndjson$''',

  # Routines cookbook — documents the standard `Idempotency-Key`
  # HTTP header pattern with placeholder values like
  # `order-12345-attempt-1`. Gitleaks' generic-api-key rule fires
  # on the placeholder; verified false positive (CodeRabbit #285).
  '''docs/guides/routines-cookbook\.mdx$''',

  # CLI eval docs — `curl -H "Authorization: Bearer crewship_cli_xxxxx"`
  # example. The curl-auth-header rule fires on the obviously-fake
  # `crewship_cli_xxxxx` placeholder; verified false positive (same
  # documented-placeholder class as routines-cookbook above).
  '''docs/cli/eval\.mdx$''',

  # internal/api credential-handler coverage test. Uses pemFixture() to
  # build a synthetic OPENSSH PRIVATE KEY / CERTIFICATE block plus inline
  # fake API-key/secret values (e.g. "sk-apikeyvalue") to exercise the
  # per-type credential create/update validation + encrypt-at-rest paths.
  # generic-api-key fires on the base64 PEM body; verified synthetic — no
  # production credential.
  '''internal/api/credentials_mutate_deep_cov_test\.go$''',
]

# Strings that look like secrets but are documented placeholders.
stopwords = [
  "ci-build-secret-not-real",
  "build-time-placeholder",
  "change-me-in-production",
  "your-api-key-here",
  "example-api-key",
  "placeholder",
  "generateStaticParams",
]
