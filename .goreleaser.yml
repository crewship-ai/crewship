# Crewship GoReleaser Configuration
# Builds cross-platform single binary with embedded Next.js static export.
# Requirements: web/out/ must exist before running (built by CI workflow).
#
# Usage:
#   goreleaser release --clean          # Full release (CI only)
#   goreleaser build --snapshot --clean  # Local test build

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: crewship
    main: ./cmd/crewship
    binary: crewship
    env:
      - CGO_ENABLED=0
    # -trimpath produces reproducible binaries: workspace paths are stripped
    # from debug info, so the same source + toolchain version emits the same
    # bytes from any builder. Required for the cosign keyless verification
    # chain below — verifiers compare hashes against signed digests.
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      # Sentry DSN injected from the SENTRY_DSN GitHub Actions secret.
      # When unset (local goreleaser snapshot runs), the variable expands to
      # an empty string and the crashreport package short-circuits Init() —
      # consent state is still recorded but no events are sent. Production
      # release builds must set this secret to enable crash visibility.
      - -X github.com/crewship-ai/crewship/internal/crashreport.DSN={{ envOrDefault "SENTRY_DSN" "" }}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# SBOM generation via syft (CRE-122).
# Produces both SPDX (US federal procurement standard) and CycloneDX
# (OWASP Dependency-Track) formats attached to each archive.
sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cdx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# Keyless cosign signing via GitHub Actions OIDC (CRE-122).
# The absence of `--key` enables keyless mode in cosign ≥ 2.0; ambient
# OIDC is auto-detected from the GitHub Actions token.
# `artifacts: all` signs archives, checksums, and SBOMs.
signs:
  - id: cosign-all
    cmd: cosign
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: all
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"

brews:
  - repository:
      owner: crewship-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: crewship
    homepage: "https://crewship.ai"
    description: "AI Agent Orchestration Platform -- manage AI virtual employees in crews"
    license: "Apache-2.0"
    install: |
      bin.install "crewship"
    test: |
      system "#{bin}/crewship", "version"
    commit_msg_template: "chore: update crewship formula to {{ .Tag }}"

release:
  github:
    owner: crewship-ai
    name: crewship
  draft: false
  prerelease: auto
  name_template: "Crewship {{ .Tag }}"
  header: |
    ## What's Changed

    Install with Homebrew:
    ```bash
    brew install crewship-ai/tap/crewship
    ```

    Or download the binary for your platform below.

    ### Supply chain verification

    All release artifacts are signed with [Sigstore cosign](https://www.sigstore.dev/)
    (keyless, GitHub Actions OIDC) and ship with SBOMs in both SPDX and CycloneDX formats.

    Verify a binary signature:
    ```bash
    cosign verify-blob \
      --certificate-identity-regexp "https://github.com/crewship-ai/crewship/.github/workflows/release.yml@.*" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      --signature crewship_{{ .Tag }}_linux_amd64.tar.gz.sig \
      --certificate crewship_{{ .Tag }}_linux_amd64.tar.gz.pem \
      crewship_{{ .Tag }}_linux_amd64.tar.gz
    ```

docker_manifests: []
