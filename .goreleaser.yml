# Crewship GoReleaser Configuration
# Builds cross-platform single binary with embedded Next.js static export.
# Requirements: web/out/ must exist before running (built by CI workflow).
#
# Usage:
#   goreleaser release --clean          # Full release (CI only)
#   goreleaser build --snapshot --clean  # Local test build

version: 2

before:
  hooks:
    - go mod tidy

# Snapshot builds (goreleaser release --snapshot) get a digit-leading version.
# The default derives from `git describe`, which on this repo yields
# `nightly-<date>-r<n>` — and dpkg REJECTS a package whose Version doesn't start
# with a digit ("version number does not start with digit"), so a snapshot .deb
# won't install (verified on Proxmox; requirement for the pre-merge smoke, #933).
# Real releases use a proper vX.Y.Z tag and ignore this template.
snapshot:
  version_template: "0.0.0-snapshot-{{ .ShortCommit }}"

builds:
  # Full binary — daemon + server + embedded Next.js UI + CLI. ~55 MB.
  # The one most users want. Shipped as `crewship` in Homebrew.
  - id: crewship
    main: ./cmd/crewship
    binary: crewship
    env:
      - CGO_ENABLED=0
    # -trimpath produces reproducible binaries: workspace paths are stripped
    # from debug info, so the same source + toolchain version emits the same
    # bytes from any builder. Required for the cosign keyless verification
    # chain below — verifiers compare hashes against signed digests.
    flags:
      - -trimpath
    # crewship is Linux-only. Both macOS (#953) and Windows (#946) live in
    # their own builds below (crewship-darwin / crewship-windows): each of
    # those archives must bundle the LINUX sidecar (it is bind-mounted into
    # Linux agent containers, never exec'd on the host), and archives can't
    # vary files per-goos — so each OS needs its own build + archive pair.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      # Sentry DSN injected from the SENTRY_DSN GitHub Actions secret.
      # When unset (local goreleaser snapshot runs), the variable expands to
      # an empty string and the crashreport package short-circuits Init() —
      # consent state is still recorded but no events are sent. Production
      # release builds must set this secret to enable crash visibility.
      - -X github.com/crewship-ai/crewship/internal/crashreport.DSN={{ envOrDefault "SENTRY_DSN" "" }}

  # Full daemon for macOS (#953). Separate build id so the darwin archive
  # (default-darwin below) can bundle the LINUX sidecar + entrypoint.sh —
  # agents always run in Linux containers (Docker Desktop / Colima /
  # OrbStack VMs), so the bind-mount sources must be Linux artifacts even
  # on a macOS host. A native darwin sidecar is a Mach-O binary that fails
  # to exec in-container with exit 255, misdiagnosed as a glibc/musl issue.
  - id: crewship-darwin
    main: ./cmd/crewship
    binary: crewship
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X github.com/crewship-ai/crewship/internal/crashreport.DSN={{ envOrDefault "SENTRY_DSN" "" }}

  # Full daemon for Windows (#946). Separate build id so the windows
  # archive (default-windows below) can bundle the LINUX sidecar +
  # entrypoint.sh — agents always run in Linux containers, so the
  # bind-mount sources must be Linux artifacts even on a Windows host
  # (same reasoning as crewship-darwin above).
  - id: crewship-windows
    main: ./cmd/crewship
    binary: crewship
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X github.com/crewship-ai/crewship/internal/crashreport.DSN={{ envOrDefault "SENTRY_DSN" "" }}

  # CLI-only build — same cmd/crewship entry point, built with the
  # `clionly` tag. Strips the embedded Next.js bundle (web/embed.go),
  # the daemon server (cmd_start.go), local-host commands that touch
  # SQLite directly (cmd_doctor.go, cmd_admin.go, cmd_telemetry.go,
  # cmd_memory_versions.go), and the entire daemon-side dependency
  # graph (Docker SDK, scheduler, license, server, api). Result ~27 MB
  # vs ~55 MB full. Shipped as `crewship-cli` in Homebrew.
  #
  # The binary inside the archive is still named `crewship` so user
  # scripts that already say `crewship ask "…"` keep working. The two
  # Homebrew formulae declare a mutual conflict so a host installs
  # one or the other.
  - id: crewship-cli
    main: ./cmd/crewship
    binary: crewship
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -tags=clionly
    # windows is CLI-only for now (#945): the full daemon build stays
    # darwin/linux until phase B (#946) lands IPC/hooks/packaging work.
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # crewship-sidecar — the per-container agent runtime shim. `crewship start`
  # autodetects it next to the crewship binary (internal/config/config.go
  # autodetectSidecarPaths) and bind-mounts it into every crew container at
  # /usr/local/bin/crewship-sidecar. Without it in the archive, a
  # tarball-installed `crewship start` refused to boot ("run 'make
  # build:sidecar'") — a Makefile the user doesn't have. Bundled ONLY in the
  # full archives; the CLI-only build never launches containers.
  #
  # LINUX ONLY (#953): agent containers are always Linux, so the sidecar is
  # always a Linux ELF — the darwin archive pulls the arch-matched linux
  # build via its files: glob. A darwin build of this binary is useless by
  # construction (it can never exec where it runs).
  - id: crewship-sidecar
    main: ./cmd/crewship-sidecar
    binary: crewship-sidecar
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    builds:
      - crewship
      - crewship-sidecar
    format: tar.gz
    # An explicit `files:` REPLACES goreleaser's defaults, so the legal/docs
    # files it bundles by default (LICENSE*, README*, CHANGELOG*) must be
    # listed back explicitly — an Apache-2.0 binary shipping without its
    # LICENSE is a compliance bug. entrypoint.sh is the host-side file
    # autodetectSidecarPaths looks for next to the binary; strip_parent drops
    # the scripts/ prefix so it lands at the archive root as ./entrypoint.sh.
    files:
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: scripts/entrypoint.sh
        dst: .
        strip_parent: true
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  # macOS full-daemon archive (#953). Bundles the LINUX sidecar binary from
  # the crewship-sidecar build's dist output — resolveSidecarPaths finds it
  # next to the crewship binary (or in Homebrew's libexec) and bind-mounts
  # it into Linux agent containers; it is never executed on the macOS host.
  # Arch-matched: Docker Desktop / Colima on Apple Silicon runs linux/arm64
  # containers, Intel Macs run linux/amd64. Same name_template as `default`
  # so install.sh and AssetNameForTag resolve it unchanged.
  - id: default-darwin
    builds:
      - crewship-darwin
    format: tar.gz
    files:
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: scripts/entrypoint.sh
        dst: .
        strip_parent: true
      - src: dist/crewship-sidecar_linux_{{ .Arch }}*/crewship-sidecar
        dst: .
        strip_parent: true
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  # Windows full-daemon archive (#946). Same LINUX-sidecar bundling as
  # default-darwin (agents run in Linux containers under Docker Desktop's
  # WSL 2 backend); resolveSidecarPaths finds crewship-sidecar next to
  # crewship.exe. Zip is the Windows convention; same name_template as
  # `default` so AssetNameForTag resolves it.
  - id: default-windows
    builds:
      - crewship-windows
    format: zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*
      - src: scripts/entrypoint.sh
        dst: .
        strip_parent: true
      - src: dist/crewship-sidecar_linux_{{ .Arch }}*/crewship-sidecar
        dst: .
        strip_parent: true
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  - id: cli
    builds:
      - crewship-cli
    format: tar.gz
    # Windows convention is zip; AssetNameForTag (internal/update) and any
    # installer must pick .zip for GOOS=windows.
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

# SBOM generation via syft (CRE-122).
# Produces both SPDX (US federal procurement standard) and CycloneDX
# (OWASP Dependency-Track) formats attached to each archive.
sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cdx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# Keyless cosign signing via GitHub Actions OIDC (CRE-122).
# The absence of `--key` enables keyless mode in cosign ≥ 2.0; ambient
# OIDC is auto-detected from the GitHub Actions token.
# `artifacts: all` signs archives, checksums, and SBOMs.
signs:
  - id: cosign-all
    cmd: cosign
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: all
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"

brews:
  # Full daemon + CLI in one binary. Default install for self-hosting.
  - repository:
      owner: crewship-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: crewship
    # Both full archives: default (linux, for Linuxbrew) + default-darwin
    # (macOS — bundles the LINUX sidecar, #953).
    ids:
      - default
      - default-darwin
    homepage: "https://crewship.ai"
    description: "Self-hosted runtime for AI coding agents — daemon + CLI + web UI in one binary"
    license: "Apache-2.0"
    conflicts:
      - crewship-cli
    # Only crewship is a user command, so it alone lands in bin. The runtime
    # companions (crewship-sidecar + entrypoint.sh) go to libexec: shipping a
    # bare entrypoint.sh into the global bin polluted PATH and risked name
    # collisions (issue #920). autodetectSidecarPaths probes <bin>/../libexec
    # (the Cellar sibling), so `crewship start` still finds them.
    install: |
      bin.install "crewship"
      libexec.install "crewship-sidecar"
      libexec.install "entrypoint.sh"
    test: |
      system "#{bin}/crewship", "version"
    commit_msg_template: "chore: update crewship formula to {{ .Tag }}"

  # CLI-only build for users connecting to a remote crewshipd. Roughly
  # half the install footprint (~27 MB vs ~55 MB) — no embedded Next.js
  # bundle, no Docker SDK, no scheduler, no `crewship start` /
  # `crewship doctor` / `crewship admin` / `crewship telemetry`. The
  # binary inside the archive is still named `crewship` so existing
  # scripts keep working; the two formulae declare a mutual conflict
  # so a host installs one or the other.
  - repository:
      owner: crewship-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: crewship-cli
    ids:
      - cli
    homepage: "https://crewship.ai"
    description: "Crewship CLI — lightweight client for a remote crewshipd (no daemon, no UI bundle)"
    license: "Apache-2.0"
    conflicts:
      - crewship
    install: |
      bin.install "crewship"
    test: |
      system "#{bin}/crewship", "version"
    commit_msg_template: "chore: update crewship-cli formula to {{ .Tag }}"

# Native Linux packages (#858 phase 4). deb + rpm carry the same companion set
# as the tar.gz archive — crewship, crewship-sidecar, entrypoint.sh — plus a
# systemd unit. The package manager owns the upgrade (stop -> swap -> start);
# the postinstall try-restarts an already-running service, never enables a
# stopped one. No package signing here yet: like macOS notarization it's a
# documented follow-up; integrity today comes from the release checksums.
nfpms:
  - id: packages
    package_name: crewship
    # crewship (full daemon+UI) and the sidecar shim. The CLI-only build is a
    # separate Homebrew story and is intentionally not packaged here.
    # `builds` (not `ids`): the pinned goreleaser v2.6.1 nfpm schema uses
    # `builds`; `ids` only exists in newer goreleaser and fails the release
    # pipeline (caught by the #933 pre-merge smoke).
    builds:
      - crewship
      - crewship-sidecar
    vendor: Crewship
    homepage: "https://crewship.ai"
    maintainer: "Crewship <support@crewship.ai>"
    description: "Self-hosted runtime for AI coding agents — daemon + CLI + web UI in one binary"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
    # Both binaries go to /usr/bin: crewship-sidecar is a real, namespaced
    # binary so it's fine on PATH — only entrypoint.sh (a bare shell script)
    # would pollute it, so that one lands in libexec instead (mirrors #920).
    bindir: /usr/bin
    contents:
      # autodetectSidecarPaths probes <bin>/../libexec/crewship/entrypoint.sh
      # for exactly this FHS layout, so `crewship start` boots with no override.
      - src: scripts/entrypoint.sh
        dst: /usr/libexec/crewship/entrypoint.sh
        file_info:
          mode: 0755
      # /usr/lib/systemd/system is the canonical vendor unit dir on merged-/usr
      # distros (/lib is a compat symlink to it on Debian/Ubuntu; Fedora dropped
      # the symlink), so install to the real location.
      - src: packaging/crewship.service
        dst: /usr/lib/systemd/system/crewship.service
        file_info:
          mode: 0644
      # Shipped as a config file so operator overrides survive upgrades
      # (noreplace = never overwrite an existing /etc/crewship/crewship.env).
      # Optional knobs only — the crypto secrets auto-generate under the data
      # dir, so this file ships with no secrets.
      - src: packaging/crewship.env.example
        dst: /etc/crewship/crewship.env
        type: "config|noreplace"
        file_info:
          mode: 0640
      # A pristine copy always refreshed on upgrade, so operators can diff new
      # optional knobs against their edited env file.
      - src: packaging/crewship.env.example
        dst: /etc/crewship/crewship.env.example
        file_info:
          mode: 0644
    scripts:
      postinstall: packaging/nfpm/postinstall.sh
      preremove: packaging/nfpm/preremove.sh
    # Recommend Docker but don't hard-require it: agents need a runtime, but a
    # dashboard-only host runs with CREWSHIP_ARGS=--no-docker. A weak/Recommends
    # dep is advisory — an unsatisfiable one is skipped, never a hard failure.
    recommends:
      - docker-ce
    # Embedded GPG signatures (#932), verified with `dpkg-sig --verify` / `rpm -K`.
    # CONDITIONAL: signs only when GPG_KEY_PATH is set (release.yml materializes
    # it from the GPG_SIGNING_KEY secret). Empty → nfpm skips signing, so
    # snapshot builds and secret-less forks still produce (unsigned) packages.
    # Passphrase (if the key has one) is read from NFPM_PACKAGES_PASSPHRASE.
    deb:
      signature:
        key_file: '{{ if index .Env "GPG_KEY_PATH" }}{{ .Env.GPG_KEY_PATH }}{{ end }}'
    rpm:
      signature:
        key_file: '{{ if index .Env "GPG_KEY_PATH" }}{{ .Env.GPG_KEY_PATH }}{{ end }}'

release:
  github:
    owner: crewship-ai
    name: crewship
  draft: false
  prerelease: auto
  name_template: "Crewship {{ .Tag }}"
  header: |
    ## What's Changed

    Install with Homebrew:
    ```bash
    brew install crewship-ai/tap/crewship
    ```

    Or download the binary for your platform below.

    ### Supply chain verification

    All release artifacts are signed with [Sigstore cosign](https://www.sigstore.dev/)
    (keyless, GitHub Actions OIDC) and ship with SBOMs in both SPDX and CycloneDX formats.

    Verify a binary signature:
    ```bash
    cosign verify-blob \
      --certificate-identity-regexp "https://github.com/crewship-ai/crewship/.github/workflows/release.yml@.*" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      --signature crewship_{{ .Tag }}_linux_amd64.tar.gz.sig \
      --certificate crewship_{{ .Tag }}_linux_amd64.tar.gz.pem \
      crewship_{{ .Tag }}_linux_amd64.tar.gz
    ```

docker_manifests: []
